ельно морально положительный и не обязательно совпадающий с намерением источника. Для экзамена важнее установить, какое изменение у получателя можно обоснованно связать с коммуникативным актом. Василик показывает, что оценка результативности в расширенной модели связана с реализацией поставленной цели, сроками и издержками; Гавра описывает эффект через изменения сознания и/или поведения. [3, с. 130–132; 2, с. 95–96]\n\n### Алгоритм разбора экзаменационного кейса\n\n1. Подчеркните в условии того, кто инициирует коммуникацию. Не подменяйте его случайным участником обсуждения.\n2. Выделите предмет и форму сообщения: что именно передаётся — факт, оценка, инструкция, призыв, образ.\n3. Назовите физический/технический посредник сообщения — канал.\n4. Определите адресата: конкретный человек, сегмент, группа или широкая аудитория.\n5. Отдельно найдите данные о результате. Если есть только охват или публикация, эффект ещё не подтверждён.\n\nЭто авторский алгоритм применения формулы; его элементы следуют из модели Лассуэлла и из разграничения контакта и эффекта в источниках. [2, с. 95–100; 1, с. 260–262]\n\n### Тренировка: один кейс — две теоретические интерпретации\n\nПредставьте, что видеоролик благотворительного фонда получил большой охват, а затем часть зрителей перечислила пожертвования. В интерпретации сильного прямого воздействия легко сказать: ролик достиг людей и вызвал действие. В интерпретации ограниченных эффектов этого недостаточно: нужно выяснить, кто из зрителей уже был настроен помогать, кто получил рекомендацию от знакомых, как конкретные группы обсуждали сообщение и какие иные факторы совпали с кампанией. Эти объяснения не обязательно взаимоисключающие: второе просто осторожнее в вопросе о механизме и единственной причине. Сопоставление строится на различии сильных и ограниченных эффектов у Кирии и Новиковой. [1, с. 261–265]\n\nТеперь примените формулу Лассуэлла. Фонд — вероятный источник; ролик с просьбой помочь и описанием проблемы — сообщение; видеоплатформа/социальная сеть — канал; пользователи, которым он был адресован или показан, — аудитория; пожертвование — возможный поведенческий эффект. Но число просмотров отдельно характеризует масштаб контакта, а не доказывает пожертвование. Так модель Лассуэлла помогает не «угадать автора», а разложить условие на элементы, с которыми можно работать. [2, с. 95–100; 1, с. 260–262]\n\n### Интерактив — 4 минуты\n\nВернитесь к стартовому кейсу. Заполните таблицу самостоятельно, затем сравните с образцом.\n\n| Элемент | Ваш ответ | Образец разбора |\n|---|---|---|\n| Кто? |  | Муниципальный департамент |\n| Что? |  | Ролик с информацией/призывом о раздельном сборе |\n| Канал? |  | Сообщество во «ВКонтакте» |\n| Кому? |  | Подписчикам сообщества |\n| Эффект? |  | Часть аудитории чаще ищет пункты приёма |\n\nВ образце «эффект» — не число просмотров, а зафиксированное изменение действия, описанное в кейсе.\n\n---\n\n## Экзаменационные мини-задачи\n\n### Задача 1 — один верный ответ\n\n«Пост в Telegram увидели 30 000 человек» — какой элемент формулы Лассуэлла описывает эта информация?\n\n1. Источник\n2. Сообщение\n3. Получатель / аудитория\n4. Эффект\n\n**Ответ:** 3. Это характеристика тех, кому адресовано/кем получено сообщение. Для вывода об эффекте нужны данные о воздействии, а не только об охвате. [2, с. 96; 1, с. 261]\n\n### Задача 2 — несколько верных ответов\n\nКакие пункты являются самостоятельными направлениями анализа по Лассуэллу?\n\n1. Источник сообщения\n2. Канал коммуникации\n3. Получатель / аудитория\n4. Обязательная техническая помеха\n\n**Ответ:** 1, 2, 3. [2, с. 96]\n\n### Задача 3 — один верный ответ\n\nКакое утверждение точнее отражает различие двух ранних направлений?\n\n1. Теории ограниченных эффектов отрицают любые эффекты медиа.\n2. Теории пропагандистской силы предполагают сильное влияние медиа; ограниченные эффекты — не полное изменение устойчивых установок.\n3. Они различаются только названием канала.\n4. Теории пропагандистской силы изучают только невербальное общение.\n\n**Ответ:** 2. [1, с. 261]\n\n---\n\n## Быстрые карточки № 1–10\n\nСначала выберите вариант, затем нажмите «Проверить» на странице с карточками.\n\n1. **[Один ответ]** Формула «кто? что? по какому каналу? кому? с каким эффектом?» принадлежит:\n   1) Шеннону—Уиверу  2) Лассуэллу  3) Шрамму  4) Якобсону  \n   **Ответ:** 2. [2, с. 95–96]\n\n2. **[Несколько ответов]** Что относится к пяти компонентам формулы Лассуэлла?\n   1) Источник  2) Канал  3) Получатель  4) Модульность  \n   **Ответ:** 1, 2, 3. [2, с. 96]\n\n3. **[Один ответ]** Какой элемент Лассуэлл связывает с изучением воздействия и эффективности коммуникации?\n   1) «Что?»  2) «Кому?»  3) «С каким эффектом?»  4) «По какому каналу?»  \n   **Ответ:** 3. [2, с. 96]\n\n4. **[Один ответ]** В ранней эмпирико-функционалистской логике медиа прежде всего рассматриваются как:\n   1) Внешний стимул  2) Нейтральное отсутствие воздействия  3) Только художественный текст  4) Случайная помеха  \n   **Ответ:** 1. [1, с. 257]\n\n5. **[Несколько ответов]** На какие опоры указывает учебник для эмпирико-функционализма?\n   1) Бихевиоризм  2) Математическая теория информации  3) Индустриальный контекст  4) Конвергентная культура  \n   **Ответ:** 1, 2, 3. [1, с. 257]\n\n6. **[Один ответ]** Какое утверждение верно?\n   1) Прослушивание программы доказывает готовность действовать.\n   2) Контакт с программой не доказывает её понимание, принятие и действие.\n   3) Аудитория всегда одинаково интерпретирует сообщение.\n   4) Реклама не требует измерения аудитории.\n   **Ответ:** 2. [1, с. 260–261]\n\n7. **[Один ответ]** Теории пропагандистской силы предполагают, что:\n   1) Медиа активно влияют, а люди безоговорочно доверяют сообщениям.\n   2) Медиа не могут иметь эффектов.\n   3) Влияние всегда сводится к техническому каналу.\n   4) Только лидеры мнений производят сообщения.\n   **Ответ:** 1. [1, с. 261]\n\n8. **[Один ответ]** Теории ограниченных эффектов исходят из того, что медиа:\n   1) полностью меняют любые установки;\n   2) не в полной мере влияют на устойчивые установки индивидов;\n   3) работают только в печатной прессе;\n   4) не имеют аудитории.\n   **Ответ:** 2. [1, с. 261]\n\n9. **[Несколько ответов]** Что может быть сообщением по Гавре?\n   1) Факт  2) Идея  3) Побуждение к действию  4) Только набор незакодированных звуков  \n   **Ответ:** 1, 2, 3. [2, с. 98]\n\n10. **[Один ответ]** Канал коммуникации — это:\n   1) Результат воздействия;\n   2) физический посредник, обеспечивающий перемещение сообщения;\n   3) только текст сообщения;\n   4) социальная группа получателей.\n   **Ответ:** 2. [2, с. 98–99]\n\n---\n\n## Источники дня\n\n1. Кирия И. В., Новикова А. А. *История и теория медиа*. 2-е изд. М.: Изд. дом ВШЭ, 2018. Гл. 9, § 1, с. 257–261. Текст из материалов пользователя: `история-и-теория-медиа.txt`.\n2. Гавра Д. П. *Основы теории коммуникации*. СПб.: Питер, 2011. Разд. 4.2 «Модель коммуникации Р. Лассвелла», с. 95–99. Текст из материалов пользователя: `Osnovy_teorii_kommunikatsii_Gavra_D_P.txt`.\n3. Василик М. А. (ред.). *Основы теории коммуникации*. М.: Гардарики, 2003. Гл. 3 «Коммуникационный процесс», с. 126–132. Текст из материалов пользователя: `M.A._Vasilik__Osnovue_teorii_kommunikacii_libcats.org_.txt`.\n\n**Как проверять ссылку в предоставленных TXT:** номер печатной страницы указан в самом тексте на границе страницы; он может не совпадать с номером строки или экрана.\n","02":"# День 2. Теория коммуникации как наука: объект, предмет и подходы\n\n**Результат дня.** Вы сможете отличить объект науки от её предмета, объяснить, почему теория коммуникации междисциплинарна, и не смешивать информационный, семиотический, социально-психологический и социокультурный способы анализа коммуникации.\n\n**Карточки дня:** № 11–20 из банка 130.\n\n> Все положения, помеченные ссылкой, опираются на предоставленные учебники. Кейсы, алгоритмы и задания созданы для тренировки и не претендуют на статус отдельной научной теории.\n\n## Стартовый кейс\n\nОдин исследователь изучает, сколько сотрудников прочитали внутреннее письмо компании. Второй выясняет, как они поняли формулировку изменения правил. Третий наблюдает, изменилось ли взаимодействие между отделами после письма. Все трое исследуют коммуникацию, но задают разные вопросы.\n\nПеред чтением ответьте: это три разных науки или три ракурса одной сложной области? В конце главы вернитесь к ответу.\n\n## Почему теория коммуникации не имеет одного простого определения\n\nКоммуникация присутствует в языковой, психологической, социологической, технической, политической и культурной проблематике. Поэтому у неё нет одного бесспорного определения, которое одинаково решало бы задачи всех дисциплин. Василик пишет, что коммуникация — универсальное явление, а её содержание и формы изучаются науками социально-гуманитарного, естественно-научного и технического циклов. Именно это создаёт потребность в теории, которая интегрирует и обобщает результаты разных исследований. [1, с. 9–11]\n\nЭто не означает, что любое употребление слова «коммуникация» верно в любом контексте. Один автор может акцентировать передачу информации, другой — взаимодействие, третий — создание и воспроизводство социального порядка. Наличие нескольких определений объясняет не «нестрогость» науки, а различие исследовательских задач. Гавра характеризует теорию коммуникации как мультипарадигмальную и междисциплинарную науку: она не обязана сводить все явления к одному механизму. [2, с. 9–28]\n\nСлово **междисциплинарная** здесь означает, что теория коммуникации использует результаты и методы нескольких наук. Например, лингвистика помогает анализировать язык и высказывание; семиотика — знаки и коды; психология — восприятие, установки и влияние; социология — группы, институты и массовые процессы; технические дисциплины — передачу сигналов и каналы. Нельзя сделать из этого списка вывод, будто теория коммуникации — просто сумма готовых дисциплин. Её собственная задача — соотносить эти ракурсы вокруг коммуникативных процессов. [1, с. 9–11, 20–21; 2, с. 19–28]\n\nСлово **мультипарадигмальная** означает, что в области сосуществуют разные теоретические традиции. Они по-разному отвечают на вопрос, что является главным в коммуникации. Процессно-информационный подход подчёркивает передачу сообщения; семиотический — знаковое опосредование и смысл; социально-психологический — взаимодействие и влияние; социокультурный — производство и воспроизводство социальности. Гавра не предлагает объявить одну из этих традиций единственно правильной: у каждой свой объект внимания и словарь. [2, с. 69–82]\n\nДля экзамена полезно запомнить различие между двумя ошибками. Первая: «раз есть несколько подходов, правильного ответа не бывает». Это неверно: в каждом вопросе есть подсказки о том, какой аспект описан. Вторая: «один подход объясняет всё». Это тоже неверно: технический шум, значение знака, групповая норма и эмоциональная реакция не сводятся друг к другу. Правильная стратегия — сначала определить, что именно спрашивают, затем выбрать соответствующий понятийный аппарат.\n\n### Коммуникация и информация: не тождественные слова\n\nВ бытовой речи «передать информацию» часто используют как синоним коммуникации. Для процессного анализа это полезная отправная точка, но она не исчерпывает социальную коммуникацию. Информация должна получить материальную или знаковую форму, быть передана, принята и интерпретирована. Когда речь идёт о людях, важны ещё контекст, общие коды, отношения участников и возможная обратная связь. Поэтому сообщение может быть технически доставлено, но не стать успешной коммуникацией в смысле понимания и координации действий. Гавра разбирает это различие при анализе понятия коммуникации и процессно-информационных моделей. [2, с. 29–68, 93–113]\n\nВасилик также разводит широкие уровни информационного обмена: в природной среде возможна биокоммуникация через сигналы, а в обществе изучается социальная коммуникация, связанная с человеческими отношениями, символами и средствами их передачи. Не нужно превращать это в тезис «животные не общаются» или «вся коммуникация — только язык»: различаются уровни и предметы анализа. [1, с. 20–21]\n\n## Объект и предмет: как отвечать без путаницы\n\n**Объект науки** — фрагмент реальности, на который направлено познание. **Предмет науки** — те стороны, связи и закономерности объекта, которые данная наука специально выделяет и изучает. Это различие не формальная игра терминов. Один и тот же объект может интересовать несколько наук, но они будут строить разные предметы исследования. Гавра специально начинает раздел об объекте и предмете с этого разграничения. [2, с. 18–19]\n\nВ его формулировке объектом теории коммуникации служит социальная коммуникация в широком смысле — процессы социального взаимодействия между людьми, рассматриваемыми как субъекты и объекты социальных процессов. Предметом выступают психологические, социальные, семиотические, технологические и другие стороны реально существующих социально-коммуникационных явлений, связей и отношений, которые раскрываются в теоретическом исследовании. Это не короткая формула для механического заучивания: её смысл в том, что объект шире, а предмет — исследовательски выделенная сторона объекта. [2, с. 19–26]\n\nУ Василика уровни теоретического знания описаны как лестница обобщения. На наиболее общем уровне теория коммуникации оперирует широкими категориями — «коммуникация», «информация», «информационный обмен», «коммуникативное пространство» — и ищет универсальные механизмы обмена. На более конкретном уровне общая теория социальной коммуникации обобщает знания о закономерностях и средствах информационного обмена в обществе. Затем возникают частнонаучные теории: массовой, межличностной, групповой коммуникации, теории пропаганды и другие. [1, с. 20–22]\n\nЭти уровни не означают, что общая теория «выше» и потому отменяет исследования конкретных ситуаций. Напротив, частные исследования дают материал для обобщения, а более общие теории могут выполнять методологическую функцию: уточнять предмет, границы и методы менее общих теорий. [1, с. 21–22]\n\n### Мини-проверка различения\n\nСитуация: исследователь анализирует комментарии под видео.\n\n- Если он спрашивает, какие эмодзи и слова образуют повторяющиеся значения, его интересует знаковая сторона коммуникации.\n- Если он измеряет, как изменилось отношение зрителей к герою, фокус — социально-психологическое влияние.\n- Если он изучает, как комментарии поддерживают нормы сообщества, фокус — социокультурное воспроизводство социальности.\n- Если он считает потери сигнала и доступность передачи, фокус — процессно-информационная сторона.\n\nЭто не четыре «правильных объекта». Это четыре способа выделить предмет исследования в одной области. Основание для такого сопоставления — описание разных парадигм у Гавры. [2, с. 69–82]\n\n## Подходы к коммуникации: что каждый из них видит\n\n### Процессно-информационный подход\n\nЭтот подход представляет коммуникацию как передачу и получение сообщений, а в более общем виде — как обработку информации. Он помогает разложить процесс на источник, сообщение, кодирование, канал, получателя, декодирование, шум и эффект. Его сильная сторона — ясное описание структуры процесса и технических/организационных условий передачи. Его ограничение в том, что одной схемы движения сообщения недостаточно для объяснения культурного смысла и социального контекста. [2, с. 93–113, 143–145]\n\nКогда в тесте названы «кодирование», «канал», «шум» и «декодирование», это сильный признак процессно-информационного ракурса. Но не отвечайте «Шеннон—Уивер» на любой вопрос о сообщении: Лассуэлл, Ньюкомб и другие модели также рассматривают процесс, но делают акцент на иных отношениях между элементами.\n\n### Семиотический подход\n\nСемиотический подход изучает коммуникацию как взаимодействие, опосредованное знаками, знаковыми системами, языками и кодами. Здесь центральным становится не только физическое перемещение сигнала, но и то, как знаки соотносятся друг с другом, со значениями и с участниками, которые ими пользуются. Гавра противопоставляет этот фокус чисто механическому пониманию передачи информации: смысл коммуникации нельзя исчерпать объёмом переданного сигнала. [2, с. 143–180]\n\nВопросы семиотического типа обычно звучат так: «что делает знак знаком?», «как создаётся значение?», «какой код разделяют участники?», «почему один символ понимается по-разному?». В них не обязательно анализировать технический шум, хотя технические условия могут влиять на ситуацию.\n\n### Социально-психологический подход\n\nВ социально-психологической традиции коммуникация рассматривается как экспрессия, взаимодействие и влияние субъектов друг на друга. В поле зрения оказываются установки, эмоции, восприятие, стереотипы, межличностные отношения и изменения в сознании/поведении. Это особенно важно для анализа убеждения, реакции аудитории, конфликтов и обратной связи. [2, с. 77–80]\n\nОшибка — считать социально-психологический подход «про чувства и ничего больше». Он изучает не только эмоциональную экспрессию, но и механизмы влияния, восприятия и взаимодействия. Вопрос об эффекте сообщения может быть поставлен в процессной модели, но объяснение того, почему разные люди реагируют неодинаково, требует психологических переменных.\n\n### Социокультурный подход\n\nСоциокультурная традиция выдвигает на первый план символическую природу взаимодействия и функцию коммуникации в производстве и воспроизводстве социальности. Под социальностью здесь понимается культурно-нормативная обусловленность отношений между людьми. Этот подход полезен, когда нужно объяснить, как коммуникация не просто передаёт готовые смыслы, а поддерживает правила, роли, идентичности и порядок совместной жизни. [2, с. 80–82]\n\nСравните два вопроса. «Дошло ли сообщение до адресата?» — прежде всего процессный вопрос. «Как регулярное обсуждение создаёт норму сообщества?» — социокультурный. «Почему адресат воспринял фразу как угрозу?» — социально-психологический и семиотический вопрос. Границы в реальном исследовании могут пересекаться; в экзаменационной задаче выбирайте главный заявленный акцент.\n\n## Методы, функции и границы научного вывода\n\nЕсли теория коммуникации междисциплинарна, у неё не может быть единственного «правильного» метода. Выбор метода зависит от вопроса. Чтобы узнать, насколько широко распространено мнение, исследователь может применять опрос или анализ статистически организованных данных. Чтобы понять, как участники объясняют собственные действия, могут быть нужны интервью или наблюдение. Чтобы выяснить структуру сообщения, подходит контент-анализ. Чтобы исследовать взаимодействие в группе — методы изучения групповой динамики и социально-психологический эксперимент. Гавра отмечает присутствие в методологическом аппарате теории коммуникации практически всех общенаучных методов, а также специальных методов смежных дисциплин. [2, с. 25–28]\n\nМетод нельзя выбирать по принципу «какой выглядит научнее». Он должен соответствовать предмету. Например, подсчёт количества публикаций может показать частотность темы, но не докажет, как аудитория понимает её смысл. Интервью с несколькими читателями может дать материал о понимании, но не позволяет без дополнительных оснований назвать их ответы мнением всей аудитории. Наблюдение за групповой дискуссией помогает увидеть взаимодействие, но не заменяет анализ технического распространения сообщения. Это авторские выводы из принципа соответствия предмета и методов, изложенного у Гавры. [2, с. 25–28]\n\nВасилик связывает научность теории не с количеством сложных слов, а с наличием специфического предмета, категорий, закономерностей и общих/специальных методов. Для экзамена это означает: определение теории коммуникации как науки должно включать не только «она изучает общение», но и понимание того, что она систематизирует знания о закономерностях информационного взаимодействия. [1, с. 21–31]\n\n### Что такое функция теории — и что ею не является\n\nФункция теории — то, какую работу она выполняет в знании и практике. В учебнике Василика методы и функции обсуждаются вместе: теория не только описывает и объясняет процессы, но и даёт основания для их изучения, прогнозирования и практической организации. Однако нельзя превращать это в обещание точного контроля над любым человеком. Социальная коммуникация зависит от интерпретации, культуры, ситуации и множества участников, поэтому выводы часто имеют вероятностный и контекстный характер. [1, с. 31–42]\n\nРазличайте четыре учебных действия:\n\n1. **Описание** отвечает на вопрос «что происходит?»: например, какие каналы использует организация.\n2. **Объяснение** отвечает «почему и за счёт каких связей?»: например, почему сообщение по-разному воспринимается группами.\n3. **Прогнозирование** формулирует обоснованное ожидание при известных условиях, а не гарантирует результат.\n4. **Практическая организация** использует знание для выбора каналов, формулировок, обратной связи и оценки результатов.\n\nЭто учебная схема, обобщающая функции теоретического знания; не путайте её с перечнем «функций коммуникации» в конкретной модели. [1, с. 31–42]\n\n### Общие условия коммуникации\n\nВасилик формулирует несколько общих условий, которые полезны как проверка любого кейса. Во-первых, коммуникация предполагает не менее двух сторон взаимодействия. Во-вторых, она основана на обратной связи: без неё невозможно надёжно установить результативность взаимодействия. В-третьих, коммуникация имеет знаковый характер. В-четвёртых, для неё нужно хотя бы минимальное общее основание — система знаков или правила кодирования и декодирования, доступные обеим сторонам. [1, с. 23–25]\n\nЭти условия не следует применять механически. Например, информационная рассылка может не получить немедленного ответа, но в организационной практике обратная связь всё равно нужна, чтобы выяснить, получено ли и понято ли сообщение. А «общее основание» не означает полного совпадения опыта участников: наоборот, у них могут быть разные позиции и знания. Речь идёт о минимальной зоне общих знаков/правил, без которой передача и интерпретация разрушатся. [1, с. 24–25]\n\n### Как распознавать некорректный вывод\n\nНекорректный вывод часто возникает, когда исследователь переносит результат одного уровня на другой. Вот три примера.\n\n- «В сообщении есть понятные слова, следовательно, аудитория обязательно согласится». Ошибка: общий код помогает пониманию, но не гарантирует отношение или действие.\n- «Опрос десяти сотрудников показал мнение всей компании». Ошибка: нужно учитывать способ отбора и границы обобщения.\n- «Публикация была отправлена, поэтому коммуникация завершена». Ошибка: отправка — только часть процесса; вопрос о получении, интерпретации и эффекте остаётся открытым.\n\nЭти примеры — авторские; их логика опирается на разграничение предметов, методов, знакового основания и обратной связи у Василика и Гавры. [1, с. 23–42; 2, с. 25–28]\n\n## Как связать подход, объект, предмет и метод в одном ответе\n\nВ заданиях повышенного уровня часто не спрашивают определение напрямую. Вместо этого дают описание ситуации и просят выбрать верный вывод. Чтобы не потеряться, двигайтесь в фиксированном порядке. Сначала установите, **что реально происходит**: передача сигнала, интерпретация знака, межличностное влияние, групповое обсуждение или поддержание нормы. Затем назовите, **какая сторона ситуации становится предметом анализа**. Только после этого выбирайте подход и метод. Такой порядок защищает от распространённой ошибки: начинать с знакомой фамилии или термина и подгонять условие под него.\n\nРассмотрим кейс. Администрация университета публикует новые правила записи на курс. Часть студентов пишет, что не понимает формулировки, часть обсуждает справедливость правила, а часть не увидела пост. Здесь одновременно возможны несколько предметов исследования. Доступность публикации и причины неполучения сообщения можно анализировать в процессно-информационном ключе. Неоднозначность слов и их интерпретацию — в семиотическом. Оценку справедливости и влияние сверстников — в социально-психологическом. Наконец, если исследователя интересует, как через обсуждение закрепляются правила академического сообщества, возникает социокультурный ракурс. Один кейс не обязан иметь один «единственный подход»; в тесте выбирают тот, который соответствует формулировке вопроса. [2, с. 69–82, 93–113, 143–180]\n\nТеперь различите объект и предмет в этом же кейсе. Объект — социальная коммуникация, разворачивающаяся вокруг правил и участников. Предмет может быть сформулирован уже уже: например, «влияние способа формулировки на понимание сообщения» или «роль неформального обсуждения в принятии нормы». Чем точнее предмет, тем понятнее, какие данные нужны. Для первого предмета недостаточно посчитать лайки; для второго недостаточно исправить орфографию текста. Различение следует из определения объекта и предмета у Гавры. [2, с. 18–26]\n\nПолезно также отличать **теоретическое понятие** от **операционального показателя**. Понятие «понимание» — теоретическая категория, а ответ на контрольный вопрос, пересказ инструкции или успешное выполнение действия — возможные показатели, по которым исследователь пытается его оценить. Понятие «эффект» может быть операционализировано через изменение знания, отношения или поведения, но каждый показатель имеет пределы. Операционализация не отменяет теории: она связывает абстрактный вопрос с тем, что можно наблюдать и сравнивать. Это авторское пояснение к требованию теоретико-эмпирического характера исследования у Гавры. [2, с. 25–28]\n\n### Экзаменационная памятка\n\n- **Объект** отвечает на вопрос: «какую область реальности изучают?»\n- **Предмет** отвечает: «какие стороны и связи этой области выделены?»\n- **Подход** отвечает: «через какую оптику рассматривают явление?»\n- **Метод** отвечает: «каким способом получают и обрабатывают данные?»\n- **Показатель** отвечает: «по каким наблюдаемым признакам судят о понятии?»\n\nПоследние два пункта — учебное уточнение, необходимое для применения теории; основания для него содержатся в характеристике теоретико-эмпирической дисциплины и её методологии. [2, с. 25–28]\n\n## Как применять главу в заданиях\n\n### Задание 1. Определите ракурс\n\nДля каждого вопроса назовите ведущий подход.\n\n1. «Какие потери возникают при передаче сигнала?»\n2. «Какой смысл участники придают красному значку?»\n3. «Как обсуждение в группе меняет готовность поддержать решение?»\n4. «Как повторяющиеся ритуалы общения закрепляют принадлежность к сообществу?»\n\n**Эталон:** 1 — процессно-информационный; 2 — семиотический; 3 — социально-психологический; 4 — социокультурный. [2, с. 69–82, 93–113, 143–180]\n\n### Задание 2. Объект или предмет?\n\nСформулируйте один объект и два разных предмета для исследования чата студентов перед экзаменом. Затем проверьте себя: объектом будет сам процесс социальной коммуникации в чате; предметами могут быть, например, знаковые способы выражения тревоги либо влияние неформальных лидеров на распределение информации. Различение объекта и предмета основано на [2, с. 18–26].\n\n## Экзаменационные мини-задачи\n\n1. Соотнесите исследовательский вопрос «как участники создают общий смысл?» с подходом к коммуникации и объясните выбор двумя признаками.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nДля понятия «социальная коммуникация» запишите: что является ресурсом обмена; кто участники; как отличить её от транспортной и биологической коммуникации.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 11–20\n\n1. **[Один ответ]** Теория коммуникации называется междисциплинарной, потому что:\n   1) изучает только технические устройства; 2) использует результаты и методы разных наук; 3) отказывается от методов; 4) имеет только одно определение.  \n   **Ответ:** 2. [1, с. 9–11; 2, с. 19–28]\n\n2. **[Один ответ]** Объект науки — это:\n   1) список учебников; 2) часть реальности, на которую направлено познание; 3) только метод опроса; 4) итоговый вывод исследования.  \n   **Ответ:** 2. [2, с. 18–19]\n\n3. **[Один ответ]** Предмет науки — это:\n   1) выделенные для изучения стороны и связи объекта; 2) только материальный носитель; 3) фамилия исследователя; 4) любое слово в сообщении.  \n   **Ответ:** 1. [2, с. 18–26]\n\n4. **[Несколько ответов]** Какие дисциплины вносят вклад в исследование коммуникации?\n   1) Лингвистика; 2) Психология; 3) Социология; 4) Семиотика.  \n   **Ответ:** 1, 2, 3, 4. [1, с. 9–11; 2, с. 19–28]\n\n5. **[Один ответ]** В процессно-информационном подходе центральна прежде всего:\n   1) передача и получение сообщения; 2) только эстетическая оценка текста; 3) биография автора; 4) классификация жанров.  \n   **Ответ:** 1. [2, с. 93–113]\n\n6. **[Один ответ]** Знаки, коды и производство значения находятся в центре:\n   1) семиотического подхода; 2) только экономического анализа; 3) теории жанров; 4) транспортной логистики.  \n   **Ответ:** 1. [2, с. 143–180]\n\n7. **[Один ответ]** Коммуникация как влияние и взаимодействие субъектов — акцент:\n   1) социально-психологического подхода; 2) только теории печати; 3) теории модульности; 4) теории жанра.  \n   **Ответ:** 1. [2, с. 77–80]\n\n8. **[Один ответ]** Производство и воспроизводство социальности подчёркивает подход:\n   1) социокультурный; 2) исключительно технический; 3) только статистический; 4) физиологический.  \n   **Ответ:** 1. [2, с. 80–82]\n\n9. **[Несколько ответов]** Что может быть предметом исследования коммуникации в группе?\n   1) Знаковые способы выражения позиции; 2) Механизмы влияния участников; 3) Правила и нормы взаимодействия; 4) Только название группы.  \n   **Ответ:** 1, 2, 3. [2, с. 19–28, 69–82]\n\n10. **[Один ответ]** Что точнее описывает связь общей и частных теорий коммуникации?\n   1) Они не связаны; 2) частные исследования дают материал для обобщения, а общие теории выполняют методологическую функцию; 3) общая теория отменяет частные; 4) частные теории существуют только в технике.  \n   **Ответ:** 2. [1, с. 20–22]\n\n## Источники дня\n\n1. Василик М. А. (ред.). *Основы теории коммуникации*. М.: Гардарики, 2003. Гл. 1, с. 9–42.\n2. Гавра Д. П. *Основы теории коммуникации*. СПб.: Питер, 2011. Разд. 1–2, с. 9–82; разд. 4–5, с. 93–180.\n","03":"# День 3. Коммуникационный процесс: модели, код, канал, шум и обратная связь\n\n**Результат дня.** Вы различаете структурные элементы процесса коммуникации, не смешиваете модель Шеннона—Уивера с моделью Лассуэлла и понимаете, зачем в модели нужны кодирование, декодирование, шум и обратная связь.\n\n**Карточки дня:** № 21–30 из банка 130.\n\n## Стартовый кейс\n\nОрганизация отправила сотрудникам инструкцию в корпоративном чате. Часть людей не получила уведомление, часть открыла текст, но поняла его по-разному, а часть задала уточняющие вопросы. В одном кейсе есть по меньшей мере три разных проблемы: техническая доставка, смысловая интерпретация и обратная связь.\n\n## Коммуникационный процесс как модель\n\nКоммуникационный процесс — это передача информации между людьми или группами с помощью разных каналов и средств. Его конкретная форма зависит от числа участников, целей, используемых средств, каналов и стратегий. Василик подчёркивает, что модели в коммуникативистике выполняют две функции: они являются и исследовательским приёмом для объяснения процесса, и упрощённой схемой, помогающей ориентироваться в его организации и управлении. [1, с. 126–127]\n\nМодель не равна самой реальности. Она всегда выделяет одни элементы и упрощает другие. Поэтому вопрос «какая модель верна?» обычно поставлен неточно. Корректнее спросить: какие элементы и связи она помогает увидеть? Линейная модель удобна для анализа передачи сообщения; интерактивная и трансакционная — для анализа ответов, взаимной корректировки и изменения ролей участников. [1, с. 126–127; 2, с. 93–142]\n\n## Лассуэлл: структура и направления анализа\n\nФормула Лассуэлла задаёт пять вопросов: кто сообщает, что сообщает, по какому каналу, кому и с каким эффектом. Она описывает состав коммуникационного акта и одновременно задаёт программу исследования: анализ коммуникатора, содержания, средств/каналов, аудитории и результатов. [1, с. 127–131; 2, с. 95–100]\n\nЭта модель особенно полезна, когда нужно разложить медийный или PR-кейс. Но она не должна превращаться в доказательство того, что любое сообщение обязательно вызывает запланированный эффект. «Эффект» — отдельный элемент, который следует проверять, а не автоматически выводить из публикации или охвата. [2, с. 95–100]\n\n## Шеннон—Уивер: как сообщение превращается в сигнал\n\nМодель Шеннона—Уивера возникла в инженерном контексте. В ней различаются источник информации, передатчик, сигнал, канал, приёмник и адресат. Принципиально важно не смешивать источник с передатчиком и получателя с техническим приёмником: человек формулирует смысл, а устройство или система может кодировать/передавать сигнал; на другой стороне технический приёмник преобразует сигнал, а адресат интерпретирует сообщение. [2, с. 100–104]\n\nВ этой модели кодирование — преобразование сообщения в форму, пригодную для передачи по каналу; декодирование — обратное преобразование сигнала в доступное получателю сообщение. Канал — физический посредник передачи. Шум — всё, что искажает, затрудняет или делает менее точной передачу и понимание. [2, с. 100–113]\n\nШеннон и Уивер различали три уровня проблем. На техническом уровне спрашивают, насколько точно переданы символы. На семантическом — насколько эти символы выражают желаемое значение. На уровне эффективности — насколько воспринятое значение воздействует на поведение получателя в направлении, желаемом источником. Уровни связаны, но не совпадают. Хорошая связь не гарантирует совпадения смысла; совпадение смысла не гарантирует действие. [2, с. 100–103]\n\n### Шум: не только плохой интернет\n\nТехнический шум — помехи в физической передаче: обрыв связи, плохой звук, недоступный файл. Семантический шум возникает, когда знаки и слова понимаются неодинаково из-за различий опыта, знания, культурных рамок или стереотипов. На экзамене нельзя сводить шум только к неисправности устройства: если адресат получает текст, но иначе понимает термин, это также проблема коммуникации. [2, с. 111–113]\n\nВ кейсе со стартовой инструкцией отсутствие уведомления — возможная техническая проблема. Разное понимание двусмысленного термина — семантическая. Вопросы сотрудников дают обратную связь: источник получает данные, что первоначальное кодирование или канал не обеспечили достаточного понимания.\n\n## Обратная связь и нелинейность\n\nЛинейная передача полезна как первый слой анализа, но реальное общение часто не останавливается после одного сообщения. Получатель отвечает, уточняет, меняет тему или своим действием показывает результат. В таких случаях роли источника и получателя меняются. Обратная связь делает возможной коррекцию исходного сообщения и проверку его результативности. Василик относит принцип обратной связи к необходимым условиям коммуникационного взаимодействия. [1, с. 23–25]\n\nМодель Ньюкомба вводит треугольник отношений A—B—X: два субъекта соотносятся друг с другом и с объектом/предметом коммуникации. Она помогает объяснять не только передачу сообщения, но и стремление к согласованности ориентаций участников относительно общего объекта. [2, с. 122–128]\n\nНе нужно путать Ньюкомба с Якобсоном. В программе ВИ оба автора названы среди базовых моделей, но логика Ньюкомба — социально-психологические отношения участников и объекта, тогда как модель Якобсона используется для анализа функций языка и элементов речевого акта. При встрече с вопросом ориентируйтесь на слова условия: «код», «канал», «контакт», «контекст», «адресант/адресат» указывают на языковую модель; «A—B—X», ориентации и согласованность — на Ньюкомба. [2, с. 122–128; программа ВИ, с. 7]\n\n## Алгоритм разбора задачи\n\n1. Назовите участников и предмет сообщения.\n2. Отделите сообщение от физического канала.\n3. Укажите кодирование и декодирование, если условие описывает преобразование смысла в сигнал и обратно.\n4. Проверьте, есть ли технический или семантический шум.\n5. Найдите обратную связь и отдельно назовите эффект, если он действительно зафиксирован.\n\nЭто авторский алгоритм, выведенный из структурных моделей в [1, с. 126–162] и [2, с. 93–142].\n\n## Линейная и нелинейная логика процесса\n\nЛинейная модель полезна, когда коммуникацию нужно представить как направленное движение сообщения от источника к получателю. В ней легко увидеть этапы: формирование содержания, кодирование, передача по каналу, приём, декодирование и возможный эффект. Такая схема особенно уместна для инструкций, рассылок, рекламы, медиатрансляции и технических систем связи. [1, с. 126–132; 2, с. 93–113]\n\nНо линейная схема не означает, что реальное общение всегда происходит в одну сторону. Получатель может отвечать, уточнять, игнорировать, переинтерпретировать, передавать сообщение дальше и тем самым менять ситуацию. Нелинейные/интерактивные модели добавляют обратную связь и показывают, что роли отправителя и получателя могут меняться. Программа ВИ называет модель Осгуда—Шрамма среди нелинейных: в ней важны интерпретация и обратная связь. [Программа ВИ, с. 7]\n\nПрактическая ошибка — считать, что обратная связь появляется только после завершения всего процесса. В устном разговоре она присутствует постоянно: взгляд, уточняющий вопрос, пауза, повтор, смена интонации позволяют корректировать сообщение прямо по ходу взаимодействия. В письменной массовой коммуникации обратная связь может быть отложенной: комментарии, письма, статистика использования, реакции аудитории поступают позже. Это авторское применение общего принципа обратной связи. [1, с. 23–25; 1, с. 126–162]\n\n## Элементы процесса: что именно не следует смешивать\n\n**Источник** инициирует сообщение или выступает субъектом коммуникации. **Коммуникатор** может быть тем, кто непосредственно передаёт сообщение от имени другого источника. **Сообщение** — осмысленная и закодированная информация. **Канал** — физический посредник перемещения сообщения. **Получатель/реципиент** принимает и интерпретирует его. **Эффект** — изменение, которое возникает в сознании или поведении в связи с коммуникацией. [2, с. 95–100]\n\nВ технической модели добавляются **передатчик** и **приёмник**. Передатчик преобразует исходное сообщение в сигнал, пригодный для канала; приёмник восстанавливает сигнал на другой стороне. Нельзя автоматически отождествлять их с людьми: в телефонном разговоре участник может быть источником, а устройство — передатчиком/приёмником. [2, с. 100–104]\n\nЭта детализация нужна для ответов, где варианты специально смешивают роли. Например, если пресс-служба подготовила текст, а платформа доставила push-уведомление, платформа — канал/технический посредник, а не источник смысла. Если пользователь прочитал текст, но не изменил своё мнение, факт получения не равен эффекту.\n\n## Шум и избыточность\n\nШум — не только неисправность техники. Технический шум связан с искажением или потерей сигнала: помехи, плохой звук, отсутствие соединения, недоступность файла. Семантический шум связан с различием кодов, опыта, значений слов и ожиданий. Социально-психологические барьеры могут быть связаны с недоверием к источнику, стереотипами, предшествующим конфликтом и селективным восприятием. Гавра подробно разбирает типы шумов как факторы, снижающие результативность коммуникации. [2, с. 100–113]\n\nИзбыточность — повторяющиеся или предсказуемые элементы сообщения, которые могут помогать преодолеть шум. Повтор ключевой инструкции разными способами, понятная структура, примеры и дублирование критичных сведений в нескольких каналах иногда повышают вероятность понимания. Но избыток не всегда полезен: слишком длинное сообщение может перегрузить внимание. Нужно соотносить его с аудиторией и задачей. [2, с. 111–113]\n\n## Ньюкомб и Якобсон: модели для разных вопросов\n\nМодель Ньюкомба A—B—X показывает отношения двух субъектов A и B к общему объекту X. Её ценность в том, что она вводит не только передачу сообщения, но и социально-психологическое стремление к согласованности ориентаций. Если A и B по-разному относятся к X, коммуникация может быть способом сохранить, изменить или уточнить их отношения. [2, с. 122–128]\n\nМодель Якобсона чаще используется для анализа речевого акта. В ней соотносятся адресант, адресат, сообщение, контекст, код и контакт. Разные элементы связываются с разными функциями языка. Для экзамена важно не обязательно воспроизводить полный перечень функций, а распознавать, когда условие спрашивает о коде, контакте, контексте или адресате как об элементах речевой коммуникации. [Программа ВИ, с. 7; 1, с. 163–180]\n\n## Кейс: разбор без смешения моделей\n\nРедакция публикует инструкцию об изменении расписания. В модели Лассуэлла редакция — источник/коммуникатор, инструкция — сообщение, сайт и рассылка — каналы, студенты — аудитория, успешный приход по новому времени — возможный эффект. В модели Шеннона—Уивера нужно дополнительно назвать кодирование текста в цифровой сигнал, технический приём на устройстве и шумы. В модели Ньюкомба можно анализировать отношения студентов и администрации к объекту X — новому расписанию. Один кейс допускает несколько моделей, потому что каждая выделяет другой аспект.\n\n## Модель как исследовательский инструмент\n\nКоммуникационная модель не воспроизводит действительность целиком. Она намеренно выделяет несколько элементов, чтобы ответить на определённый вопрос: как передаётся сигнал, как устроен обмен ролями, как связаны сообщение и эффект, как удерживается равновесие отношений. Поэтому одна и та же ситуация может быть корректно описана несколькими моделями, если исследователь не смешивает их понятийный аппарат. [1, с. 95–142]\n\nНапример, преподаватель публикует задание на платформе, студент читает его и задаёт уточняющий вопрос. В линейной модели можно выделить источник, сообщение, канал и получателя. В кибернетической логике важна обратная связь: вопрос показывает, что первоначальное сообщение оказалось недостаточно определённым. В интеракционной логике внимание переносится на чередование ролей: студент не только получатель, но и источник нового сообщения. Такая смена ракурса — не противоречие, а причина, по которой в теории существует несколько моделей. [1, с. 95–142]\n\n### Код, сообщение и канал\n\nКод — система знаков и правил их сочетания, с помощью которых формируется сообщение. Сообщение — то, что передаётся в конкретном акте: текст, речь, изображение, сигнал. Канал — материальная или техническая среда, по которой сообщение движется. Если аудиозапись не воспроизводится, это проблема канала; если текст наполнен неизвестными сокращениями, проблема может быть в коде; если формулировка допускает несколько смыслов, затруднение относится к содержанию и интерпретации. [1, с. 100–142]\n\nНа тесте полезно искать, что именно описано в условии. «Плохая связь исказила звук» — шум или сбой передачи; «участники по-разному поняли термин» — различие кода/интерпретации; «ответа не последовало» — дефицит обратной связи. В реальности эти проблемы могут сочетаться, но вопрос обычно проверяет доминирующий элемент.\n\n## Контекст и эффект\n\nКоммуникация не происходит в пустоте. На интерпретацию сообщения влияют отношения участников, ситуация, предшествующий опыт, язык, культурные нормы, временные ограничения и ожидания от канала. Одно и то же выражение в официальном письме, дружеском чате и публичном выступлении выполняет разные функции. Поэтому модель даёт схему, но анализ должен возвращать её в конкретный контекст. [1, с. 29–82; 2, с. 126–162]\n\nЭффект также не следует понимать как автоматическое подчинение получателя. В модели Лассуэлла вопрос «с каким эффектом?» задаёт направление анализа результата, но сам результат может быть когнитивным, эмоциональным, поведенческим, краткосрочным или отсроченным; он зависит не только от сообщения. Для экзамена достаточно различать элемент модели и эмпирическое доказательство эффекта: наличие послания ещё не доказывает изменение поведения. [1, с. 95–100]\n\n## Тренажёр: выбрать модель по вопросу\n\nЕсли вопрос звучит «через какую среду передаётся сообщение?» — ищите канал. «Какая помеха исказила сигнал?» — используйте логику Шеннона—Уивера. «Какая ориентация связывает участников и объект обсуждения?» — вспомните Ньюкомба. «Какая функция речи реализуется?» — обращайтесь к Якобсону. Сначала прочитайте вопрос, затем выберите модель; не начинайте с запоминания фамилии.\n\n## Задания\n\n1. Возьмите голосовое сообщение с плохой связью. Назовите источник, передатчик, канал, приёмник, адресата и технический шум.\n2. Придумайте фразу, которую две профессиональные группы поймут по-разному. Объясните, почему это семантический шум.\n3. Разберите обсуждение новости по A—B—X: кто такие A и B, что может быть X, как обратная связь меняет процесс?\n\n## Экзаменационные мини-задачи\n\n1. В сообщении возникла техническая помеха, а затем получатель задал уточняющий вопрос. Назовите элементы процесса и объясните роль обратной связи.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nВозьмите один пост в социальной сети и разметьте: источник, кодирование, сообщение, канал, получателя, шум и обратную связь.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 21–30\n\n1. **[Один ответ]** Какая модель включает вопросы «кто — что — канал — кому — эффект»?  \n1) Лассуэлла 2) Ньюкомба 3) Мановича 4) Тертычного  \n**Ответ:** 1. [2, с. 95–100]\n\n2. **[Несколько ответов]** Что различают Шеннон и Уивер?  \n1) технический уровень 2) семантический уровень 3) уровень эффективности 4) жанровый уровень  \n**Ответ:** 1, 2, 3. [2, с. 100–103]\n\n3. **[Один ответ]** Преобразование смысла в пригодный для передачи сигнал — это:  \n1) кодирование 2) эффект 3) обратная связь 4) аудитория  \n**Ответ:** 1. [2, с. 100–104]\n\n4. **[Один ответ]** Плохой звук при разговоре — пример прежде всего:  \n1) технического шума 2) жанра 3) эффекта 4) аудитории  \n**Ответ:** 1. [2, с. 111–113]\n\n5. **[Один ответ]** Разное понимание термина участниками — пример:  \n1) семантического шума 2) только канала 3) модульности 4) жанра  \n**Ответ:** 1. [2, с. 111–113]\n\n6. **[Несколько ответов]** Что проверяет вопрос Лассуэлла «с каким эффектом?»  \n1) результат воздействия 2) эффективность 3) только название канала 4) изменения у получателя  \n**Ответ:** 1, 2, 4. [1, с. 129–132; 2, с. 95–100]\n\n7. **[Один ответ]** Обратная связь нужна, чтобы:  \n1) корректировать взаимодействие и проверять результативность 2) отменить получателя 3) заменить сообщение 4) сделать коммуникацию только линейной  \n**Ответ:** 1. [1, с. 23–25]\n\n8. **[Один ответ]** Модель Ньюкомба описывает:  \n1) отношения A, B и общего объекта X 2) пять принципов новых медиа 3) жанры печати 4) рекламный бюджет  \n**Ответ:** 1. [2, с. 122–128]\n\n9. **[Несколько ответов]** Что может быть элементом коммуникационного процесса?  \n1) источник 2) сообщение 3) канал 4) получатель  \n**Ответ:** 1, 2, 3, 4. [1, с. 126–132]\n\n10. **[Один ответ]** Почему модель не равна реальному процессу?  \n1) она упрощённо выделяет существенные элементы и связи 2) она не относится к исследованию 3) она содержит только ошибки 4) она всегда описывает жанр  \n**Ответ:** 1. [1, с. 126–127]\n\n## Источники дня\n\n1. Василик М. А. (ред.). *Основы теории коммуникации*. М.: Гардарики, 2003. Гл. 3, с. 126–162; гл. 1, с. 23–25.\n2. Гавра Д. П. *Основы теории коммуникации*. СПб.: Питер, 2011. Разд. 4, с. 93–142.\n","04":"# День 4. Критическая теория, культурная индустрия и активная аудитория\n\n**Результат дня.** Вы отличаете исследование прямого эффекта сообщения от критического анализа производства и потребления культуры, а также понимаете, почему аудитория не сводится к пассивному получателю.\n\n**Карточки дня:** № 31–40 из банка 130.\n\n## Критическая теория меняет вопрос исследования\n\nЭмпирико-функциональные исследования прежде всего спрашивали о воздействии массового сообщения на индивида или аудиторию. Критическая теория, сложившаяся в 1930-е годы вокруг Франкфуртской школы, сдвигает фокус: ей важны социально-экономические отношения, в которые включены производство, распространение и потребление массовой культуры. Индивид рассматривается не изолированно, а как участник общественных отношений; поэтому объяснение не ограничивается содержанием одного текста или измерением одного эффекта. [1, с. 273–275]\n\nКритическая направленность не означает, что любой массовый продукт автоматически объявляется «плохим». Она требует задавать вопросы о власти, идеологии, коммерческой организации производства, стандартизации и условиях потребления. В учебнике Кирии и Новиковой критическая теория описана как изучение того, как массовая коммуникация и культура участвуют в воспроизводстве доминирующих идеологий и социальных отношений. [1, с. 273–284]\n\n### Чем критическая теория отличается от теории сильных эффектов\n\nОба направления могут говорить о влиянии медиа, но делают это на разных уровнях. Теория сильных эффектов ищет связь между отдельным сообщением и изменением получателя: сообщение выступает стимулом, а исследователь пытается зарегистрировать реакцию. Критическая теория спрашивает, каким образом сама система производства и распределения культуры задаёт поле возможных смыслов, норм и потребностей. Поэтому объектом анализа становится не только зритель, увидевший конкретный фильм, но и индустрия, которая регулярно производит, финансирует, тиражирует и продвигает определённые формы контента. [1, с. 257–265; 1, с. 273–284]\n\nЭто различие помогает решить типичный тестовый кейс. Вопрос «изменилось ли отношение зрителя после ролика?» ближе к исследованию эффекта. Вопрос «как платформа, рекламная модель и организация медиапроизводства формируют привычные способы потребления?» ближе к критической теории. Оба вопроса могут относиться к одному и тому же продукту, но требуют разных понятий и данных.\n\nКритический анализ не сводится к морализаторству. Он требует показать связь между культурным продуктом, условиями его производства, экономическими интересами, системой распространения и практиками аудитории. Если в ответе есть только фраза «контент манипулирует», но не объяснено через какие институты, формы производства и отношения это происходит, ответ остаётся слишком общим.\n\n## Культурная индустрия: не просто «культура в медиа»\n\nПонятие культурной индустрии связывают с Адорно и Хоркхаймером. Оно позволяет увидеть превращение культурного производства в индустриально организованный процесс. Важны не только произведение, его сюжет или художественный приём, но и способ тиражирования, распределения, финансирования, маркетинга и организации потребления. Книга, кино, звукозапись, телевидение, а в современном поле и цифровой контент могут быть включены в медиакультурные индустрии, но понятия культурной и медиаиндустрии не являются полностью тождественными. [1, с. 273–275; 1, с. 23–25]\n\nВ экзаменационном кейсе применяйте различение. Вопрос «какие персонажи показаны в сериале?» относится к содержанию. Вопрос «какие платформы финансируют, продвигают и рекомендуют сериал, какие модели потребления он создаёт?» ближе к критической теории и политэкономическому анализу медиа. Нельзя ответить на второй вопрос только пересказом сюжета.\n\n### Производство, распространение и потребление как единая цепочка\n\nКультурный продукт не попадает к аудитории напрямую из замысла автора. Между ними находятся редакционные, технологические, финансовые и маркетинговые решения. Они влияют на то, какие проекты получают ресурсы, в каких форматах выпускаются, как становятся видимыми и какими способами измеряется их успех. Критическая теория предлагает не считать эти этапы нейтральным фоном. Они составляют часть медиакультуры и участвуют в формировании того, что кажется аудитории привычным или естественным. [1, с. 273–284]\n\nПри этом не нужно утверждать, что производитель полностью контролирует смысл. Дальнейшие культурологические исследования показали, что аудитория участвует в интерпретации. Корректная связка такова: индустрия создаёт условия производства и циркуляции; сообщение кодируется в определённой рамке; аудитории декодируют его в своих социальных контекстах. Эту связку нельзя превратить ни в тезис о полной свободе аудитории, ни в тезис о её полной пассивности. [1, с. 273–284; 1, с. 350–360]\n\n## От кодирования к декодированию\n\nКультурологические исследования показали, что сообщение не имеет гарантированно одного результата у всех адресатов. В модели Стюарта Холла медиатизированная коммуникация включает производство, распространение и различные способы декодирования. Аудитория может принять доминирующий смысл, согласиться с ним с оговорками либо противопоставить ему альтернативное чтение. В учебнике Кирии и Новиковой эти позиции описываются как доминирующее, оппозиционное и промежуточное/согласованное декодирование. [1, с. 350–360]\n\nЗдесь «код» не следует понимать как простой технический язык передачи. Холл связывает его с культурой: социальное положение, опыт, ценности, принадлежность к группам и доступные аудитории дискурсы влияют на интерпретацию. Поэтому технически безошибочно доставленное сообщение не гарантирует единства смысла. Это связывает культурологический анализ с семиотическим, но не сводит его к описанию отдельного знака. [1, с. 350–360]\n\n### Три способа прочтения\n\n**Доминирующее чтение** возникает, когда аудитория принимает предлагаемый сообщением смысл и рамку его оценки. **Согласованное чтение** сочетает принятие общей рамки с личными оговорками: человек может поддержать идею в целом, но не согласиться с её применением к собственной ситуации. **Оппозиционное чтение** предполагает, что адресат понимает предлагаемый смысл, но интерпретирует его из альтернативной позиции и отвергает заданную рамку. Это не психологические «типы людей» и не оценка правильности; это способы описать отношения между закодированным сообщением и его прочтением. [1, с. 350–360]\n\nНапример, рекламный ролик утверждает, что цифровой сервис делает жизнь «свободнее». Доминирующее чтение примет это как обещание удобства. Согласованное может признать удобство, но указать на цену или зависимость от сети. Оппозиционное увидит в том же ролике способ нормализации контроля или навязывания потребительской практики. Это авторский кейс; категории интерпретации опираются на [1, с. 350–360].\n\nНе путайте декодирование у Холла с техническим декодированием у Шеннона—Уивера. В инженерной модели декодирование описывает восстановление сообщения из сигнала. У Холла важен социально-культурный процесс интерпретации. Сообщение может быть технически принято без ошибок, но культурно прочитано неодинаково.\n\n## Активная аудитория\n\nТеории активного потребителя развивают важный вопрос: не только «что медиа делают с людьми?», но и «что люди делают с медиа?». Аудитория выбирает, использует, обсуждает и присваивает медиаинформацию в конкретных социальных контекстах. Это не означает, что влияние медиа исчезает; это означает, что модель пассивной и однородной массы недостаточна для объяснения реального медиапотребления. [1, с. 350–360]\n\nРазличайте активность аудитории и производство контента. Пользователь может активно искать, интерпретировать, обсуждать и распространять чужой материал, даже если он не создаёт исходный медиапродукт. В цифровой среде граница между производителем и потребителем часто становится более подвижной, но это не даёт оснований считать каждого пользователя профессиональным журналистом или редакцией.\n\n### Активность не равна абсолютной автономии\n\nАктивная аудитория не находится вне институтов, платформ и алгоритмов. У человека есть цели, привычки, социальные связи и опыт, но он выбирает из того репертуара материалов, который существует и становится доступным. Поэтому активность описывает участие в выборе и использовании медиа, а не полную независимость от медиасреды. [1, с. 350–360]\n\nЭтот тезис особенно важен для вопросов с крайними вариантами ответа. Неверно: «активная аудитория означает, что медиа больше не влияют». Неверно и обратное: «аудитория всегда пассивно принимает смысл». Корректнее: аудитории могут интерпретировать, использовать и обсуждать медиасообщения по-разному; исследование должно учитывать социальный контекст и конкретные практики потребления. [1, с. 350–360]\n\n### Как построить ответ по теме\n\nЕсли в вопросе соединены критическая теория, культурная индустрия и активная аудитория, стройте ответ в три шага. Сначала назовите системный уровень: производство и организация потребления культуры. Затем покажите, что сообщение кодируется в определённой рамке. Наконец, объясните, что аудитория не обязательно принимает эту рамку одинаково, поскольку возможны разные декодирования и практики использования. Такая логика связывает теории без ложного противопоставления. [1, с. 273–284; 1, с. 350–360]\n\n## Как применять критический анализ к цифровой платформе\n\nДля тренировки возьмите видеоплатформу. На первом уровне она предоставляет технический канал: загружает и воспроизводит ролики. На втором — организует циркуляцию контента через правила видимости, рекламные модели, рекомендации, способы монетизации и интерфейс. На третьем — становится пространством практик пользователей: они выбирают, комментируют, создают сообщества, спорят о смыслах, поддерживают или отвергают предложенные рамки. Критическая теория особенно полезна на втором уровне, а исследования аудитории — на третьем. Это авторская схема применения, основанная на различении системного производства культуры и активного потребления. [1, с. 273–284; 1, с. 350–360]\n\nНе делайте скачок от наличия алгоритма к утверждению о неизбежной манипуляции. Чтобы сформулировать научный вывод, нужно показать, какие именно механизмы распространения действуют, какие интересы они обслуживают, как аудитории получают доступ к контенту и есть ли наблюдаемые практики принятия/сопротивления. Иначе вместо анализа получится неподтверждённая оценка.\n\n### Вопросы, которые помогают не ошибиться\n\n1. Кто производит и финансирует материал?\n2. Через какие институты и технические системы он распространяется?\n3. Какие нормы, ценности и представления о «нормальном» в нём закреплены?\n4. Кто является предполагаемой аудиторией и какие у неё могут быть ресурсы для интерпретации?\n5. Какие варианты чтения возможны и какие данные нужны, чтобы не угадать их, а исследовать?\n\nЭто не перечень, который нужно механически вставлять в любой ответ. Он нужен для того, чтобы удерживать связь между производством, текстом и аудиторией. Критическая теория проигрывает в качестве, если рассматривает только источник; теория активной аудитории — если игнорирует структуры, через которые сообщения становятся доступными.\n\n### Сопоставление трёх подходов на одном материале\n\nПредставьте телевизионный сюжет о городской реформе. Эмпирико-функциональный анализ может проверить, запомнила ли аудитория ключевые факты и изменилось ли отношение к реформе. Семиотический анализ рассмотрит используемые знаки, образы, противопоставления и способы обозначения участников. Критический анализ спросит, как сюжет включён в систему производства новостей, какие отношения власти он нормализует и какие условия делают определённые позиции более видимыми. Исследование аудитории выяснит, как разные группы зрителей декодируют материал. Разные подходы не обязаны конкурировать; они отвечают на разные вопросы. Основания для такого различения содержатся в [1, с. 257–265; 1, с. 273–284; 1, с. 350–360].\n\n### Самопроверка\n\nЗакройте текст и объясните в трёх предложениях: почему «культурная индустрия» — не просто перечень фильмов и книг; почему декодирование не равно техническому приёму сигнала; почему активная аудитория не означает отсутствия влияния медиа. Если хотя бы один ответ получается крайним («всё определяет индустрия» или «всё определяет пользователь»), вернитесь к разделам о цепочке производства и об активности аудитории.\n\n## Задания\n\n1. Выберите сериал или музыкальный сервис. Разделите анализ на содержание, условия производства, распространение и практики потребления.\n2. Сформулируйте одно медиасообщение и три его возможных прочтения: доминирующее, согласованное и оппозиционное.\n3. Объясните, почему большое число просмотров не доказывает одинаковую интерпретацию всеми зрителями.\n\n## Экзаменационные мини-задачи\n\n1. Платформа рекомендует стандартизированный контент и формирует привычки потребления. Какую исследовательскую рамку выбрать: эффект отдельного сообщения или критическую теорию? Обоснуйте.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nСоставьте по три признака доминирующего, согласованного и оппозиционного чтения одного и того же медиасообщения.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 31–40\n\n1. **[Один ответ]** Франкфуртская школа связана прежде всего с: 1) критической теорией 2) математической теорией связи 3) жанроведением 4) проксемикой.  \n**Ответ:** 1. [1, с. 273–284]\n\n2. **[Один ответ]** Критическая теория анализирует: 1) только число просмотров 2) социальные отношения производства и потребления культуры 3) только орфографию 4) только скорость канала.  \n**Ответ:** 2. [1, с. 273–275]\n\n3. **[Несколько ответов]** Что важно для анализа культурной индустрии? 1) производство 2) организация потребления 3) распространение 4) только сюжет.  \n**Ответ:** 1, 2, 3. [1, с. 273–275]\n\n4. **[Один ответ]** Доминирующее декодирование — это: 1) принятие смысла с позиции, заложенной в сообщении 2) техническая помеха 3) отсутствие аудитории 4) жанр заметки.  \n**Ответ:** 1. [1, с. 350–360]\n\n5. **[Один ответ]** Оппозиционное декодирование означает: 1) принятие сообщения без оговорок 2) понимание и альтернативное, противоположное прочтение 3) отсутствие кода 4) выбор канала.  \n**Ответ:** 2. [1, с. 350–360]\n\n6. **[Один ответ]** В модели Холла код связан прежде всего с: 1) культурой и социальным контекстом 2) только двоичным сигналом 3) стоимостью рекламы 4) жанром интервью.  \n**Ответ:** 1. [1, с. 350–360]\n\n7. **[Несколько ответов]** Активная аудитория может: 1) выбирать контент 2) интерпретировать его 3) обсуждать и распространять 4) только пассивно получать.  \n**Ответ:** 1, 2, 3. [1, с. 350–360]\n\n8. **[Один ответ]** Теории активного потребителя прежде всего ставят вопрос: 1) что люди делают с медиа 2) как отключить шум 3) что такое жанр 4) кто создал телеграф.  \n**Ответ:** 1. [1, с. 350–360]\n\n9. **[Один ответ]** Что не доказывает одинакового понимания всеми зрителями? 1) техническая доставка сообщения 2) разные прочтения 3) культурный контекст 4) обсуждение.  \n**Ответ:** 1. [1, с. 350–360]\n\n10. **[Один ответ]** Почему просмотры не равны эффекту? 1) контакт не показывает интерпретацию и изменение поведения 2) просмотров не существует 3) контент не передаётся по каналам 4) аудитория всегда одинакова.  \n**Ответ:** 1. [1, с. 260–262; 1, с. 350–360]\n\n## Источник дня\n\n1. Кирия И. В., Новикова А. А. *История и теория медиа*. 2-е изд. М.: Изд. дом ВШЭ, 2018. Гл. 10, с. 273–284; гл. 15, с. 350–360.\n","05":"# День 5. Медиаэкология, сетевое общество и медиасистема\n\n**Результат дня.** Вы объясняете медиа не как отдельный канал, а как среду, институт и систему связей с технологиями, экономикой, политикой и аудиторией.\n\n**Карточки дня:** № 41–50 из банка 130.\n\n## Медиа как среда\n\nМедиаэкология изучает не единичное воздействие отдельного сообщения, а роль медиа в системе общественных институтов и в организации повседневной среды. Такой подход спрашивает, как преобладающие средства коммуникации меняют способы координации, хранения знания, распределения внимания, власти и социального времени. [1, с. 320–324]\n\nУ Гарольда Инниса важна связь носителя коммуникации с пространственно-временной организацией общества. Одни носители лучше сохраняют сообщения во времени, другие легче распространяют их в пространстве; это связано с формами управления и институциональной организации. На экзамене не следует сводить Инниса к лозунгу о «старых медиа»: его вопрос — о социальных последствиях материальных форм коммуникации. [1, с. 320–324]\n\n### Почему носитель важен для общества\n\nНоситель коммуникации задаёт не только скорость передачи. Он влияет на то, как долго сообщение может храниться, кто имеет доступ к его созданию и воспроизведению, как далеко оно распространяется и какие формы координации становятся возможными. Именно поэтому медиаэкология рассматривает технологии не отдельно от общества, а вместе с институтами, властью, экономикой и повседневными практиками. [1, с. 320–324]\n\nСравнение удобно проводить не по шкале «старое — новое», а по функциям. Печатная книга может поддерживать длительное хранение и последовательное чтение; мессенджер — быстрый обмен и множественные ответные реплики; видеоплатформа — массовое распространение, архивирование и алгоритмическое упорядочивание видимости. Каждый пример меняет соотношение времени, пространства, адресации и обратной связи. Это авторское упражнение, построенное на вопросах медиаэкологии. [1, с. 320–324]\n\nНе утверждайте, что технология сама по себе автоматически создаёт одинаковые социальные последствия. Один носитель в разных институциональных, правовых и культурных условиях может использоваться по-разному. Медиатеория изучает связь технологических возможностей с социальными организациями, а не механический технологический детерминизм. [1, с. 320–324; 3, с. 63–84]\n\n## Сетевое общество\n\nМануэль Кастельс описывает информациональное и сетевое общество как форму, в которой сети становятся ключевым принципом организации многих социальных процессов. Сеть не равна интернету как устройству: речь о конфигурации отношений, потоков и связей, поддерживаемых информационно-коммуникационными технологиями. [1, с. 333–338; 2, с. 234–253]\n\nПоэтому фраза «сетевое общество — это все пользователи социальных сетей» неточна. Она смешивает конкретную платформу с более широким теоретическим понятием. Вопрос Кастельса касается преобразования способов производства, коммуникации, власти и социального взаимодействия в условиях сетевой логики. [1, с. 333–338]\n\n### Сеть как форма отношений\n\nСетевой подход позволяет увидеть, что участники, ресурсы и сообщения связаны не только иерархически. Узлы могут быть людьми, организациями, инфраструктурами или группами; связи между ними могут усиливаться, ослабевать, становиться видимыми или скрытыми. Это не отменяет иерархий и центров влияния: сеть не означает автоматически равенство всех узлов. Скорее она меняет способы, которыми координируются потоки информации, доступа и власти. [1, с. 333–338; 2, с. 234–253]\n\nВ экзаменационном кейсе «сетевое общество» уместно, если речь идёт о распределённых взаимодействиях, потоках, самоорганизации, связи технологий и социальных структур. Если условие описывает только публикацию сообщения на сайте, термин может быть слишком широким. Тогда лучше выбрать модель коммуникационного процесса или понятие канала.\n\n### От модели канала к модели среды\n\nВ линейных моделях канал — посредник перемещения сообщения. В медиаэкологической перспективе среда шире: она включает устойчивые формы пользования, правила, инфраструктуру, экономику, ожидания аудитории и доступные жанры. Поэтому ответ «интернет — канал» может быть частично верным в узком процессном смысле, но недостаточным для вопроса о социальной среде. [1, с. 320–324; 2, с. 98–100]\n\nПолезно держать два уровня описания одновременно. Когда вы разбираете конкретный пост, платформа может выступать каналом. Когда вы исследуете, как совокупность платформ и практик меняет производство новостей, работу журналистов и участие аудитории, она выступает элементом медиасреды и медиасистемы.\n\n## Медиасистема и российский дискурс\n\nВартанова рассматривает теорию медиа как междисциплинарную область, где медиа связаны с общественными трансформациями, технологиями, экономикой, политикой, журналистикой и аудиторией. Понятие медиасистемы не даёт готовой «схемы всех СМИ», а помогает исследовать устойчивые связи между этими компонентами. [3, с. 9–84; 3, с. 85–92]\n\nОбратная связь делает заметным участие аудитории: она показывает реакцию, запросы, интерпретации и формы взаимодействия с медиа. В цифровом поле обратная связь может быть быстрой и видимой, но её наличие само по себе не означает равного влияния всех участников на медиапроизводство. [3, с. 149–159]\n\n## Медиасистема: как связать медиа с обществом\n\nМедиасистема — исследовательская рамка для описания устойчивых связей медиа с обществом. В неё нельзя включить «всё вообще», иначе понятие потеряет объяснительную силу. В конкретном анализе нужно назвать, какие элементы значимы: медиаорганизации, аудитории, технологическая инфраструктура, рынки, государственное регулирование, профессиональные нормы, культурные практики. Вартанова показывает, что теоретическое изучение медиа требует междисциплинарности именно потому, что эти элементы не существуют независимо друг от друга. [3, с. 9–84; 3, с. 85–92]\n\nПример авторской схемы. Вокруг важного городского события действуют редакции, паблики, чиновники, рекламодатели, очевидцы и пользователи. Редакции производят материалы; платформы распределяют их; аудитории комментируют и пересылают; реакции влияют на следующие публикации; правовые и экономические условия задают границы этого процесса. Такая схема не утверждает, что все элементы равны, но помогает увидеть обратные связи.\n\n### Обратная связь: реакция, а не гарантия диалога\n\nЛайк, комментарий, жалоба, письмо в редакцию, переход по ссылке и изменение подписки могут быть сигналами обратной связи. Однако их смысл различен. Число лайков показывает только один тип действия; комментарий может быть поддержкой, критикой, шуткой или не относиться к теме; письмо может содержать более развёрнутую аргументацию. Поэтому анализ обратной связи требует интерпретации, а не одного показателя. [3, с. 149–159]\n\nНельзя также считать, что обратная связь автоматически меняет редакционное решение. Для этого нужно исследовать, какие механизмы обработки реакции существуют у организации, какие аудитории признаются значимыми и как соотносятся общественные, экономические и профессиональные критерии. Это авторское уточнение, следующее из системного подхода к медиа.\n\n## Задание на синтез\n\nВыберите одну медиаплатформу и заполните шесть полей: носитель/инфраструктура; типы сообщений; ключевые акторы; способы распространения; формы обратной связи; социальные последствия, которые можно исследовать. Затем объясните, в каких двух полях вы используете процессную модель, а в каких — медиасистемный или медиаэкологический подход.\n\n## Сравнительный анализ медиа как среды\n\nЧтобы использовать медиаэкологический подход, сравнивайте не «хорошее» и «плохое» медиа, а коммуникативные условия, которые они создают. Спросите: каков темп обновления; возможно ли хранение и поиск; кто может быть автором; как устроена адресация; как видна аудитория; что считается обратной связью; как финансируется производство; какие навыки требуются участникам. Эти вопросы помогают перейти от описания устройства к анализу среды. [1, с. 320–324; 3, с. 63–84]\n\nНапример, печатная газета и новостное приложение могут публиковать один материал, но различаться по ритму обновления, персонализации, способам измерения реакции и видимости пользовательских действий. Это не делает одно медиа автоматически «лучше»: разные свойства могут быть преимуществами или ограничениями в зависимости от задачи — срочность, глубина анализа, архивирование, локальная связность, массовый охват.\n\n### Власть, доступ и инфраструктура\n\nМедиаэкологический анализ включает вопрос о доступе: кто владеет инфраструктурой, кто может публиковать, какие технические и правовые барьеры существуют, кому доступны навыки создания/поиска информации. Носитель не существует без инфраструктуры — сетей, устройств, электричества, программ, правил доступа, организаций, которые поддерживают работу системы. Связь носителя и власти у Инниса показывает, почему техническую форму нельзя рассматривать как нейтральный контейнер. [1, с. 320–324]\n\nВ сетевом обществе доступ также не сводится к наличию подключения. Значимы положение в сети, ресурсы для производства и распространения информации, способность находить и проверять сведения, участие в институциональных связях. Это авторское уточнение, согласованное с идеей сетевой организации у Кастельса. [1, с. 333–338]\n\n## Российский дискурс теории медиа\n\nВартанова показывает, что отечественная теория медиа формируется вокруг междисциплинарного анализа медиасистемы, журналистики, аудиторий, технологий и общественных трансформаций. В таком подходе журналистика — важная часть медиаполя, но не единственный объект: теория медиа шире профессионального описания редакционной работы. [3, с. 9–84; 3, с. 160–170]\n\nДля вступительного экзамена полезно избегать противопоставления «медиа или журналистика». В исторической отечественной традиции многие вопросы изучались через понятие журналистики; современный медиаподход расширяет рамку, связывая журналистские практики с платформами, аудиториями, экономикой и другими институтами. [3, с. 85–180]\n\n## Самопроверка\n\nВыберите одну привычную платформу и опишите её сначала как канал для одного сообщения, а затем как часть медиасистемы. Во втором описании должны появиться не менее пяти элементов: инфраструктура, организация/авторы, аудитории, правила/экономика, обратная связь. Если вы повторяете только название приложения, вернитесь к понятию среды.\n\n## Задания\n\n1. Сравните печатную газету и мессенджер по времени распространения, пространству аудитории и обратной связи.\n2. Нарисуйте медиасистему вокруг одного события: медиа, аудитория, платформы, экономика, политика. Укажите две обратные связи.\n\n## Экзаменационные мини-задачи\n\n1. Сравните бумажную книгу и мессенджер по времени хранения, распространению в пространстве и обратной связи. Какие вопросы здесь задаёт медиаэкологический подход?\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nОпишите привычную платформу как часть медиасистемы: инфраструктура, авторы, аудитории, правила, экономика и обратная связь.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 41–50\n\n1. **[Один ответ]** Медиаэкология исследует: 1) медиа как среду и институт 2) только личную переписку 3) только жанр 4) один технический шум. **Ответ:** 1. [1, с. 320–324]\n2. **[Один ответ]** Иннис связывал носители коммуникации с: 1) пространственно-временной организацией общества 2) только рекламой 3) жанром интервью 4) проксемикой. **Ответ:** 1. [1, с. 320–324]\n3. **[Один ответ]** Сетевое общество у Кастельса — это: 1) социальная организация по сетевому принципу 2) только сайт 3) только телевидение 4) вид шума. **Ответ:** 1. [1, с. 333–338]\n4. **[Несколько ответов]** Что входит в изучение медиасистемы? 1) технологии 2) экономика 3) политика 4) аудитория. **Ответ:** 1, 2, 3, 4. [3, с. 9–92]\n5. **[Один ответ]** Обратная связь описывает: 1) взаимодействие медиа и аудитории 2) отсутствие реакции 3) только кодирование 4) жанр. **Ответ:** 1. [3, с. 149–159]\n6. **[Один ответ]** Почему сеть не равна конкретной социальной платформе? 1) сеть — более широкая логика организации отношений 2) платформ не существует 3) это только жанр 4) это вид интервью. **Ответ:** 1. [1, с. 333–338]\n7. **[Несколько ответов]** Медиаэкологический вопрос может касаться: 1) среды коммуникации 2) институтов 3) социальной организации 4) только одного сообщения. **Ответ:** 1, 2, 3. [1, с. 320–324]\n8. **[Один ответ]** Медиасистема — это: 1) связи медиа с другими компонентами общества 2) список смартфонов 3) один канал 4) только аудитория. **Ответ:** 1. [3, с. 85–92]\n9. **[Один ответ]** Быстрая обратная связь в сети доказывает, что: 1) все участники имеют одинаковую власть 2) участие стало видимым, но влияние может различаться 3) медиа исчезли 4) нет аудитории. **Ответ:** 2. [3, с. 149–159]\n10. **[Один ответ]** Какой подход лучше подходит к вопросу о том, как носитель меняет социальное время? 1) медиаэкология 2) теория жанров 3) проксемика 4) только реклама. **Ответ:** 1. [1, с. 320–324]\n\n## Источники дня\n\n1. Кирия И. В., Новикова А. А. *История и теория медиа*. 2018. Гл. 13, с. 320–338.\n2. Гавра Д. П. *Основы теории коммуникации*. 2011. С. 234–253.\n3. Вартанова Е. Л. *Теория медиа: отечественный дискурс*. 2019. С. 9–92, 149–159.\n","06":"# День 6. Новые медиа: принципы Льва Мановича\n\n**Результат дня.** Вы различаете пять принципов новых медиа и не подменяете их общими словами «цифровой» или «интерактивный».\n\n**Карточки дня:** № 51–60 из банка 130.\n\n## Что Манович называет новыми медиа\n\nМанович анализирует новые медиа не только как новые устройства, а как культурные объекты, создаваемые, хранимые и обрабатываемые компьютерными средствами. Его пять принципов — числовое представление, модульность, автоматизация, вариативность и транскодирование — описывают логику цифровых объектов. Эти принципы не обязательно одинаково проявляются в каждом примере, но позволяют отличить цифровую медиаформу от простой оцифрованной копии. [1, с. 52, 61–80]\n\n**Числовое представление** означает, что цифровой объект может быть описан формально и подлежит программной обработке. **Модульность** означает, что он состоит из относительно самостоятельных элементов: текст, изображение, аудио, кнопка, блок страницы могут сочетаться и меняться, сохраняя относительную автономность. [1, с. 61–65]\n\n**Автоматизация** означает передачу части операций программам: от технической обработки до выбора/генерации вариантов. Она не означает, что машина всегда полностью заменяет автора. **Вариативность** связана со множественностью версий одного объекта: пользователь, устройство, алгоритм или контекст могут менять его представление. [1, с. 66–79]\n\n**Транскодирование** — перевод культурных форм в компьютерную логику и одновременное влияние компьютерной логики на культурное содержание. Это не синоним «перевода текста на другой язык» и не простое сохранение файла в новом формате. [1, с. 80–88]\n\n## Почему пять принципов нельзя превращать в список синонимов\n\nПять принципов Мановича описывают разные стороны одного цифрового объекта. **Числовое представление** отвечает на вопрос, почему объект поддаётся вычислению и программной обработке. **Модульность** — как он устроен: из элементов, которые могут сохранять относительную самостоятельность. **Автоматизация** — какие операции могут быть переданы программному процессу. **Вариативность** — почему объект способен существовать в множестве версий. **Транскодирование** — как компьютерная логика меняет культурную форму и её способы осмысления. [1, с. 61–88]\n\nЧастая ошибка — назвать любой цифровой объект «вариативным» только потому, что он существует в интернете. Чтобы говорить о вариативности, нужно увидеть возможность разных версий, конфигураций, маршрутов или представлений. Например, новостная страница может показывать разные блоки на мобильном устройстве и на компьютере; пользователь может получать индивидуальную последовательность материалов; одна база данных способна порождать разные визуальные формы. Это авторские примеры применения принципа вариативности. [1, с. 70–80]\n\nДругая ошибка — считать модульность тем же, что и мультимедийность. Мультимедийный объект объединяет разные виды представления: текст, звук, изображение, видео. Модульность говорит о структуре элементов и их относительной независимости. Один модульный объект может быть только текстовым, а мультимедийный объект может быть устроен более или менее модульно. Поэто
