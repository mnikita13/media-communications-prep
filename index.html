му в тесте ориентируйтесь на формулировку: «из независимых частей» — модульность; «объединяет текст, звук, видео» — мультимедийность как общее свойство цифрового формата, названное в программе ВИ. [1, с. 64–66; программа ВИ, с. 5–6]\n\n## Числовое представление и программируемость\n\nЦифровое медиа может быть представлено данными, с которыми работают вычислительные процедуры. Это делает возможными поиск, копирование, масштабирование, редактирование, сжатие, сортировку и другие операции. Однако числовое представление не означает, что смысл объекта автоматически вычисляется из его кода. Программа может обработать изображение как массив данных, но интерпретация изображения как культурного сообщения требует аудитории, контекста и знаковых систем. [1, с. 61–64]\n\nЭта граница важна для связки с предыдущими днями. Процессно-информационный подход объясняет передачу и преобразование сигналов; семиотический — смысл; теория новых медиа показывает, как культурные объекты оказываются в вычислительной среде. Нельзя подменять один вопрос другим. «Можно ли автоматически изменить размер файла?» — вопрос о цифровой обработке. «Как зритель прочитал образ?» — вопрос интерпретации.\n\n## Модульность и база данных\n\nМодульность позволяет комбинировать элементы без полного разрушения объекта: отдельное изображение, фрагмент текста, звуковой файл или интерфейсный блок могут участвовать в разных композициях. Манович связывает этот принцип с построением новых медиа из дискретных элементов, которые сохраняют независимость на разных масштабах. [1, с. 64–66]\n\nПрактически это помогает понять различие между страницей как фиксированной линейной публикацией и цифровой средой, где материал может собираться из модулей. Но не стоит делать вывод, что любой модульный объект лишён авторской структуры: редактор, дизайнер или алгоритм могут задавать порядок, иерархию и правила сборки.\n\n## Автоматизация: уровни и ограничения\n\nАвтоматизация возникает там, где часть операций создания, обработки или организации медиаматериала выполняется программой. Это может быть техническая обработка, поиск, фильтрация, разметка, генерация вариантов или рекомендации. Манович различает низкоуровневую автоматизацию, связанную с операциями над медиаэлементами, и более сложные формы, связанные с доступом к знаниям и принятием решений. [1, с. 66–70]\n\nВ учебном ответе полезно избегать двух крайностей. Первая: «автоматизация — это полная независимость машины от человека». Вторая: «автоматизация — только кнопка сохранения». Корректнее описывать, какая операция передаётся системе, какие данные и правила используются и где остаётся человеческая постановка цели или контроль результата.\n\n## Вариативность и пользовательский маршрут\n\nВариативность означает, что цифровой объект может существовать в разных версиях, а не только в одной закреплённой форме. Один и тот же материал способен открываться через разные интерфейсы, адаптироваться к устройству, включать разные наборы элементов или строиться по разным траекториям взаимодействия. [1, с. 70–80]\n\nПользовательский выбор — важный, но не единственный источник вариативности. Варианты могут задаваться автором, редакцией, программой, данными профиля, размером экрана или правилами платформы. Это позволяет увидеть, почему цифровая персонализация не обязательно равна свободному выбору пользователя: версия может быть настроена для него без его явного решения. Этот вывод — авторское применение принципа вариативности.\n\n## Транскодирование и связь культуры с компьютером\n\nТранскодирование у Мановича показывает двойное движение. С одной стороны, культурные формы переводятся в компьютерную среду и становятся объектами обработки. С другой — компьютерная логика влияет на способы организации и восприятия культурных материалов: базы данных, интерфейсы, меню, поисковые запросы, фильтры и операции выбора становятся частью культурного опыта. [1, с. 80–88]\n\nПоэтому транскодирование нельзя сводить к технической конвертации формата. Изменение расширения файла — лишь техническая операция; транскодирование в теоретическом смысле касается того, как компьютерные способы представления и обработки начинают формировать саму культурную форму.\n\n## Задание на различение принципов\n\nВозьмите новостное мобильное приложение и назовите по одному примеру для каждого принципа. Затем проверьте себя: объясняете ли вы именно соответствующее свойство или повторяете одно и то же слово другими формулировками? Если пример подходит сразу к нескольким принципам, укажите, какой аспект относится к каждому из них.\n\n## Связь принципов с интерфейсом и базой данных\n\nИнтерфейс — способ, которым пользователь получает доступ к цифровому объекту. Он не является нейтральной «обложкой»: меню, поисковая строка, лента, карточки, фильтры и кнопки предлагают определённые маршруты действия. В логике новых медиа интерфейс связывает данные, программные операции и культурный опыт пользователя. Манович рассматривает новые медиа как объекты, находящиеся на пересечении культурного слоя и компьютерного слоя. [1, с. 80–88]\n\nБаза данных хранит элементы, а интерфейс выбирает и предъявляет их пользователю в определённой последовательности. Поэтому цифровое повествование или новостная лента могут ощущаться как «естественный порядок», хотя этот порядок является результатом правил сортировки, редакционного выбора, пользовательских действий или алгоритмической настройки. Это авторское применение различия между данными, интерфейсом и вариативностью.\n\n### Как не перепутать автоматизацию и алгоритмическую персонализацию\n\nАвтоматизация — более общее понятие: она означает, что программа выполняет часть операций с объектом. Персонализация — один из возможных сценариев, при котором система формирует версию материала или выдачу с учётом данных о пользователе, устройстве или предыдущих действиях. Не всякая автоматизация персонализирована: автоматическое исправление цвета фотографии не учитывает аудиторию. И не всякая персонализация полностью автоматическая: редактор может подготовить несколько версий для разных групп.\n\nЕсли в экзаменационном кейсе говорится о рекомендациях, адаптивной выдаче, разных версиях страницы или индивидуальной траектории, ищите сочетание вариативности и автоматизации. Если акцент на независимых элементах страницы — модульность. Если на вычислимости и коде — числовое представление. Такой разбор не заменяет термины, а связывает их с наблюдаемыми признаками.\n\n## Новые медиа и культурная логика\n\nПять принципов Мановича не нужно превращать в перечень «плюсов цифровой среды». Они описывают структурные возможности, которые могут использоваться по-разному. Вариативность может расширять доступность: например, один материал доступен в текстовой, аудио- и визуальной версиях. Но она может также усложнять проверку того, что именно увидели разные пользователи. Автоматизация может ускорять обработку материалов, но требует понимать, по каким правилам она работает. Транскодирование открывает новые способы творчества, но делает культурные формы зависимыми от интерфейсов и программных процедур.\n\n### Кейс для разбора\n\nНовостная редакция хранит фото, текст, данные и видео в единой системе. По этим данным сайт автоматически собирает карточки для мобильной ленты; редактор выбирает главную тему, а пользователь видит порядок с учётом своих подписок. В кейсе: база материалов и цифровая форма относятся к числовому представлению; самостоятельные текст, фото и видео — к модульности; автоматическая сборка — к автоматизации; разные ленты — к вариативности; влияние базы данных, интерфейса и алгоритма на способ предъявления новости — к транскодированию. Это авторская учебная ситуация на основе [1, с. 61–88].\n\n## Самопроверка\n\nЗакройте текст и объясните различие между модульностью и мультимедийностью, автоматизацией и персонализацией, технической конвертацией файла и транскодированием. Если в ответе остаётся только слово «цифровой», повторите соответствующий раздел.\n\n## Задания\n\n1. Разберите страницу медиасайта на модули.\n2. Предложите две версии одной новости для разных устройств и объясните, где проявляется вариативность.\n3. Назовите пример автоматизации, не называя её полной заменой человека.\n\n## Экзаменационные мини-задачи\n\n1. Укажите три признака нового медиаобъекта в интерактивной инфографике и отделите интерактивность от простой цифровой публикации.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nВозьмите одну публикацию и назовите в ней цифровое представление, модульность, вариативность и возможную автоматизацию.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 51–60\n\n1. **[Один ответ]** Какой принцип означает формальную описываемость и программную обработку объекта? 1) числовое представление 2) проксемика 3) эффект 4) жанр. **Ответ:** 1. [1, с. 61–64]\n2. **[Один ответ]** Относительная самостоятельность элементов объекта — это: 1) модульность 2) шум 3) аудитория 4) пропаганда. **Ответ:** 1. [1, с. 64–66]\n3. **[Один ответ]** Выполнение части операций программой — это: 1) автоматизация 2) декодирование 3) интерпретация 4) репортаж. **Ответ:** 1. [1, с. 66–70]\n4. **[Один ответ]** Множественность версий медиаобъекта — это: 1) вариативность 2) линейность 3) монолог 4) проксемика. **Ответ:** 1. [1, с. 70–80]\n5. **[Один ответ]** Перевод культурных форм в компьютерную логику — это: 1) транскодирование 2) обратная связь 3) эффект 4) очерк. **Ответ:** 1. [1, с. 80–88]\n6. **[Несколько ответов]** Какие принципы выделяет Манович? 1) модульность 2) автоматизация 3) вариативность 4) транскодирование. **Ответ:** 1, 2, 3, 4. [1, с. 61–88]\n7. **[Один ответ]** Автоматизация означает, что: 1) часть операций выполняет программа 2) человек всегда исключён 3) нет контента 4) есть только шум. **Ответ:** 1. [1, с. 66–70]\n8. **[Один ответ]** Что лучше иллюстрирует модульность? 1) веб-страница из независимых текстовых и визуальных блоков 2) один неделимый шум 3) эффект сообщения 4) лидерство. **Ответ:** 1. [1, с. 64–66]\n9. **[Один ответ]** Транскодирование не означает: 1) простой перевод слов на другой язык 2) связь культуры и компьютерной логики 3) изменение формы культурного объекта 4) программную обработку. **Ответ:** 1. [1, с. 80–88]\n10. **[Один ответ]** Какая пара верна? 1) вариативность — версии объекта 2) модульность — эффект воздействия 3) автоматизация — жанр 4) числовое представление — проксемика. **Ответ:** 1. [1, с. 61–88]\n\n## Источник дня\n\n1. Манович Л. *Язык новых медиа*. М.: Ад Маргинем Пресс, 2018. Разд. «Что такое новые медиа?», с. 52, 61–88.\n","07":"# День 7. Конвергенция, культура соучастия и трансмедийное повествование\n\n**Результат дня.** Вы не сводите конвергенцию к одному устройству, различаете культурный, технологический и индустриальный уровни процесса и распознаёте трансмедийное повествование.\n\n**Карточки дня:** № 61–70 из банка 130.\n\n## Конвергенция — не «всё в одном гаджете»\n\nГенри Дженкинс определяет конвергенцию через циркуляцию контента между медиаплатформами, взаимодействие медиапроизводителей и меняющиеся способы потребления. Он прямо возражает против понимания конвергенции только как технологического объединения функций в одном устройстве: это культурный сдвиг, при котором потребители активнее ищут информацию и устанавливают связи между разрозненными фрагментами контента. [1, с. 17–34]\n\nОтсюда следует важное различение. Технологическая конвергенция касается совместимости и соединения функций устройств/сетей. Индустриальная — взаимодействия и концентрации различных сегментов медиаиндустрии. Культурная — новых практик аудитории, совместного поиска, обсуждения, распространения и связывания контента. В реальном кейсе уровни могут совпадать, но в тесте нужно выбрать тот, который описан условием. [1, с. 17–41]\n\nСтарые медиа в этой модели не обязаны исчезать. Дженкинс описывает сложное сосуществование старых и новых медиа: меняются их функции, связи и способы потребления. Поэтому формулировка «конвергенция означает полное вытеснение старых медиа новыми» неверна. [1, с. 17–41]\n\n### Три уровня конвергенции в одном кейсе\n\nПредставьте, что медиакомпания одновременно выпускает сериал, подкаст, игру и материалы в социальных сетях. Технологический уровень проявляется в цифровой инфраструктуре и совместимости способов доставки. Индустриальный — в координации разных подразделений, прав на контент, рекламных и дистрибуционных стратегий. Культурный — в том, как аудитория собирает фрагменты истории, обсуждает их, делает интерпретации и создаёт собственные материалы. Один проект может включать все уровни, но в вопросе нужно называть именно тот механизм, который описан. [1, с. 17–41]\n\nНе путайте конвергенцию с простой мультиформатностью. Наличие у бренда сайта, аккаунта и ролика ещё не доказывает глубокое взаимодействие медиа. Для конвергенции важны связи между платформами, поток контента, координация производств и меняющиеся практики аудитории. Это следует из определения Дженкинса как процесса взаимодействия медиасистем, а не единичного технического решения. [1, с. 17–41]\n\n## Культура соучастия и коллективный интеллект\n\nКультура соучастия — не просто возможность поставить лайк. Она описывает более широкое вовлечение пользователей в поиск, интерпретацию, обсуждение и распространение медиаконтента. В этой логике потребление становится более коллективным процессом: знание распределено между участниками, а сообщества могут соединять фрагменты информации и компетенции. Дженкинс использует понятие коллективного интеллекта, связанное с Пьером Леви. [1, с. 17–34]\n\nНе романтизируйте это понятие. Участие аудитории не отменяет интересы платформ и корпораций, не делает любой пользовательский материал достоверным и не гарантирует равенства голосов. Вопрос конвергенции включает напряжение между корпоративными стратегиями и низовыми практиками пользователей. [1, с. 17–41]\n\n### Корпоративные и низовые процессы\n\nКорпоративный процесс связан с действиями медиакомпаний: они управляют правами, строят бренды, размещают контент, анализируют аудитории и ищут способы монетизации. Низовой процесс связан с инициативами пользователей: фанатскими сообществами, обсуждениями, любительскими интерпретациями, совместным поиском информации, ремиксами и неформальными сетями распространения. Эти процессы не существуют в полной изоляции: компании могут учитывать активность сообществ, а пользователи действуют внутри платформенных и правовых ограничений. [1, с. 17–41]\n\nВ экзаменационном ответе избегайте мифа о том, что низовое участие автоматически освобождает аудиторию от влияния индустрии. Более точная формулировка: культура конвергенции делает отношения между производителями и потребителями сложнее и подвижнее, но не устраняет различий в ресурсах и контроле над инфраструктурой.\n\n### Коллективный интеллект как практика, а не «общий разум»\n\nКоллективный интеллект не означает, что группа всегда знает больше каждого участника и не ошибается. У Дженкинса это понятие помогает описать распределение компетенций: один участник знает один фрагмент, другой проверяет другой, а сообщества соединяют сведения в процессе обсуждения. [1, с. 17–34]\n\nПольза такой практики зависит от качества источников, правил проверки, готовности исправлять ошибки и структуры сообщества. Если коллективный поиск строится на непроверенных сообщениях или исключает несогласные позиции, он может воспроизводить ошибку. Это авторское аналитическое следствие: теория описывает потенциал распределённого знания, а не гарантирует его достоверность.\n\n## Трансмедийное повествование\n\nТрансмедийный сторителлинг — развитие истории через несколько медиаформ, когда каждый значимый элемент может дополнять целое. Это не простое повторение одного сюжета в формате фильма, книги и рекламного баннера. Если платформа лишь дублирует тот же материал, перед нами кросс-платформенное распространение; трансмедийность требует, чтобы разные входы расширяли мир, перспективу или опыт истории. [1, с. 17–34]\n\nУдобный тест для кейса: можно ли понять, какую новую информацию даёт каждый носитель? Если комикс раскрывает историю второстепенного персонажа, игра позволяет исследовать мир, а сериал развивает основной сюжет, это ближе к трансмедийному повествованию. Если все каналы размещают одинаковый трейлер, это не достаточный признак трансмедийности.\n\n### Трансмедиа, адаптация и рекламное дублирование\n\nТри явления часто путают. **Адаптация** переносит историю из одного медиума в другой: например, роман становится фильмом. **Рекламное дублирование** повторяет один и тот же материал на разных площадках, чтобы увеличить охват. **Трансмедийное повествование** распределяет элементы мира или истории по носителям так, что новые фрагменты расширяют понимание целого. Дженкинс связывает трансмедийный сторителлинг с развитием значимых произведений массовой культуры через несколько форм и с активностью аудитории, собирающей разрозненные элементы. [1, с. 17–34]\n\nНа практике границы могут быть спорными. Один проект способен одновременно содержать адаптацию, рекламные материалы и трансмедийные элементы. Поэтому не ищите одно слово для всей франшизы: анализируйте функцию каждого материала. Если комикс просто пересказывает фильм, он ближе к адаптации или дублированию. Если он раскрывает самостоятельную линию, без которой мир истории воспринимается иначе, аргумент в пользу трансмедийности сильнее.\n\n### Как решать сложный вопрос\n\n1. Найдите все платформы и формы контента.\n2. Проверьте, повторяют ли они один материал или связаны содержательно.\n3. Назовите, какие действия совершают индустрия и аудитория.\n4. Определите, какой уровень конвергенции проверяется: технологический, индустриальный или культурный.\n5. Если речь о повествовании, покажите вклад каждого носителя в общий мир/сюжет.\n\nЭтот алгоритм — авторская учебная форма применения положений Дженкинса. [1, с. 17–41]\n\n## Конвергенция и границы авторства\n\nВ конвергентной культуре авторство и контроль над контентом распределяются сложнее, чем в модели «производитель создал — аудитория получила». Медиакомпания может задавать официальный мир, правила использования бренда и каналы распространения, но пользователи обсуждают, интерпретируют, сопоставляют материалы, создают фанатские тексты и распространяют собственные версии. Дженкинс связывает эти процессы с культурой соучастия, но не отменяет конфликтов вокруг собственности, видимости и права на участие. [1, с. 17–41]\n\nЭто не означает, что пользовательский контент всегда равен профессиональному. У них могут быть разные цели, стандарты проверки, ресурсы и ответственность перед аудиторией. В учебном ответе полезно говорить о подвижности границы между производителем и потребителем, а не о полном исчезновении различий.\n\n### Технологическая конвергенция и дивергенция\n\nТехнологическая конвергенция может проявляться в том, что одно устройство позволяет читать, смотреть, слушать, снимать и отправлять материалы. Одновременно существует дивергенция: появляются специализированные приложения, интерфейсы и каналы, а пользователь распределяет разные задачи между ними. Дженкинс подчёркивает, что упрощённая идея одного «чёрного ящика», который объединит все медиа, не объясняет реальную сложность медиасреды. [1, с. 17–41]\n\nСледовательно, в вопросе о конвергенции не ищите обязательно физическое слияние устройств. Контент, индустрии и пользовательские практики могут конвергировать при сохранении множества отдельных технических носителей.\n\n## Трансмедийное повествование как работа с миром истории\n\nТрансмедийный проект обычно строится не вокруг одного носителя, а вокруг мира, который можно исследовать с разных сторон. Фильм может вводить главный конфликт, сериал — развивать линии персонажей, игра — давать опыт действия в мире, комикс — раскрывать предысторию, сайт — собирать документы или дополнительные точки зрения. Каждая часть имеет смысл не только как реклама, но как добавление к общему нарративу. [1, с. 17–34]\n\nПользователь не обязан потреблять все фрагменты, чтобы понять базовую историю. Хорошая трансмедийная конструкция допускает разные точки входа, но вознаграждает более глубокое исследование мира. Это отличает её от ситуации, когда один и тот же текст принудительно дробится на платформы без самостоятельной ценности частей. Это авторское учебное объяснение на основе понятия трансмедийного сторителлинга.\n\n### Проверка кейса\n\nДля каждого элемента проекта заполните таблицу в конспекте: носитель; содержание; новая информация; роль для аудитории; кто его производит; как пользователи могут с ним взаимодействовать. Если в графе «новая информация» везде один и тот же ответ, перед вами скорее дублирование, а не трансмедийное повествование.\n\n## Конвергенция как процесс, а не свойство устройства\n\nКонвергенция у Дженкинса описывает движение контента через разные медийные платформы, сотрудничество индустрий и миграцию аудитории в поисках нового опыта. Поэтому она не равна техническому объединению функций в смартфоне. Смартфон может быть удобной точкой доступа, но сам по себе не объясняет, почему истории, бренды, сообщества и экономические модели начинают развиваться между разными медиа. [1, с. 17–41]\n\nВ конвергентной среде один материал может менять функцию при переходе между площадками. Короткий ролик в социальной сети привлекает внимание, подробное интервью объясняет контекст, форум собирает интерпретации, игра предлагает действие внутри вымышленного мира. Такое распределение нельзя описать только как «мультиплатформенность»: важно спросить, что добавляет каждая площадка и как аудитория связывает фрагменты.\n\n### Корпоративная и низовая конвергенция\n\nДженкинс различает движение сверху — интересы медиаиндустрий, владельцев прав, рекламных и платформенных систем — и движение снизу: практики пользователей, которые обсуждают, пересобирают, распространяют и дополняют контент. Эти процессы могут сотрудничать, конфликтовать или существовать параллельно. Корпоративная стратегия может приглашать фанатское участие, но одновременно ограничивать использование персонажей и материалов правилами собственности. [1, с. 17–41]\n\nНе следует считать, что пользовательское творчество автоматически отменяет авторство профессионалов или что корпоративный контроль полностью устраняет инициативу аудитории. Конвергенция делает отношения между производителями и потребителями более заметными и сложными. В тестовом вопросе обращайте внимание на формулировку: если речь о переходе контента, индустриальном сотрудничестве и активности пользователей, это ближе к конвергенции, чем к одному техническому формату.\n\n## Культура соучастия и коллективный интеллект\n\nКультура соучастия описывает ситуации, в которых аудитории не только потребляют сообщения, но и обсуждают, распространяют, создают ремиксы, руководства, версии и сообщества вокруг контента. Это не означает одинаковой включённости всех участников: у разных людей разный доступ, время, навыки и мотивация. Но граница между «автором» и «потребителем» становится менее жёсткой. [1, с. 17–41]\n\nКоллективный интеллект возникает, когда знание распределено между участниками и никто не владеет им целиком, но группа может собрать более полную картину через обмен фрагментами. Например, разные зрители замечают детали сериала, сверяют источники и совместно строят интерпретацию. Важно отличать это от простого большинства голосов: ценность создаётся не числом участников, а координацией частичных знаний. [1, с. 17–41]\n\n### Участие и критическое чтение\n\nУчастие не делает любой пользовательский материал достоверным. Сообщество может быстро распространять ошибку, усиливать популярную интерпретацию или исключать несогласных. Поэтому медийная грамотность в конвергентной среде включает проверку источников, различение факта и предположения, понимание правил платформы и уважение к правам авторов. Это авторское практическое следствие идей Дженкинса о соучастии и циркуляции контента.\n\n## Тренажёр: отличить три явления\n\nОдин и тот же выпуск новостей размещён в эфире, на сайте и в приложении без существенных изменений — это кросс-платформенное распространение, но ещё не обязательно трансмедийное повествование. Отдельные материалы о вымышленном мире раскрывают разные истории и требуют собирать части — это ближе к трансмедийности. Пользователи создают объяснения и обсуждают сюжет — это пример культуры соучастия; если они объединяют распределённые знания, можно говорить о коллективном интеллекте. В каждом случае проверяйте не название сервиса, а функцию материала и характер участия.\n\n## Самопроверка\n\nСравните три формулировки: «смотреть фильм на смартфоне», «медиакомпания использует один сюжет в нескольких подразделениях», «фанаты собирают данные из разных фрагментов истории». Первая описывает техническую среду, вторая — индустриальную координацию, третья — культурную конвергенцию/соучастие. Проверьте, можете ли вы объяснить это различие без слова «интернет».\n\n## Задания\n\n1. Разберите франшизу: что в ней является технологической, индустриальной и культурной конвергенцией?\n2. Найдите два примера: дублирование контента и его трансмедийное расширение.\n3. Опишите, как коллективный поиск информации может быть полезен и какие риски он создаёт.\n\n## Экзаменационные мини-задачи\n\n1. Компания выпускает сериал, игру и подкаст, причём каждый носитель раскрывает новый фрагмент истории. Определите феномен и объясните, почему это не просто дублирование контента.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nДля одного медиапроекта отдельно выпишите технологический, индустриальный и культурный уровни конвергенции.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 61–70\n\n1. **[Один ответ]** Конвергенция у Дженкинса — прежде всего: 1) культурный сдвиг и циркуляция контента 2) один универсальный прибор 3) исчезновение старых медиа 4) жанр интервью. **Ответ:** 1. [1, с. 17–34]\n2. **[Один ответ]** Что неверно для конвергенции? 1) старые медиа обязательно полностью исчезают 2) контент циркулирует между платформами 3) меняются отношения аудиторий и индустрий 4) существуют разные уровни процесса. **Ответ:** 1. [1, с. 17–41]\n3. **[Несколько ответов]** Что может входить в конвергенцию? 1) технологии 2) рынки 3) жанры 4) аудитории. **Ответ:** 1, 2, 3, 4. [1, с. 17–41]\n4. **[Один ответ]** Культура соучастия предполагает: 1) активное участие пользователей в работе с контентом 2) только пассивный просмотр 3) отказ от обсуждения 4) только технический шум. **Ответ:** 1. [1, с. 17–34]\n5. **[Один ответ]** Коллективный интеллект связан с: 1) распределением знания между участниками 2) одним автором 3) технической помехой 4) жанровой классификацией. **Ответ:** 1. [1, с. 17–34]\n6. **[Один ответ]** Трансмедийное повествование — это: 1) расширение истории через разные медиа 2) одинаковый трейлер на всех платформах 3) только перевод текста 4) тип шума. **Ответ:** 1. [1, с. 17–34]\n7. **[Несколько ответов]** Что отличает трансмедийный проект? 1) разные части дополняют историю 2) возможны разные точки входа 3) развивается общий мир 4) все носители обязаны повторять один текст. **Ответ:** 1, 2, 3. [1, с. 17–34]\n8. **[Один ответ]** Противопоставление корпоративных и низовых процессов относится к: 1) напряжению внутри культуры конвергенции 2) только техническому шуму 3) невербальной коммуникации 4) жанрам печати. **Ответ:** 1. [1, с. 17–41]\n9. **[Один ответ]** Что является примером простого кросс-платформенного дублирования? 1) один и тот же ролик без дополнений на разных платформах 2) игра раскрывает новую сюжетную линию 3) комикс вводит нового героя 4) подкаст объясняет историю мира. **Ответ:** 1. [1, с. 17–34]\n10. **[Один ответ]** Почему участие аудитории не равно автоматической достоверности? 1) участие не отменяет необходимость проверки и различия ресурсов 2) все пользователи всегда правы 3) платформы не влияют на видимость 4) это только жанр. **Ответ:** 1. [1, с. 17–41]\n\n## Источник дня\n\n1. Дженкинс Г. *Конвергентная культура. Столкновение старых и новых медиа*. М.: РИПОЛ классик, 2019. Гл. 1–3, с. 17–41.\n","08":"# День 8. Жанры журналистики: факт, анализ и образ\n\n**Результат дня.** Вы различаете жанр, формат и метод работы с материалом; определяете, когда текст сообщает факт, объясняет связи или создаёт художественно-публицистический образ.\n\n**Карточки дня:** № 71–80 из банка 130.\n\n## Как образуется жанр\n\nЖанр — не произвольное название текста и не только его длина или платформа публикации. Тертычный связывает жанровые различия с предметом отображения, целевой установкой (функцией) и методом отображения. Поэтому «пост в соцсети» — формат размещения, но не обязательно самостоятельный жанр: внутри него может быть заметка, комментарий, интервью, репортаж или очерк. [1, разд. «Жанрообразующие факторы»]\n\nПредмет отвечает на вопрос, что именно отображается; функция — зачем это делается для аудитории; метод — как журналист работает с действительностью и организует материал. Жанровая диагностика должна исходить из этой связки, а не из одного внешнего признака. [1, разд. «Жанрообразующие факторы»]\n\n## Фактографические жанры\n\nФактографический способ работы ориентирован на оперативное сообщение о наблюдаемом факте. Базовые вопросы — что произошло, где, когда, с кем. Хроника и заметка стремятся быстро зафиксировать событие; репортаж добавляет эффект присутствия и детали наблюдения; интервью строится как получение информации через разговор с собеседником; отчёт организует сведения о мероприятии. Общая задача этих жанров — сообщить о событии, а не развернуть полный анализ его причин. [1, разд. о фактических жанрах]\n\nОперативность не отменяет проверки. Короткий текст не становится новостью только потому, что он быстро опубликован: он должен опираться на установленный факт и ясно отделять факт от оценки.\n\n## Аналитические жанры\n\nАналитический метод направлен на выявление причин, условий, тенденций, взаимосвязей и мотивов. Комментарий поясняет значение актуального факта; статья и корреспонденция могут разворачивать аргументацию; обозрение сопоставляет ряд событий; рецензия оценивает произведение с аргументацией; расследование требует работы со скрытыми связями и доказательной базой. [1, разд. об аналитических жанрах]\n\nНе называйте любой длинный текст аналитическим. Длина не доказывает аналитичность. Признак анализа — вопрос «почему/как связано/к чему ведёт?» и доказательное движение от данных к объяснению.\n\n## Художественно-публицистические жанры\n\nВ художественно-публицистическом ряду важны образность, эмоциональная выразительность и авторское обобщение. Очерк строит образ человека, среды или явления на документальной основе; зарисовка фиксирует характерную деталь или впечатление; памфлет использует сатирическое обличение. Образность не освобождает автора от связи с действительностью: публицистический жанр сохраняет социально значимый предмет. [1, разд. о художественно-публицистических жанрах]\n\n## Дополнение: как различать жанр, формат и платформу\n\nЭти понятия пересекаются, но не совпадают. **Жанр** описывает устойчивый тип произведения с определённой предметно-функциональной и методической логикой. **Формат** чаще обозначает способ организации и предъявления материала: короткое видео, подкаст, лонгрид, сторис, прямой эфир. **Платформа** — среда распространения: сайт редакции, социальная сеть, видеохостинг, радиоэфир. Одна платформа поддерживает множество форматов, а внутри одного формата могут реализовываться разные жанры.\n\nНапример, подкаст — формат. В нём может быть интервью, обозрение, комментарий, документальный рассказ или беседа. Короткое вертикальное видео также не является жанром само по себе: оно может сообщать новость, объяснять событие, содержать отзыв или рекламный призыв. Такое различение не противоречит Тертычному: его жанрообразующие факторы относятся к содержательной и познавательной задаче, а не к названию технической оболочки. [1, разд. «Жанрообразующие факторы»]\n\nЧтобы распознать жанр, сначала спросите: что является предметом — отдельный факт, процесс, проблема, произведение, человек, общественное явление? Затем: какова цель — быстро сообщить, объяснить, оценить, разоблачить, создать образ? И только после этого: какой метод преобладает — фиксация факта, логический анализ связей, наблюдение, разговор с источником, художественное обобщение? Такой порядок уменьшает риск назвать жанр только по слову «статья» или «пост».\n\n## Дополнение: фактографический, аналитический и художественный методы\n\nВнутри фактографического ряда есть различия. **Хроника** стремится зафиксировать событие предельно кратко. **Заметка** разворачивает сообщение о факте, добавляя значимые детали. **Репортаж** строится на наблюдении события и создаёт эффект присутствия через последовательность действий, детали и свидетельства. **Интервью** организует получение и предъявление информации через вопросы и ответы; оно может иметь информационную, аналитическую или портретную направленность, поэтому его функция зависит от конкретной задачи. **Отчёт** воспроизводит ход мероприятия и существенные позиции участников. [1, разд. о фактических жанрах]\n\nОперативность не отменяет проверки. Короткий текст не становится новостью только потому, что он быстро опубликован: он должен опираться на установленный факт и ясно отделять факт от оценки. Не используйте правило «репортаж всегда содержит эмоции, а заметка — никогда». Эмоциональные элементы могут встречаться в разных текстах; решающим остаётся метод. Репортаж предполагает присутствие/наблюдение и динамику события, а не просто яркий стиль.\n\nАналитический текст преобразует отдельные факты в предмет рассуждения. Автор не только перечисляет события, но устанавливает отношения между ними, сравнивает позиции, показывает причины, условия, последствия и тенденции. Аргументация должна опираться на проверяемые основания: данные, документы, свидетельства, логические связи. Если текст содержит множество оценочных слов, но не показывает, откуда они выводятся, это не делает его аналитическим.\n\n**Комментарий** обычно реагирует на актуальное событие и объясняет его значение. **Корреспонденция** может сочетать фактическую основу с анализом конкретной ситуации. **Статья** разворачивает проблему и аргументы. **Обозрение** объединяет ряд фактов или процессов в более широкую картину. **Рецензия** оценивает произведение, но должна обосновывать оценку анализом. **Расследование** требует особо тщательной проверки, поскольку ищет скрытые связи и информацию, не лежащую на поверхности. [1, разд. об аналитических жанрах]\n\nВ аналитике полезно разделять три слоя. **Факт** — установленное обстоятельство. **Мнение** — позиция автора или участника. **Аргумент** — основание, которое связывает позицию с данными или логикой. В учебном задании попробуйте помечать их разными цветами: это помогает увидеть, где автор сообщает, где оценивает и где доказывает.\n\nХудожественно-публицистический текст работает не только с абстрактным анализом, но и с конкретными деталями, характерами, ситуациями, речью героев и авторской интонацией. Образ помогает увидеть социальное явление через единичное. При этом публицистическая основа требует не выдумывать факты вместо исследования. Очерк может быть эмоциональным и образным, но его материал связан с реальными людьми, средами и событиями.\n\n**Зарисовка** часто концентрируется на характерной детали, эпизоде или впечатлении. **Памфлет** строит сатирическое обличение общественного явления или позиции. Эти жанры отличаются целью и тональностью: нельзя назвать любой критический текст памфлетом, если в нём нет сатирического способа обобщения. [1, разд. о художественно-публицистических жанрах]\n\n## Гибридизация в цифровой среде\n\nЦифровая среда облегчает сочетание жанровых признаков: новость может дополняться справкой, инфографикой, комментарием эксперта и пользовательскими материалами; подкаст может объединять интервью, анализ и повествование. Гибридизация не означает исчезновения жанров. Напротив, чтобы заметить гибридность, нужно сначала распознать, какие логики в тексте соединены: фактографическая, аналитическая, художественно-публицистическая, рекламная и т. д. Программа ВИ называет гибридизацию жанров тенденцией новых медиа; объяснять её нужно через различение исходных жанровых функций. [Программа ВИ, с. 6; 1, разд. «Жанрообразующие факторы»]\n\n## Самопроверка\n\nВозьмите любую новостную публикацию и ответьте: какой в ней основной жанр; какой формат; какая платформа; есть ли в ней вторичные жанровые элементы; на каких фактах и аргументах держится текст? Если вы можете назвать только платформу, повторите различение жанра, формата и носителя.\n\n## Работа с источниками и границы жанра\n\nЖанр не освобождает журналиста от проверки источников. Даже в краткой заметке важно понимать, откуда получен факт, можно ли его подтвердить и не смешана ли информация с чьей-то оценкой. В аналитическом материале к этому добавляются требования к логике аргументации и полноте оснований. В художественно-публицистическом тексте образность не даёт права заменять документальную основу вымыслом.\n\nИнтервью особенно хорошо показывает различие между методом и жанром. Беседа с человеком может быть способом сбора материала для заметки, репортажа или расследования. Но интервью также может быть самостоятельным жанром, если форма вопросов и ответов организует основное содержание публикации. В тесте смотрите, что является конечным продуктом и какую функцию он выполняет, а не просто есть ли в нём цитата собеседника.\n\n### Редакционная маркировка\n\nВ цифровой среде один материал может содержать редакционный текст, комментарий, рекламу, пользовательские сообщения и автоматические рекомендации. Их смешение создаёт риск: аудитории труднее понять, кто говорит, с какой целью и какие стандарты проверки применялись. При анализе формата задайте вопрос: отделены ли новости, мнение, реклама и пользовательский контент? Это авторское практическое задание, связанное с жанровой логикой и темой гибридизации.\n\n## Выбор жанра по задаче\n\nЕсли аудитории нужно быстро узнать о подтверждённом событии — подходит фактографический жанр. Если нужно разобраться в причинах и последствиях — аналитический. Если важно показать человека, среду или социальный тип через конкретную картину — художественно-публицистический. Иногда редакция соединяет задачи, но это не значит, что можно отказаться от приоритета: читатель должен понимать, где информация, где объяснение, а где авторская образная интерпретация.\n\nПотренируйтесь на одном сюжете — например, открытии общественного пространства. Заметка ответит, что/где/когда открылось. Репортаж перенесёт читателя в ход события и детали. Комментарий объяснит значение открытия. Аналитическая статья рассмотрит потребности района, бюджет, последствия. Очерк покажет историю людей, для которых пространство стало важным. Сравнение — авторское; различение методов следует Тертычному. [1, разд. о фактических, аналитических и художественно-публицистических жанрах]\n\n## Самопроверка\n\nСоставьте три вопроса к любому тексту: какой его предмет; какова функция; какой метод доминирует. После этого назовите жанр. Если вы начали с платформы или визуального размера, вернитесь к жанрообразующим факторам.\n\n## Задания\n\n1. Для одного события напишите тему заметки, комментария и очерка. Объясните различие предмета и функции.\n2. Возьмите статью и подчеркните факты, объяснения, оценки. Какая часть делает её аналитической?\n\n## Жанр как договор автора, материала и аудитории\n\nЖанр помогает читателю понять, какого типа работу с действительностью предлагает текст. В заметке ожидают оперативного сообщения о факте; в интервью — высказываний собеседника, организованных вопросами автора; в аналитическом материале — постановки проблемы, аргументов и выводов; в очерке — более выраженного авторского образного освоения реальности. Эти ожидания не делают жанры неподвижными, но задают признаки, по которым их различают. [1, разделы о жанрообразовании, информационных, аналитических и художественно-публицистических жанрах]\n\nЖанровая квалификация не сводится к объёму текста. Длинный текст может оставаться информационным, если его задача — подробно сообщить факты; короткий текст может содержать аналитическую оценку. Также не следует выбирать жанр только по площадке: видео, сайт, газета или социальная сеть могут поддерживать разные жанровые решения. Платформа влияет на подачу, скорость и мультимедийные элементы, но не заменяет анализа предмета, цели и метода. [1, разделы о жанрообразовании]\n\n### Факт, интерпретация и авторская позиция\n\nФактографический материал опирается на проверяемые сведения: что произошло, где, когда, с кем, какие данные известны. Аналитический материал не отказывается от фактов, а строит на них объяснение: сопоставляет причины, следствия, позиции, тенденции и варианты развития. Художественно-публицистический материал тоже не обязан быть вымыслом; его особенность — образность, типизация и более заметное авторское освоение действительности. [1, разделы о трёх группах жанров]\n\nВ учебной задаче сначала выпишите, что именно делает автор: фиксирует событие, задаёт вопросы собеседнику, объясняет проблему, полемизирует, создаёт образ. Затем сопоставьте действие с жанровой группой. Это надёжнее, чем угадывать по отдельному слову «мнение» или «история».\n\n## Источник, проверка и этическая граница\n\nЖанр не отменяет требований к источникам. Оперативность информационного сообщения не оправдывает публикацию непроверенного факта; выразительность очерка не даёт права выдавать вымысел за документальное свидетельство; полемичность статьи не заменяет аргументацию. Работа автора включает сбор фактов, различение прямого наблюдения, документа, свидетельства и комментария, а также ясное обозначение границ знания. Это авторское практическое развитие жанровой логики Тертычного.\n\nВ цифровой среде особенно важно не путать первоисточник, пересказ и реакцию аудитории. Пост в социальной сети может быть свидетельством того, что пользователь сделал заявление, но не всегда доказательством самого описанного события. В экзаменационном кейсе выбирайте ответ, который сохраняет различие между формой публикации и проверяемостью её содержания.\n\n### Гибридные формы\n\nГибридизация означает, что современный материал может сочетать признаки нескольких жанров и использовать текст, фото, видео, инфографику, комментарии и ссылки. Но гибридность не означает отсутствия анализа: у материала всё равно можно определить ведущую задачу и преобладающий способ работы с действительностью. Например, лонгрид с картами и видео может быть аналитическим, если его ядро — объяснение проблемы, а не только набор мультимедийных элементов. [1, разделы о жанровой системе; программа ВИ, с. 6]\n\n## Тренажёр: построить жанровое обоснование\n\nСитуация: городские власти открыли новый маршрут. Если задача — быстро сообщить дату, схему и правила проезда, обоснован информационный жанр. Если нужно показать опыт пассажиров и атмосферу первого рейса, подойдёт репортаж. Если нужно объяснить, как маршрут меняет транспортную систему и какие есть риски, потребуется аналитический материал. Напишите для каждого варианта цель, тип источников и ожидаемый результат для аудитории.\n\n## Экзаменационные мини-задачи\n\n1. Редакция публикует текст, в котором оперативная новость соединена с объяснением причин события. Назовите жанровую тенденцию и укажите, какие признаки отличают её от заметки.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nВозьмите одну новость и переделайте её в интервью, репортаж и аналитический материал: для каждого варианта назовите цель и способ работы с фактами.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 71–80\n\n1. **[Один ответ]** Жанр формируется через: 1) предмет, функцию и метод 2) только платформу 3) только длину 4) только число лайков. **Ответ:** 1. [1, разд. «Жанрообразующие факторы»]\n2. **[Один ответ]** «Пост в соцсети» чаще всего обозначает: 1) формат, а не обязательный жанр 2) только аналитическую статью 3) только репортаж 4) вид шума. **Ответ:** 1. [1, разд. «Жанрообразующие факторы»]\n3. **[Один ответ]** Оперативное сообщение о факте характерно прежде всего для: 1) фактографических жанров 2) только памфлета 3) только рецензии 4) медиаэкологии. **Ответ:** 1. [1, разд. о фактических жанрах]\n4. **[Несколько ответов]** Какие вопросы типичны для фактического сообщения? 1) что 2) где 3) когда 4) с кем. **Ответ:** 1, 2, 3, 4. [1, разд. о фактических жанрах]\n5. **[Один ответ]** Аналитический метод ищет прежде всего: 1) причины и связи 2) только скорость публикации 3) только размер шрифта 4) канал. **Ответ:** 1. [1, разд. об аналитических жанрах]\n6. **[Один ответ]** Комментарий отличается от простой заметки тем, что: 1) поясняет значение факта 2) всегда длиннее 3) не использует факты 4) является каналом. **Ответ:** 1. [1, разд. об аналитических жанрах]\n7. **[Один ответ]** Какой жанр требует доказательной работы со скрытыми связями? 1) расследование 2) хроника 3) зарисовка 4) анонс. **Ответ:** 1. [1, разд. об аналитических жанрах]\n8. **[Один ответ]** Очерк относится к: 1) художественно-публицистическим жанрам 2) техническим шумам 3) моделям связи 4) видам канала. **Ответ:** 1. [1, разд. о художественно-публицистических жанрах]\n9. **[Несколько ответов]** Для художественно-публицистического ряда характерны: 1) образность 2) эмоциональная выразительность 3) авторское обобщение 4) отказ от действительности. **Ответ:** 1, 2, 3. [1, разд. о художественно-публицистических жанрах]\n10. **[Один ответ]** Почему длинный текст не обязательно аналитический? 1) анализ определяется объяснением связей и аргументацией, не длиной 2) аналитика всегда короткая 3) длина равна жанру 4) факты не нужны. **Ответ:** 1. [1, разд. об аналитических жанрах]\n\n## Источник дня\n\n1. Тертычный А. А. *Жанры периодической печати*. М.: Аспект Пресс, 2018. Разделы «Жанрообразующие факторы», фактические, аналитические и художественно-публицистические жанры. В предоставленном тексте печатная пагинация нестабильна; поэтому приведены точные названия разделов.\n","09":"# День 9. Вербальная коммуникация: знак, речь, диалог и аргументация\n\n**Результат дня.** Вы различаете язык и речь, понимаете роль знака, кода и контекста, отличаете диалог от монолога и аргументацию от простого утверждения.\n\n**Карточки дня:** № 81–90 из банка 130.\n\n## Знак, язык и речь\n\nВербальная коммуникация использует естественный язык и речевые высказывания. Семиотика изучает знаки и знаковые системы; в коммуникации знак важен не сам по себе, а потому, что участники могут соотнести материальную форму со смыслом и правилами её употребления. Василик выделяет синтактический, семантический и прагматический аспекты: отношения знаков друг к другу, отношения знаков к значениям и отношения знаков к пользователям/ситуации. [1, с. 163–180]\n\nЯзык — социально выработанная знаковая система и правила её использования; речь — конкретная реализация языка в высказывании. Поэтому один язык допускает разные речевые стратегии, стили, жанры и индивидуальные формулировки. Понимание зависит не только от словаря, но и от контекста, цели, статуса участников и общих предпосылок. [1, с. 180–192]\n\n## Диалог, монолог и аргументация\n\nДиалог предполагает смену коммуникативных ролей и ориентацию на реплики другого; монолог разворачивает относительно самостоятельное высказывание одного говорящего. Это не оценка «хорошо/плохо»: лекция может быть монологической по форме, но использовать вопросы и обратную связь; переговоры и интервью строятся диалогически. [1, с. 193–206]\n\nАргументация — обоснование позиции через тезис, доводы и связь между ними. Сильный аргумент не равен уверенной интонации: нужно, чтобы основания относились к тезису, были понятны аудитории и не подменяли вопрос. [1, с. 202–217]\n\n## Знак, значение и употребление\n\nСемиотический анализ помогает не смешивать форму знака со смыслом, который ему приписывают. В речи одно слово может сохранять словарное значение, но менять прагматический эффект в зависимости от ситуации, интонации, статуса говорящего и ожиданий адресата. Поэтому одинаковая фраза «вы свободны» может быть разрешением, увольнением, иронической репликой или завершением разговора — без контекста её коммуникативное значение неполно.\n\nСинтактический аспект касается сочетания знаков и правил их организации. Семантический — того, какие значения они выражают. Прагматический — того, как ими пользуются участники и какой эффект они стремятся произвести. Это различение не означает, что три аспекта существуют отдельно в реальной речи. Оно помогает диагностировать проблему: ошибка может быть в строении фразы, в значении слова или в неуместном способе употребления. [1, с. 163–180]\n\nПример. В инструкции фраза может быть грамматически правильной (синтактика), но двусмысленной для адресата (семантика) или звучать как приказ в ситуации, где требуется приглашение к совместному решению (прагматика). Это авторский кейс, построенный на семиотических различениях.\n\n## Язык и речь: что проверяет экзамен\n\nЯзык существует как социально выработанная система знаков и правил; речь — использование этой системы в конкретных высказываниях. Язык предоставляет ресурсы, но не диктует единственный способ высказывания. Участник выбирает слова, строит фразы, использует стиль, жанр и аргументацию с учётом цели и ситуации. [1, с. 180–192]\n\nНе делайте неверный вывод, что речь — «только устное общение». Речь может быть устной и письменной; письменный текст также является речевой коммуникацией. В программе ВИ отдельно названы устные и письменные формы, монолог и диалог, чтение и слушание, а также вторичные формы работы с чужим текстом: тезисы, конспект, аннотация, реферирование. [Программа ВИ, с. 7; 1, с. 180–224]\n\n### Вторичные речевые формы\n\n**Тезисы** кратко фиксируют основные положения. **Конспект** систематизирует содержание источника в сжатой форме. **Аннотация** сообщает, о чём текст и для кого/зачем он может быть полезен, не заменяя его подробного изложения. **Реферат** более развёрнуто передаёт содержание и структуру источников. Эти формы нужны не просто для подготовки: они показывают умение выделять основное, сохранять логику чужого высказывания и отделять её от собственной оценки. [Программа ВИ, с. 7]\n\n## Диалог как координация реплик\n\nДиалог строится не из двух монологов, поставленных рядом. Каждая реплика отвечает на предыдущую, меняет ситуацию и создаёт ожидание следующего шага. Вопрос, уточнение, согласие, возражение, просьба, отказ и обобщение выполняют разные коммуникативные действия. Диалог требует слушания и готовности корректировать собственную позицию в ответ на полученную информацию. [1, с. 193–202]\n\nМонолог, напротив, позволяет одному говорящему последовательно развить тему. Лекция, доклад, обращение, презентация или разъяснение часто строятся монологически, но могут включать элементы диалогичности: вопросы к аудитории, ответы, примеры, паузы для обратной связи. Поэтому монолог не означает отсутствия адресата, а диалог не обязательно означает равенство статусов участников.\n\n## Аргументация и спор\n\nАргументация начинается с ясного тезиса: что именно утверждается или предлагается? Затем нужны основания: факты, данные, правила, примеры, причинные связи. Наконец, нужно показать мост между основанием и тезисом: почему из этого основания следует именно такой вывод. Если мост не проговорён, аргумент может быть внешне убедительным, но логически слабым. [1, с. 202–217]\n\nВ споре важно различать поиск истины/решения и стремление победить оппонента. Полемика может быть частью публичной коммуникации, но профессиональный и учебный спор требует соблюдать предмет обсуждения, не подменять тезис противника, не объявлять личное качество доказательством и не считать громкость доводом. Василик связывает стратегии и тактики аргументации с целями участников и правилами речевого взаимодействия. [1, с. 202–217]\n\n### Мини-алгоритм разбора аргумента\n\n1. Выпишите тезис.\n2. Найдите факты/основания.\n3. Проверьте, относятся ли они к тезису.\n4. Установите, что осталось не доказано.\n5. Сформулируйте возможное корректное возражение.\n\nЭто авторский алгоритм для тренировки; он опирается на раздел о споре и аргументации. [1, с. 202–217]\n\n## Самопроверка\n\nВозьмите рекламный слоган, деловое письмо и фрагмент интервью. В каждом случае назовите: используемые знаки/коды, речевую форму, цель, предполагаемую аудиторию и возможный прагматический эффект. Затем отметьте, где у вас факт, где оценка, а где аргумент.\n\n## Слушание и чтение как активные действия\n\nВ программе ВИ слушание и чтение названы элементами вербальной коммуникации не случайно. Получатель не просто «принимает» готовый смысл: он выделяет главное, соотносит новое с уже известным, проверяет связи, замечает неясности и при необходимости задаёт вопросы. Пассивное физическое присутствие при речи не гарантирует понимания, так же как просмотр текста глазами не гарантирует чтения в содержательном смысле. [Программа ВИ, с. 7; 1, с. 180–224]\n\nПолезная стратегия чтения сложного учебного текста: сначала определить тему и тезис; затем отметить определения; после — найти аргументы и примеры; в конце пересказать логику без дословного копирования. Для слушания аналогично: заранее понять цель разговора, фиксировать ключевые пункты, уточнять неясное, в конце кратко проверить, одинаково ли участники поняли итог. Это авторский учебный алгоритм.\n\n### Речевая стратегия и тактика\n\nСтратегия речи связана с общей целью взаимодействия: информировать, убедить, объяснить, договориться, защитить позицию, поддержать контакт. Тактика — конкретный приём, который используется в ходе разговора: вопрос, пример, уточнение, перефразирование, ссылка на факт, признание ограничения, резюме. Одна стратегия может реализовываться разными тактиками; одна и та же тактика может иметь разные эффекты в зависимости от контекста. [1, с. 202–217]\n\nНапример, вопрос может быть тактикой получения информации, способом вовлечь аудиторию, формой проверки понимания или скрытым давлением. Поэтому при анализе речевой ситуации важно не только назвать форму, но и объяснить её функцию.\n\n## Письменная коммуникация\n\nПисьменный текст лишён части непосредственных невербальных подсказок, но даёт возможности для структурирования, редактирования, хранения и повторного чтения. Его понятность зависит от композиции, логики заголовков, определения терминов, последовательности аргументов и адресата. Письменная коммуникация не обязательно менее диалогична: комментарии, письма, правки, ссылки и ответы могут формировать длительный обмен, хотя и с другой временной организацией. [1, с. 180–224]\n\nВ деловом письме особенно важно отделить факт, просьбу, срок и ожидаемое действие. Если адресат не может быстро ответить «что от меня требуется?», сообщение плохо организовано независимо от вежливости формулировок. Это авторское применение принципов ясности и адресности речи.\n\n## Самопроверка\n\nВозьмите один длинный абзац учебника и сделайте из него тезисы, аннотацию и краткий реферативный пересказ. Затем сравните результаты: тезисы фиксируют положения, аннотация описывает текст, реферат передаёт его содержание и логику.\n\n## Высказывание, смысл и ситуация\n\nСлово не существует в коммуникации отдельно от употребления. Его словарное значение задаёт возможный круг смыслов, но конкретное высказывание получает значение через контекст, интонацию, отношения участников, предшествующие реплики и цель говорящего. Поэтому одно и то же «да» может быть согласием, иронией, прекращением спора или просьбой продолжить — в зависимости от ситуации. [1, с. 143–180; 2, с. 163–224]\n\nДля точной коммуникации важно проверять, разделяют ли участники код. Профессиональные термины могут быть экономными внутри группы и непонятными внешней аудитории. Если адресат не знаком с сокращением или процедурой, лучше дать расшифровку, пример или ссылку на определение. Это не упрощение мысли, а настройка сообщения на общий код.\n\n### Денотация, коннотация и оценка\n\nВ семиотическом анализе полезно различать предметное отнесение знака и дополнительные культурные, эмоциональные или оценочные оттенки. Нейтральное на первый взгляд слово может иметь разные ассоциации у разных аудиторий. В профессиональном тексте это особенно значимо, когда формулировка касается статуса, риска, ответственности или идентичности. [1, с. 143–180]\n\nНе всякая оценочность ошибочна: автор может выражать позицию, если жанр и ситуация это допускают. Ошибка возникает, когда оценка маскируется под неоспоримый факт или когда эмоционально нагруженное слово подменяет аргумент. Для самопроверки спросите: что в предложении можно проверить, а что выражает отношение; какие основания приведены для вывода.\n\n## Диалог: слушание и координация понимания\n\nДиалог состоит не из двух монологов, а из взаимно связанных реплик. Вопрос задаёт ожидание ответа, уточнение показывает проблему понимания, перефразирование проверяет интерпретацию, итоговая реплика фиксирует достигнутое согласование. Слушание активно: участник выделяет главное, соотносит услышанное с вопросом, замечает неопределённость и даёт сигнал, что смысл воспринят. [2, с. 163–224]\n\nВ споре полезно разделять предмет разногласия, позиции и аргументы. Позиция отвечает на вопрос «какой вариант я поддерживаю», аргумент — «почему этот вариант обоснован». Если участники отвечают на разные вопросы или используют одно слово в разных значениях, спор может продолжаться без реального противоречия. Тогда первым шагом становится согласование терминов и критериев.\n\n### Аргументация и доказательность\n\nАргументированное высказывание включает тезис, основания и связь между ними. Пример иллюстрирует тезис, но сам по себе не всегда его доказывает; ссылка на авторитет требует понимания компетентности и области, в которой этот авторитет релевантен; статистика требует знания того, что и как измерялось. Эти различения помогают не принять убедительный тон за обоснование. [2, с. 163–224]\n\nВ экзаменационном вопросе о вербальной коммуникации ищите не только правильный термин, но и функцию реплики: установить контакт, получить информацию, выразить отношение, обосновать позицию, уточнить код, организовать дальнейшее действие. Такой подход связывает языковой уровень с реальным взаимодействием.\n\n## Тренажёр: переписать для понимания\n\nИсходная фраза: «Надо оперативно закрыть вопрос по форме». В ней неясны действие, ответственный, срок и сама «форма». Перепишите её как рабочее сообщение: назовите задачу, адресата, срок, документ и способ подтверждения. Затем отметьте, какие изменения уменьшили семантический шум: расшифровка термина, конкретизация действия, ясный канал обратной связи.\n\n## Задания\n\n1. Преобразуйте короткое монологическое объявление в диалог с двумя уточняющими вопросами.\n2. Найдите в редакционной колонке тезис, основания и возможное возражение.\n\n## Экзаменационные мини-задачи\n\n1. Фраза «надо быстро закрыть вопрос» вызвала спор в команде. Найдите источник семантического шума и перепишите сообщение так, чтобы его можно было проверить.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nСоставьте тезис, два аргумента и вывод по медиатеме. Проверьте, что каждый аргумент действительно относится к тезису.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 81–90\n\n1. **[Один ответ]** Семиотика изучает: 1) знаки и знаковые системы 2) только каналы 3) только жанры 4) только власть. **Ответ:** 1. [1, с. 163–180]\n2. **[Один ответ]** Семантика рассматривает: 1) отношение знака к значению 2) только звук 3) только аудиторию 4) только эффект. **Ответ:** 1. [1, с. 163–180]\n3. **[Один ответ]** Прагматика учитывает: 1) использование знака участниками и ситуацией 2) только орфографию 3) только канал 4) только тираж. **Ответ:** 1. [1, с. 163–180]\n4. **[Один ответ]** Язык — это: 1) социальная знаковая система 2) один конкретный текст 3) только жест 4) эффект. **Ответ:** 1. [1, с. 180–192]\n5. **[Один ответ]** Речь — это: 1) конкретное использование языка 2) вся медиасистема 3) канал 4) жанр. **Ответ:** 1. [1, с. 180–192]\n6. **[Один ответ]** Для диалога характерна: 1) смена ролей участников 2) отсутствие ответа 3) один неизменный источник 4) только запись. **Ответ:** 1. [1, с. 193–206]\n7. **[Один ответ]** Монолог — это: 1) развёрнутое высказывание одного говорящего 2) только ошибка 3) шум 4) обратная связь. **Ответ:** 1. [1, с. 193–206]\n8. **[Несколько ответов]** Аргументация включает: 1) тезис 2) основания 3) связь между ними 4) только эмоцию. **Ответ:** 1, 2, 3. [1, с. 202–217]\n9. **[Один ответ]** Понятность высказывания зависит также от: 1) контекста и общих предпосылок 2) только длины 3) только платформы 4) модульности. **Ответ:** 1. [1, с. 180–192]\n10. **[Один ответ]** Уверенная интонация без доводов: 1) не заменяет аргументацию 2) всегда доказывает тезис 3) является жанром 4) отменяет контекст. **Ответ:** 1. [1, с. 202–217]\n\n## Источник дня\n\n1. Василик М. А. (ред.). *Основы теории коммуникации*. 2003. Гл. 4–5, с. 163–224.\n"};

    function markdown(text){let out='',inList=false;for(const line of text.split('\n')){if(/^#{1,3} /.test(line)){if(inList){out+='</ol>';inList=false}const n=line.match(/^#+/)[0].length;out+=`<h${n}>${inline(line.replace(/^#+\s*/,''))}</h${n}>`}else if(/^---+$/.test(line.trim())){if(inList){out+='</ol>';inList=false}out+='<hr>'}else if(/^> /.test(line))out+=`<blockquote>${inline(line.slice(2))}</blockquote>`;else if(/^\d+\.\s+/.test(line)){if(!inList){out+='<ol>';inList=true}out+=`<li>${inline(line.replace(/^\d+\.\s+/,''))}</li>`}else{if(inList){out+='</ol>';inList=false}if(line.trim())out+=`<p>${inline(line)}</p>`}}if(inList)out+='</ol>';return out}
    function parseCards(text){const part=text.split(/## (?:Быстрые )?Карточки[^\n]*/i)[1]||'';const beforeSource=part.split(/## Источник/i)[0];const chunks=beforeSource.split(/\n(?=\d+\.\s+\*\*\[(?:Один ответ|Несколько ответов)\])/);return chunks.map(chunk=>{const kind=chunk.match(/\*\*\[(Один ответ|Несколько ответов)\]\*\*/);if(!kind)return null;const answer=(chunk.match(/\*\*Ответ:\*\*\s*([^\.\n]+)/)||[])[1]||'';const body=chunk.replace(/^\d+\.\s+\*\*\[(?:Один ответ|Несколько ответов)\]\*\*\s*/,'').replace(/\*\*Ответ:\*\*[\s\S]*/,'').trim();const matches=[...body.matchAll(/(?:^|\s)([1-4])\)\s*([\s\S]*?)(?=\s+[1-4]\)\s|$)/g)];const question=(matches.length?body.slice(0,matches[0].index):body).trim();const opts=matches.map(m=>`${m[1]}) ${m[2].trim()}`).slice(0,4);const correct=answer.match(/[1-4]/g)||[];return opts.length===4?{kind:kind[1],question,opts,correct}:null}).filter(Boolean)}

    function renderCards(){cardPanel.innerHTML=`<h2>Карточки дня ${day}</h2><p class="intro">${cards.length} карточек. Выберите ответ, затем нажмите «Проверить». В заданиях с несколькими ответами можно отметить несколько вариантов.</p>`;cards.forEach((c,i)=>{const el=document.createElement('div');el.className='card';el.innerHTML=`<div class="question"><span class="kind">${c.kind}</span>${i+1}. ${inline(c.question)}</div><div class="options"></div><button class="check">Проверить</button><p class="feedback" aria-live="polite"></p>`;const opts=el.querySelector('.options'),selected=new Set();c.opts.forEach((o,n)=>{const b=makeOption(c,n,selected,false);b.onclick=()=>{if(el.dataset.checked)return;if(c.kind==='Один ответ'){selected.clear();opts.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'))}const key=String(n+1);if(selected.has(key))selected.delete(key);else selected.add(key);b.classList.toggle('selected',selected.has(key))};opts.appendChild(b)});el.querySelector('.check').onclick=()=>{if(!selected.size)return;el.dataset.checked='1';el.querySelector('.check').disabled=true;const right=[...c.correct].sort().join(','),chosen=[...selected].sort().join(',');el.querySelectorAll('.option').forEach((b,n)=>{const key=String(n+1);if(c.correct.includes(key))b.classList.add('good');else if(selected.has(key))b.classList.add('bad')});el.querySelector('.feedback').textContent=chosen===right?'Верно.':'Правильные варианты выделены зелёным.'};cardPanel.appendChild(el)})}
    const shuffle=a=>[...a].sort(()=>Math.random()-.5);const take=(a,n)=>shuffle(a).slice(0,n);

    async function newExam(){examPanel.innerHTML='<div class="loading">Собираю новый вариант…</div>';await ensureBank();const one=bank.filter(c=>c.kind==='Один ответ'),many=bank.filter(c=>c.kind==='Несколько ответов');const aOne=take(one,17),bOne=take(one.filter(c=>!aOne.includes(c)),3),bMany=take(many,3);const cMany=take(many.filter(c=>!bMany.includes(c)),6);exam=[...aOne.map(c=>({...c,group:'А'})),...bOne.map(c=>({...c,group:'Б'})),...bMany.map(c=>({...c,group:'Б'})),...cMany.map(c=>({...c,group:'В'}))];exam=shuffle(exam);examAnswers={};examChecked=false;renderExam()}

    function finishExam(){if(Object.keys(examAnswers).length!==exam.length)return;examChecked=true;renderExam()}
    function renderExam(){if(!exam.length){examPanel.innerHTML=`<h2>Пробный экзамен</h2><p class="intro">Вариант повторяет структуру вступительного испытания: 29 заданий, группа А — 17 вопросов с одним ответом; группа Б — 6 вопросов с одним или несколькими ответами; группа В — 6 вопросов с несколькими ответами.</p><div class="exam-meta"><span class="pill">135 минут на реальном экзамене</span><span class="pill">А: 17 × 2 балла</span><span class="pill">Б: 6 × 5 баллов</span><span class="pill">В: 6 × 6 баллов</span></div><button class="primary" id="startExam">Решить пробный экзамен</button><p class="answer-note">Каждый запуск формирует новый случайный вариант из банка из 130 карточек.</p>`;document.querySelector('#startExam').onclick=newExam;return}const answered=Object.keys(examAnswers).length;let score=0;const errors={};exam.forEach((c,i)=>{const ok=[...(examAnswers[i]||[])].sort().join(',')===[...c.correct].sort().join(',');if(examChecked&&ok)score+=c.group==='А'?2:c.group==='Б'?5:6;if(examChecked&&!ok)errors[c.day]=(errors[c.day]||0)+1});let html=examChecked?`<h2>Результат пробного экзамена</h2><p class="score">${score} / 100 баллов</p><p class="intro">После проверки показаны ваши выборы, правильные варианты и пояснения к ошибкам.</p>`:`<h2>Пробный экзамен</h2><p class="intro">Ответьте на все 29 заданий, затем нажмите «Проверить». До проверки ответы можно менять.</p>`;html+='<div class="exam-meta"><span class="pill">А: 17</span><span class="pill">Б: 6</span><span class="pill">В: 6</span><span class="pill">Отвечено: '+answered+'/29</span></div>';exam.forEach((c,i)=>{const selected=new Set(examAnswers[i]||[]),ok=[...selected].sort().join(',')===[...c.correct].sort().join(',');html+=`<div class="exam-question"><div class="question"><span class="kind">Группа ${c.group} · ${c.kind}</span>${i+1}. ${inline(c.question)}</div><div class="options">${c.opts.map((_,n)=>{const key=String(n+1);let cls='option';if(selected.has(key))cls+=' selected';if(examChecked){if(c.correct.includes(key))cls+=' good';else if(selected.has(key))cls+=' bad'}return `<button class="${cls}" data-exam="${i}" data-option="${n}" ${examChecked?'disabled':''}>${esc(c.opts[n])}</button>`}).join('')}</div>${examChecked&&!ok?`<p class="explanation">${esc(explanation(c))}</p>`:''}</div>`});if(!examChecked)html+=`<div class="exam-check"><button class="primary" id="finishExam" ${answered===29?'':'disabled'}>Проверить ответы (${answered}/29)</button></div>`;else{const rows=Object.entries(errors).map(([d,n])=>({d:Number(d),n,p:Math.round(n/exam.filter(c=>c.day===Number(d)).length*100)})).sort((a,b)=>b.p-a.p);html+='<h3>Что потренировать дальше</h3>';html+=rows.length?'<div class="recommendation"><p>Рекомендации построены по доле ошибок в темах этого варианта.</p><ul>'+rows.map(r=>`<li><strong>Глава ${r.d}: ${titles[r.d-1]}</strong> — ошибок: ${r.n}, ${r.p}% вопросов темы. <button class="secondary goChapter" data-day="${r.d}">Открыть главу</button></li>`).join('')+'</ul></div>':'<div class="recommendation">Ошибок нет — можно решить новый случайный вариант для закрепления.</div>';html+='<button class="primary" id="retryExam">Решить новый вариант</button><button class="secondary" id="backBook">К учебнику</button>'}examPanel.innerHTML=html;examPanel.querySelectorAll('[data-exam]').forEach(b=>b.onclick=()=>setExamChoice(Number(b.dataset.exam),Number(b.dataset.option)));document.querySelector('#finishExam')?.addEventListener('click',finishExam);document.querySelector('#retryExam')?.addEventListener('click',newExam);document.querySelector('#backBook')?.addEventListener('click',()=>{mode='theory';setActiveTab();render()});examPanel.querySelectorAll('.goChapter').forEach(b=>b.onclick=()=>{mode='theory';setActiveTab();load(Number(b.dataset.day))})}
    function render(){theory.classList.toggle('hidden',mode!=='theory');cardPanel.classList.toggle('hidden',mode!=='cards');examPanel.classList.toggle('hidden',mode!=='exam');if(mode==='theory')theory.innerHTML=markdown(raw.replace(/## (?:Быстрые )?Карточки[\s\S]*/i,''));else if(mode==='cards')renderCards();else renderExam()}
    async function load(n){day=n;raw='';theory.innerHTML='<div class="loading">Загружаю главу…</div>';[...days.children].forEach(b=>b.classList.toggle('active',Number(b.dataset.day)===n));try{raw=await getLesson(n);cards=parseCards(raw);render()}catch(e){theory.innerHTML='<div class="loading">Не удалось загрузить главу. Обновите страницу.</div>'}}
    load(1);
  </script>
</body>
</html>
