    const titles = ['Ранние теории медиа','Теория коммуникации как наука','Коммуникационный процесс и модели','Критическая теория и аудитория','Медиаэкология и медиасистема','Новые медиа: Манович','Конвергенция и трансмедиа','Жанры журналистики','Вербальная коммуникация','Невербальная коммуникация','Группа и организация','Массовая коммуникация','Профессиональная и PR-коммуникация'];
    const embeddedLessons={"10":"# День 10. Невербальная и межличностная коммуникация\n\n**Результат дня.** Вы классифицируете невербальные средства и понимаете межличностную коммуникацию как взаимодействие, в котором содержание и отношения неразделимы.\n\n**Карточки дня:** № 91–100 из банка 130.\n\n## Невербальные средства\n\nНевербальная коммуникация не является «языком тела с однозначным словарём». Она включает пара- и экстралингвистические характеристики голоса, мимику, взгляд, жесты, позы, пространственную и временную организацию контакта, тактильные элементы. Их значение зависит от ситуации, культуры, отношений и сочетания с речью. [1, с. 295–336]\n\nПаралингвистические средства сопровождают речь (тембр, громкость, темп, интонация); экстралингвистические включают паузы, смех, вздохи и другие неречевые включения. Оптокинетические средства связаны с движением, мимикой и жестами; проксемика — с использованием пространства и дистанции; тактильная коммуникация — с прикосновением. [1, с. 295–336]\n\n## Межличностное взаимодействие\n\nМежличностная коммуникация происходит между конкретными людьми, учитывает их роли, отношения, восприятие, эмоции и ситуацию. Здесь важно не только «что сказано», но и «как это влияет на отношения». Василик рассматривает условия, психологические предпосылки, речевое и неречевое поведение, чувства и эмоции как коммуникативные действия. [1, с. 337–397]\n\nНе делайте вывод о внутреннем состоянии человека по одному жесту. Корректный анализ требует сопоставить сигнал с контекстом, последовательностью поведения и речью. Это особенно важно в профессиональной коммуникации, где невербальный элемент может поддержать, уточнить или противоречить вербальному сообщению.\n\n## Невербальное сообщение работает в системе\n\nНевербальные средства редко существуют изолированно. Интонация сочетается со словами, выражение лица — с ситуацией, дистанция — с отношениями и культурными правилами, жест — с последовательностью реплик. Поэтому вопрос «что означает этот жест?» часто поставлен слишком узко. Правильнее спрашивать: как этот жест функционирует в конкретном взаимодействии и согласуется ли он с другими сигналами? [1, с. 295–336]\n\nНапример, пауза перед ответом может быть проявлением размышления, технической задержки, несогласия, усталости или стратегии управления разговором. Без знания ситуации нельзя выбрать единственное значение. Это не делает невербальный анализ бесполезным; наоборот, требует изучать совокупность сигналов и контекст.\n\n### Паралингвистика и экстралингвистика\n\nПаралингвистические характеристики сопровождают звучащую речь: сила голоса, тембр, темп, ритм, интонационный рисунок. Они могут менять прагматический смысл слов: вопрос стать требованием, нейтральное сообщение — иронией, просьба — приказом. Экстралингвистические элементы включают паузы, смех, вздохи, покашливание и другие явления, которые не являются словесными знаками, но участвуют в организации контакта. [1, с. 302–308]\n\nВ деловой ситуации слишком быстрый темп может мешать пониманию, а монотонность — снижать внимание; в конфликте громкость может восприниматься как давление. Однако нельзя формулировать универсальное правило «громкий голос = агрессия». Значение зависит от нормы конкретной культуры, роли участников и обстоятельств.\n\n### Оптокинетика, проксемика и тактильность\n\nОптокинетические средства включают мимику, взгляд, жесты, позы и движения. Проксемика изучает пространственную организацию общения: дистанцию, расположение участников, границы личного пространства. Тактильная коммуникация связана с прикосновениями. [1, с. 308–336]\n\nПроксемическая организация может поддерживать или разрушать контакт. Расстановка стульев на переговорах, положение выступающего перед аудиторией, доступность взгляда, возможность задавать вопросы и даже порядок входа в помещение сообщают участникам что-то о статусах и характере взаимодействия. Это не «декор», а часть коммуникативной ситуации.\n\n## Межличностная коммуникация: содержание и отношения\n\nМежличностное взаимодействие происходит между конкретными людьми, которые воспринимают друг друга не только как носителей информации, но и как партнёров, оппонентов, коллег, друзей, руководителей или подчинённых. Поэтому в нём всегда есть предметный слой («о чём говорят») и реляционный слой («какие отношения при этом подтверждаются или оспариваются»). Василик рассматривает ситуационные и психологические предпосылки, речевое и неречевое поведение, чувства и эмоции как элементы межличностной коммуникации. [1, с. 337–397]\n\nКонфликт может возникнуть не потому, что участники спорят о фактах, а потому, что один слышит в формулировке обесценивание, контроль или игнорирование. Для решения такой ситуации недостаточно повторить информацию громче: необходимо прояснить интерпретацию, статусные ожидания и правила дальнейшего разговора.\n\n### Восприятие и атрибуция\n\nВ межличностной коммуникации люди интерпретируют не только слова, но и намерения партнёра. Они могут приписывать паузе безразличие, краткому письму — холодность, несогласию — враждебность. Такие интерпретации не всегда верны. Коммуникативная компетентность проявляется в способности уточнять смысл, не превращать первое предположение в окончательный факт и замечать разницу между поведением и собственной оценкой поведения. Это авторское практическое следствие разделов Василика о психологических предпосылках и речевом/неречевом поведении. [1, с. 345–397]\n\n### Эмоции как действия\n\nЭмоциональное проявление может информировать партнёра, усиливать просьбу, обозначать границу, приглашать к поддержке или менять тон разговора. Но выражение эмоций не освобождает от ответственности за форму общения. В профессиональной ситуации важно уметь назвать состояние и предмет проблемы, а не переносить напряжение в обвинение личности. [1, с. 387–397]\n\n## Разбор ситуации\n\nПредставьте встречу, на которой руководитель произносит: «Хорошо, обсудим позже», при этом быстро закрывает ноутбук, избегает взгляда и выходит. Вербально фраза обещает обсуждение; невербально она может восприниматься как завершение/отсрочка без интереса. Корректный анализ не утверждает, что руководитель «точно хотел уйти от ответственности»: он фиксирует расхождение сигналов и необходимость уточняющей обратной связи. Это авторский кейс.\n\n## Самопроверка\n\nОпишите одну ситуацию общения без интерпретаций: только слова, темп, паузы, позы, дистанцию, порядок реплик. Затем отдельно напишите две возможные интерпретации. Такое разделение учит не смешивать наблюдение и вывод.\n\n## Коммуникативные барьеры в межличностном контакте\n\nБарьер не всегда означает открытый конфликт. Он может проявляться как разная интерпретация слов, неясные ожидания, недостаток доверия, различие статусов, эмоциональная перегрузка или несоответствие вербальных и невербальных сигналов. Иногда участники формально обмениваются репликами, но не достигают взаимного понимания, потому что каждый отвечает на собственную версию ситуации.\n\nДля преодоления барьера полезны уточняющие вопросы, перефразирование услышанного, обозначение цели разговора, разделение факта и оценки, проверка понимания и договорённость о следующем шаге. Эти приёмы не гарантируют согласия, но делают взаимодействие более наблюдаемым и снижают риск приписать партнёру намерение без проверки. Это авторская практическая схема, основанная на разделах о межличностной коммуникации. [1, с. 337–397]\n\n### Дистанция и статус\n\nПространство может выражать статус и характер отношений: кто занимает центральное место, кто находится перед аудиторией, кто может свободно перемещаться, есть ли возможность смотреть друг на друга и задавать вопросы. В онлайн-встрече пространственные сигналы меняются, но не исчезают: размер окна, порядок выступления, включённость камеры, право демонстрации экрана и возможность писать в чат также организуют контакт. Это авторское распространение проксемической логики на цифровую ситуацию; базовые понятия невербальной организации пространства — [1, с. 320–325].\n\n## Саморегуляция в профессиональном разговоре\n\nКоммуникативная компетентность включает способность замечать собственную реакцию. Если участник раздражён, он может ускорять темп, перебивать, говорить громче или читать нейтральный вопрос как нападение. Простое «контролируйте эмоции» недостаточно полезно; лучше назвать, что происходит, попросить паузу, уточнить предмет разногласия и вернуться к фактам/целям. Это не отменяет эмоции, а переводит их в управляемую часть взаимодействия. [1, с. 387–397]\n\n## Как читать невербальный слой корректно\n\nНевербальный слой не надо противопоставлять словам по формуле «тело всегда говорит правду». Такая формула создаёт ложную уверенность. Слова, интонация, мимика, паузы и дистанция — разные каналы одного взаимодействия; каждый из них может быть неполным, ситуативным или намеренно регулируемым. Задача анализа — заметить согласование либо расхождение каналов и сформулировать проверяемый вопрос, а не поставить психологический диагноз. [1, с. 295–336]\n\nПолезно пройти четыре шага. Сначала описать наблюдаемое: «после вопроса была долгая пауза», а не «человек растерялся». Затем обозначить контекст: публичная ли это ситуация, есть ли временное давление, каковы роли и предшествующие реплики. Далее сопоставить сигналы: совпадают ли слова с темпом, взглядом и очередностью речи. Наконец, проверить смысл обратной связью: «Правильно ли я понимаю, что решение лучше отложить?» Эта последовательность — учебный приём, выводимый из анализа неречевого поведения и условий межличностного взаимодействия у Василика. [1, с. 295–397]\n\n### Согласование и рассогласование каналов\n\nНевербальное средство может выполнять несколько функций. Оно способно повторять вербальное сообщение: кивок сопровождает согласие. Может его дополнять: спокойный темп и открытая поза делают просьбу менее категоричной. Может регулировать обмен репликами: взгляд приглашает говорить, поднятая рука удерживает очередь, пауза передаёт право ответа. Наконец, оно может противоречить словам — например, формальное «я готов обсудить» произносится с резко оборванной интонацией и уже закрытым разговором. В последнем случае корректно говорить о расхождении, а не автоматически выбирать «истинный» канал. [1, с. 302–336]\n\nВ экзаменационном задании важно различать средство и его вероятную функцию. «Интонация» — это паралингвистическое средство; «организация очередности реплик» — функция, которую могут выполнять паузы, взгляд или изменение громкости. «Дистанция между участниками» относится к проксемике; её конкретная интерпретация требует знания ситуации. Такое различение защищает от ответов, в которых термин подменяется оценкой.\n\n### Межличностная обратная связь\n\nОбратная связь в личном разговоре — не только ответ на содержание сообщения. Она также показывает, услышан ли партнёр, приемлема ли форма контакта, нужно ли уточнение и как будет продолжаться взаимодействие. Перефразирование помогает проверить понятый смысл: «Верно ли, что вы предлагаете перенести срок?» Уточняющий вопрос отделяет интерпретацию от наблюдения: «Когда вы сказали “позже”, вы имеете в виду сегодня или на следующей неделе?» [1, с. 337–397]\n\nВажно не путать обратную связь с оценкой личности. Фраза «ты всегда невнимателен» закрывает предметный разговор и приписывает устойчивое качество. Фраза «в этом обсуждении я не получил ответа на вопрос о сроке» описывает наблюдаемое затруднение и оставляет возможность его исправить. Это практический вывод из разделов об условиях и психологических предпосылках межличностного общения. [1, с. 337–397]\n\n### Цифровое межличностное общение\n\nВ переписке и видеосвязи часть привычных сигналов сокращается, но контекстная работа не исчезает. В тексте интонация и темп представлены косвенно: пунктуацией, выбором слов, задержкой ответа, структурой сообщения. В видео сохраняются голос, мимика и взгляд, но меняются пространственные отношения и очередность речи. Поэтому короткое сообщение не следует без проверки считать холодным, а выключенную камеру — доказательством незаинтересованности: возможны технические, организационные и личные причины. Это авторское применение общей логики невербального и межличностного анализа к цифровой среде. [1, с. 295–397]\n\n## Тренажёр: отделяем факт от толкования\n\nСитуация: на общей встрече сотрудник трижды смотрит в телефон, отвечает односложно и не смотрит на выступающего. Наблюдаемые факты — действия, порядок и форма ответов. Толкование «ему неинтересно» возможно, но не единственно: он может искать данные для ответа, ожидать срочное сообщение или испытывать трудности с форматом встречи. Назовите две альтернативные гипотезы и один нейтральный вопрос, который позволит проверить их. Ценность упражнения не в угадывании мотива, а в дисциплине анализа.\n\n## Задания\n\n1. Опишите, как одна и та же фраза меняет значение при разной интонации и дистанции.\n2. Разберите короткую встречу: какие вербальные и невербальные сигналы поддерживают/нарушают понимание?\n\n## Экзаменационные мини-задачи\n\n1. Спикер говорит «конечно», но отводит взгляд и делает длинную паузу. Какие невербальные средства нужно анализировать вместе с речью, прежде чем делать вывод?\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nНаблюдая короткое интервью, выпишите по одному примеру оптокинетического, проксемического, паралингвистического и экстралингвистического средства.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 91–100\n\n1. **[Один ответ]** Проксемика изучает: 1) пространство и дистанцию в общении 2) жанры 3) эффект 4) кодирование. **Ответ:** 1. [1, с. 320–325]\n2. **[Один ответ]** Паралингвистика включает: 1) темп и интонацию речи 2) только текст 3) канал 4) жанр. **Ответ:** 1. [1, с. 302–308]\n3. **[Один ответ]** Экстралингвистические средства могут включать: 1) паузы и смех 2) только слова 3) модульность 4) аудиторию. **Ответ:** 1. [1, с. 302–308]\n4. **[Один ответ]** Жесты и мимика относятся к: 1) оптокинетическим средствам 2) кодированию 3) журналистским жанрам 4) сетевому обществу. **Ответ:** 1. [1, с. 308–320]\n5. **[Один ответ]** Тактильная коммуникация связана с: 1) прикосновением 2) только письмом 3) шумом 4) алгоритмом. **Ответ:** 1. [1, с. 295–336]\n6. **[Один ответ]** Межличностная коммуникация учитывает: 1) отношения и восприятие участников 2) только канал 3) только охват 4) только жанр. **Ответ:** 1. [1, с. 337–397]\n7. **[Один ответ]** Почему один жест нельзя толковать однозначно? 1) значение зависит от контекста и сочетания сигналов 2) жесты не значат ничего 3) речь не важна 4) жанры отменяют контекст. **Ответ:** 1. [1, с. 295–336]\n8. **[Несколько ответов]** Невербальные средства могут: 1) поддерживать речь 2) уточнять её 3) противоречить ей 4) существовать только в интернете. **Ответ:** 1, 2, 3. [1, с. 295–336]\n9. **[Один ответ]** Контакт глаз относится к: 1) невербальной коммуникации 2) числовому представлению 3) жанрам 4) обратной связи только в технике. **Ответ:** 1. [1, с. 329–336]\n10. **[Один ответ]** Что корректнее в анализе невербального поведения? 1) сопоставить его с контекстом и речью 2) судить по одному жесту 3) игнорировать ситуацию 4) считать его всегда ложью. **Ответ:** 1. [1, с. 295–336]\n\n## Источник дня\n\n1. Василик М. А. (ред.). *Основы теории коммуникации*. 2003. Гл. 8–9, с. 295–397.\n","11":"# День 11. Коммуникация в малой группе и организации\n\n**Результат дня.** Вы различаете формальные и неформальные связи, понимаете функции групповой коммуникации, лидерство и коммуникацию как условие координации организации.\n\n**Карточки дня:** № 101–110 из банка 130.\n\n## Малая группа как контекст коммуникации\n\nГрупповая коммуникация возникает в непосредственном взаимодействии людей в малой группе. Она наследует ряд закономерностей межличностного общения, но добавляет структуру ролей, нормы, распределение влияния, общие задачи и групповые решения. Василик выделяет межличностную, групповую и массовую коммуникацию как разные уровни/контексты, а не как взаимоисключающие технологии. [1, с. 398–446]\n\nГруппа не равна случайной совокупности людей в одном помещении. Для анализа важны общая задача, устойчивость взаимодействия, правила, каналы обмена и динамика отношений. Коммуникация выполняет информационную, координационную, интегративную и регулятивную работу: участники узнают о ситуации, согласуют действия, поддерживают принадлежность и вырабатывают нормы. [1, с. 398–446]\n\n## Лидерство и решение\n\nЛидерство рассматривается как функция группы: оно связано с влиянием на совместную деятельность, организацией взаимодействия и достижением групповой цели. Лидер и формальный руководитель могут совпадать, но это не обязательное тождество. Руководитель получает статус через организационную структуру; лидерство проявляется в признанном влиянии и функции внутри группы. [1, с. 398–446; программа ВИ, с. 7]\n\nГрупповое решение — не простая сумма индивидуальных ответов. Оно требует постановки проблемы, обмена информацией, выработки вариантов, аргументации, обсуждения критериев и фиксации решения. Хорошая коммуникация не гарантирует согласия, но делает разногласия видимыми и управляемыми.\n\n## Организация: вертикальные, горизонтальные, формальные и неформальные потоки\n\nВ организации коммуникации обеспечивают координацию функциональных обязанностей и достижение целей. Вертикальные потоки связывают уровни статуса: нисходящие идут от руководства к исполнителям, восходящие несут обратную связь, сведения о проблемах и результатах. Горизонтальные связи возникают между участниками сопоставимого статуса, когда нужно согласовать действия подразделений. [2, с. 477–512]\n\nФормальные каналы закреплены структурой и правилами; неформальные возникают в личных связях и не исчезают от существования инструкций. Ошибка — считать любой неформальный обмен «вредным слухом»: он может быстро распространять сведения и поддерживать социальную связность, однако требует проверки достоверности и не заменяет официальную коммуникацию. [2, с. 477–512]\n\n## Как устроена коммуникация в малой группе\n\nМалая группа создаёт собственную коммуникативную структуру: кто чаще инициирует темы, кто собирает информацию, кто поддерживает участников, кто возражает, кто подводит итоги. Эти роли не обязательно закреплены должностной инструкцией и могут меняться в зависимости от задачи. Для анализа важно видеть не только отдельных «активных» участников, но и распределение доступа к информации, порядок реплик и способы принятия решения. [1, с. 398–446]\n\nГрупповые нормы помогают координации: они определяют допустимый тон, способы несогласия, порядок обсуждения, отношение к срокам и ответственности. Но нормы могут быть как продуктивными, так и препятствующими: например, стремление избегать конфликта способно скрыть важные возражения. Это авторское применение теории групповой коммуникации к учебному кейсу.\n\n### Формальная и неформальная структура\n\nФормальная структура задаётся организационными ролями, полномочиями и процедурами. Неформальная структура возникает через доверие, личную симпатию, общие интересы, опыт совместной работы и неофициальные каналы. Реальная коммуникация группы обычно проходит через обе структуры. Если руководитель игнорирует неформальную сеть, он может не заметить, как участники на самом деле получают информацию и формируют отношение к решению. [1, с. 398–446; 2, с. 477–512]\n\nНе следует называть неформальный канал «ложным» по определению. Он отличается не достоверностью, а отсутствием формального закрепления. Информация в нём может быть точной, искажённой или неполной; поэтому ключевой навык — проверка источника и возвращение значимых вопросов в официальный контур.\n\n## Групповое решение как коммуникационный процесс\n\nРешение начинается не с голосования, а с определения проблемы. Участники должны согласовать, что именно требуется решить, какие данные релевантны и по каким критериям будут сравниваться варианты. Затем формулируются альтернативы, собираются аргументы, обсуждаются риски и фиксируется итог. На каждом этапе возможны коммуникативные сбои: один участник монополизирует разговор, важные данные не доходят до группы, несогласие воспринимается как личная атака, решение формально принято, но не понято исполнителями.\n\nЛидерство в этой логике — не только право говорить первым. Лидер может удерживать задачу, распределять участие, задавать правила обсуждения, возвращать группу к критериям и обеспечивать фиксацию результата. В программе ВИ лидерство названо функцией группы; это помогает не смешивать его автоматически с административной должностью. [1, с. 398–446; программа ВИ, с. 7]\n\n## Коммуникация в организации\n\nОрганизация существует не только через схему подразделений, но и через регулярный обмен информацией. Нисходящие сообщения сообщают цели, правила, решения и задачи. Восходящие дают руководству данные о ходе работы, проблемах, предложениях и реакции сотрудников. Горизонтальные связывают подразделения, которые должны согласовать взаимозависимые действия. [2, с. 477–512]\n\nНарушение одного потока может вызвать ошибочный вывод о «плохом исполнении», хотя проблема находится в коммуникации. Например, задача может быть поставлена сверху, но критерии успеха не объяснены; сотрудники выполнят её по-разному, а обратная связь поступит слишком поздно. Поэтому в учебном кейсе проверяйте: кто отправил сообщение, по какому каналу, какие уточнения были доступны, как фиксировалось понимание и кто получил результат.\n\n### Внутренние коммуникации и доверие\n\nВнутренние коммуникации важны не только для передачи инструкций. Они формируют представление сотрудников о справедливости процессов, доступности руководства, возможности задавать вопросы и признавать ошибки. Нельзя измерять их качество одним количеством рассылок: нужно смотреть, понятны ли сообщения, доходят ли они до нужных ролей, есть ли безопасная обратная связь и превращается ли она в действия. Это авторское прикладное пояснение к разделу об организационных коммуникациях. [2, с. 477–512]\n\n## Сети, роли и доступ к информации\n\nВ группе сообщение редко циркулирует одинаково между всеми участниками. Один участник может быть центром обмена, другой — связующим звеном между подгруппами, третий — носителем специальной информации, четвёртый — почти не включённым в обсуждение. Эта схема не описывает личную ценность людей; она показывает, как устроен доступ к данным и влиянию в конкретной задаче. При смене задачи структура может измениться: технический эксперт становится ключевым в обсуждении технологии, а координатор — в согласовании сроков. [1, с. 398–446]\n\nДля анализа кейса полезно спросить: кто имеет право инициировать тему; кто может остановить решение; кто получает информацию первым; кто передаёт её дальше; кто отвечает за итоговую фиксацию. Если все сообщения проходят через одного человека, появляется риск перегрузки и задержки. Если связи слишком разрозненны, часть участников может действовать по разным версиям задачи. Это авторская аналитическая схема, основанная на положениях о структуре и динамике групповой коммуникации. [1, с. 398–446]\n\n### Роли в обсуждении\n\nКоммуникативная роль — это функция в совместном взаимодействии, а не неизменная характеристика личности. В одном обсуждении участник может инициировать решение, в другом — уточнять критерии, собирать факты, поддерживать рабочий климат, критиковать слабые аргументы или подводить итоги. Продуктивная группа не требует, чтобы все выполняли одинаковую роль; ей нужны условия, при которых нужные функции не выпадают и могут быть замечены.\n\nОсобенно важно отделять критическое замечание от личной атаки. Фраза «этот вариант не учитывает срок поставки» проверяет решение; фраза «ты всегда всё портишь» переводит разговор в оценку человека. Нормы безопасного несогласия позволяют группе обнаружить ошибку до того, как она станет организационной проблемой. Это авторский практический вывод из материала о групповой коммуникации и лидерстве. [1, с. 398–446]\n\n## Принятие решения: от обмена мнениями к исполнению\n\nПосле обсуждения группе необходимо не только выбрать вариант, но и зафиксировать, что именно принято, почему, кто отвечает за следующий шаг и когда будет проверен результат. Иначе участники могут выйти со встречи с разными представлениями о договорённости. Коммуникационный результат решения включает общую интерпретацию, а не только формальное большинство голосов.\n\nНадёжная процедура выглядит так: сформулировать вопрос; назвать критерии; собрать факты и альтернативы; дать возможность высказать аргументы; выбрать способ решения; зафиксировать действие, срок и ответственного; предусмотреть канал для уточнений. Это не единственный универсальный алгоритм, а учебная рамка, развивающая положения о групповой координации и организационных потоках. [1, с. 398–446; 2, с. 477–512]\n\n### Совещание как коммуникационная форма\n\nСовещание оправдано, когда участникам требуется совместно интерпретировать проблему, сопоставить взаимозависимые действия или принять решение. Если необходимо только передать однозначную информацию, достаточно более простого канала. На совещании полезно заранее обозначить цель: информирование, сбор идей, согласование, решение или контроль исполнения. Смешение целей приводит к тому, что участники не понимают, должны ли они слушать, предлагать, спорить или выполнять.\n\nПротокол, краткий итог письмом или общий список действий — не бюрократическая формальность, а форма обратной связи. Он позволяет проверить, одинаково ли участники поняли решение, и делает ошибки интерпретации видимыми до исполнения. Это авторское прикладное пояснение к разделу об организационных коммуникациях. [2, с. 477–512]\n\n## Диагностика организационного сбоя\n\nЕсли проект задерживается, не следует сразу объяснять это личной неэффективностью. Проверьте коммуникационную цепочку: была ли задача сформулирована; получил ли её исполнитель; были ли определены критерии; мог ли он задать вопрос; дошёл ли риск по восходящему каналу; согласовали ли подразделения взаимозависимые действия; кто зафиксировал решение. Такой разбор помогает увидеть, где именно произошёл разрыв — в содержании, канале, сроке, роли или обратной связи. [2, с. 477–512]\n\n## Самопроверка\n\nВозьмите групповую задачу и нарисуйте три схемы: формальная структура, фактические неформальные связи, потоки информации по задаче. Затем отметьте один риск — где данные могут исказиться, задержаться или остаться без ответа.\n\n## Задания\n\n1. Составьте схему группы из пяти человек: кто инициирует, кто уточняет, кто влияет на решение, где возникает обратная связь.\n2. Разделите сообщение о смене дедлайна на нисходящий, восходящий и горизонтальный потоки.\n\n## Экзаменационные мини-задачи\n\n1. В команде сотрудник влияет на решения без формальной должности руководителя. Как различить формального руководителя и неформального лидера?\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nСоставьте схему внутренней коммуникации организации: формальные и неформальные каналы, риск искажения, способ получить обратную связь.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 101–110\n\n1. **[Один ответ]** Групповая коммуникация происходит прежде всего: 1) в непосредственном взаимодействии малой группы 2) только в СМИ 3) только в технике 4) без участников. **Ответ:** 1. [1, с. 398–446]\n2. **[Несколько ответов]** Для группы значимы: 1) роли 2) нормы 3) общая задача 4) динамика взаимодействия. **Ответ:** 1, 2, 3, 4. [1, с. 398–446]\n3. **[Один ответ]** Лидерство в программе ВИ описано как: 1) функция группы 2) вид шума 3) жанр 4) канал. **Ответ:** 1. [1, с. 398–446]\n4. **[Один ответ]** Руководитель и лидер: 1) могут не совпадать 2) всегда тождественны 3) не связаны с группой 4) являются только каналами. **Ответ:** 1. [1, с. 398–446]\n5. **[Один ответ]** Нисходящая коммуникация идёт: 1) от руководства к исполнителям 2) от исполнителей к руководству 3) между равными подразделениями 4) вне организации. **Ответ:** 1. [2, с. 477–512]\n6. **[Один ответ]** Восходящая коммуникация важна для: 1) обратной связи и сведений о проблемах 2) отмены руководства 3) только рекламы 4) жанров. **Ответ:** 1. [2, с. 477–512]\n7. **[Один ответ]** Горизонтальная коммуникация связывает: 1) участников сопоставимого статуса 2) только директора и работника 3) только аудиторию и СМИ 4) автора и текст. **Ответ:** 1. [2, с. 477–512]\n8. **[Несколько ответов]** Каналы в организации бывают: 1) формальные 2) неформальные 3) вертикальные 4) горизонтальные. **Ответ:** 1, 2, 3, 4. [2, с. 477–512]\n9. **[Один ответ]** Неформальная коммуникация: 1) не заменяет проверку и официальные каналы 2) всегда не существует 3) всегда ложна 4) является техническим шумом. **Ответ:** 1. [2, с. 477–512]\n10. **[Один ответ]** Коммуникация в организации нужна прежде всего для: 1) координации совместной деятельности 2) отмены задач 3) только развлечения 4) замены всех решений. **Ответ:** 1. [2, с. 477–512]\n\n## Источники дня\n\n1. Василик М. А. (ред.). *Основы теории коммуникации*. 2003. Гл. 10, с. 398–446.\n2. Василик М. А. (ред.). *Основы теории коммуникации*. 2003. Гл. 12, с. 477–512.\n","12":"# День 12. Массовая коммуникация: аудитория, информация и эффекты\n\n**Результат дня.** Вы отличаете массовую коммуникацию от межличностной, различаете массу, толпу, публику и аудиторию в экзаменационной логике, осторожно оцениваете эффекты.\n\n**Карточки дня:** № 111–120 из банка 130.\n\n## Что делает коммуникацию массовой\n\nМассовая коммуникация связана с распространением социальной информации широким, рассредоточенным во времени и пространстве аудиториям через искусственные каналы. Для неё важны профессиональные коммуникаторы, организованное производство сообщений, технические средства распространения и массовая аудитория. [1, с. 447–453]\n\nМассовая информация — социальная информация, предназначенная для широких аудиторий. Её ценность нельзя измерять только количеством: важны востребованность, доступность, полнота, своевременность, достоверность, этичность и соответствие адресату. [1, с. 450–456]\n\n## Масса, толпа, публика, аудитория\n\nЭти понятия не являются синонимами. Толпа обычно описывает физически собранное, эмоционально вовлечённое множество; публика — людей, объединённых вниманием к общественно значимому вопросу; аудитория — адресатов или потребителей конкретного сообщения/медиа; масса — более широкая категория, часто связанная с анонимностью и рассредоточенностью. В тесте ориентируйтесь на признаки конкретной ситуации, а не на эмоциональную окраску слова. [1, с. 447–476; программа ВИ, с. 8]\n\nСовременная медийная среда размывает жёсткое разделение межличностной и массовой коммуникации: пользователь может получить массовое сообщение, обсудить его в личном чате и сам создать материал для широкой аудитории. Это не отменяет различий уровней, а требует видеть переходы между ними. [1, с. 447–476]\n\n## Эффекты и оценка результативности\n\nЭффект массовой коммуникации нельзя автоматически выводить из охвата. Василик подчёркивает, что изменения в сознании и поведении лишь частично зависят от СМК: на результат влияют множество факторов и сам реципиент. Для обоснованной оценки эффекта нужен как минимум сопоставимый замер состояния аудитории во времени и ясная цель коммуникации. [1, с. 473–475]\n\n## Производство, распространение и потребление массовой информации\n\nМассовая коммуникация предполагает не одиночный разговор, а организованную цепочку: подготовка сообщения, редакционный или иной профессиональный отбор, техническое распространение, получение и интерпретация аудиторией, реакция и её возможное возвращение к коммуникатору. Поэтому источник массового сообщения — не просто конкретный автор; часто это редакция, организация или другой институт со своими правилами, ресурсами и ответственностью. [1, с. 447–476]\n\nТехническая доступность канала не гарантирует, что сообщение будет замечено и понято одинаково. Аудитория различается по опыту, интересам, социальному положению, уровню доверия к источнику и ситуации потребления. Один материал может быть прочитан внимательно, просмотрен фрагментарно, переслан без контекста или проигнорирован. Это согласуется с осторожной трактовкой роли реципиента в массовой коммуникации. [1, с. 447–476]\n\n### Адресат и аудитория\n\nАдресат — тот, кому сообщение предполагается направить; аудитория — реальная или потенциальная совокупность тех, кто его получает и интерпретирует. Эти понятия близки, но в практическом анализе полезно различать проектируемую и фактическую аудиторию. Редакция может планировать материал для одной группы, а распространение в сети приведёт его к другой, у которой отсутствует исходный контекст. Тогда меняется не только охват, но и возможная интерпретация.\n\nЧтобы описать аудиторию, недостаточно назвать её «молодёжью» или «всеми пользователями». Нужно указать релевантный признак: отношение к теме, медиапрактику, территорию, роль, уровень знания, мотив потребления. Это авторская прикладная рекомендация, выводимая из раздела Василика об аудитории и массовой информации. [1, с. 447–476]\n\n## Обратная связь в массовой среде\n\nВ массовой коммуникации обратная связь может быть отсроченной, неполной и агрегированной. Её источниками становятся обращения, письма, комментарии, данные об использовании, опросы, обсуждения в других медиа и изменения в поведении аудитории. Наличие реакции не означает автоматически положительный эффект: необходимо понимать, кто реагирует, на что именно и насколько эта группа представляет всю аудиторию. [1, с. 447–476]\n\nЦифровая среда ускоряет обратную связь, но также делает её видимой неравномерно: наиболее активные участники могут создавать впечатление общего мнения. Поэтому количество комментариев или просмотров — это показатель активности вокруг материала, но не доказательство знания, изменения установки или действия всей аудитории. Такой вывод согласуется с требованием не сводить эффект к одному количественному показателю. [1, с. 473–475]\n\n### Эффект, результат и показатель\n\nДля экзамена полезно развести три уровня. **Показатель** — наблюдаемая величина: охват, число переходов, доля ответивших. **Результат** — достижение поставленной цели, например рост информированности определённой группы. **Эффект** — изменение в сознании, отношении или поведении, которое связывают с коммуникацией, учитывая другие факторы. Чем сильнее утверждение об эффекте, тем более убедительное исследовательское основание требуется. [1, с. 473–475]\n\nЕсли кампания получила большой охват, корректно утверждать, что сообщение стало доступно многим. Нельзя без дополнительных данных утверждать, что все изменили мнение или поступили определённым образом. Такой ответ демонстрирует понимание ограниченности прямых причинных выводов в теории массовой коммуникации.\n\n## Разбор медийной ситуации\n\nНовостной материал о городской проблеме получает миллион просмотров, но исследователь хочет понять, изменилось ли отношение жителей к теме. Просмотры показывают потенциальный контакт с сообщением, но не заменяют измерение отношения. Нужны вопрос о целевой аудитории, исходный замер или сопоставимая группа, понятный период наблюдения и осторожная интерпретация результатов. Это учебный кейс, основанный на разделе Василика об эффективности массовой коммуникации. [1, с. 473–475]\n\n## Структура массовой коммуникации\n\nМассовая коммуникация предполагает не просто большое число людей. Важны организованное производство и распространение сообщения, технически опосредованный канал, широкая и рассредоточенная аудитория, а также возможность измерять/интерпретировать реакцию. Профессиональные коммуникаторы могут быть журналистами, редакторами, специалистами по связям с общественностью, рекламодателями, экспертами и другими участниками, которые работают с широкой аудиторией в соответствии с поставленной целью. [1, с. 447–453]\n\nПри этом современная аудитория не только принимает массовую информацию: пользователи могут комментировать, пересылать, перерабатывать и создавать собственные материалы. Это усложняет границу между массовой и межличностной коммуникацией, но не устраняет понятие массовой коммуникации. Вопрос остаётся в масштабе, способе распространения, типе аудитории и институциональной организации сообщения.\n\n### Аудитория не равна абстрактной массе\n\nАудитория — конкретная группа адресатов или потребителей определённого сообщения/медиа. Её можно анализировать по интересам, знаниям, доступу к каналу, практикам потребления и социальному контексту. Масса, толпа и публика описывают другие формы коллективности. В экзаменационной задаче не подставляйте любое из этих слов вместо «аудитории»: смотрите на признаки ситуации. [1, с. 447–476; программа ВИ, с. 8]\n\nТолпа предполагает физическую собранность и непосредственное взаимное влияние. Публика связана с вниманием к общественно значимой проблеме, даже если её участники не собраны в одном месте. Масса чаще обозначает широкое рассредоточенное множество, не связанное устойчивыми личными отношениями. Эти различия полезны как аналитические идеальные типы; реальные ситуации могут соединять их признаки.\n\n## Массовая информация: содержание и качество\n\nМассовая информация имеет социальный характер: она связана с процессами экономической, политической, культурной и иной общественной жизни. Её качество определяется не только объёмом. Василик называет востребованность, полезность, интересность, эмоциональную окраску, а при оценке ценности — доступность, полноту, достоверность, своевременность, этичность и другие характеристики. [1, с. 450–456]\n\nПроверяйте формулировки в тесте. Большое число сообщений не обязательно устраняет дефицит информации: если материалы недостоверны, непонятны, не соответствуют потребностям или недоступны адресату, количественный рост не решает проблему. В то же время полезная информация может быть не самой развлекательной. Это следует из различения количественных и качественных характеристик массовой информации. [1, с. 450–456]\n\n## Эффекты: почему осторожность обязательна\n\nМассовая коммуникация может быть связана с изменениями знания, отношения, эмоций, поведения, социализации и общественных практик. Но установить причинную связь трудно: на аудиторию одновременно действуют другие медиа, межличностное общение, предшествующие установки, события и индивидуальные особенности. Василик подчёркивает, что большинство изменений в действительности лишь частично зависит от СМК и что в создании эффекта участвует сам реципиент. [1, с. 473–475]\n\nЧтобы оценить результативность кампании, нужно сначала назвать цель: информирование, изменение осведомлённости, отношение, побуждение к действию, поддержание доверия. Затем выбрать показатель, измерить его до/после или сопоставить с релевантной группой, а также проверить альтернативные объяснения. Это не гарантирует абсолютного доказательства, но делает вывод об эффекте гораздо обоснованнее, чем ссылка на охват или число публикаций. [1, с. 473–475]\n\n### Позитивные и непреднамеренные последствия\n\nЭффект не всегда совпадает с целью источника. Кампания может повысить знание, но вызвать недоверие; привлечь внимание к проблеме, но усилить конфликт; породить обсуждение без изменения поведения. Поэтому в ответе полезно различать запланированный результат и наблюдаемые последствия. Эта учебная рамка соответствует предупреждению источника о сложности оценки эффективности массовой коммуникации. [1, с. 473–475]\n\n## Массовое и межличностное в цифровой среде\n\nЦифровой пост может быть адресован массовой аудитории, затем переслан в семейный чат, обсуждён лично и возвращён в публичное поле через комментарий или пользовательский ролик. Такое перемещение показывает слияние форм коммуникации, упомянутое в программе ВИ. Однако для каждого конкретного шага можно определить преобладающий тип: исходная публикация — массовая; личный разговор — межличностный; обсуждение в рабочей команде — групповое. [Программа ВИ, с. 8; 1, с. 447–476]\n\n## Самопроверка\n\nДля любого массового сообщения запишите: источник, цель, аудиторию, канал, ожидаемый эффект, возможные побочные эффекты и данные, без которых нельзя считать результат доказанным. Если в последней графе вы пишете только «просмотры», вернитесь к разделу об эффективности.\n\n## Задания\n\n1. Определите, кто в кейсе является аудиторией, публикой, толпой или массой.\n2. Составьте минимальную схему оценки кампании: цель, показатель до, показатель после, внешние факторы.\n\n## Экзаменационные мини-задачи\n\n1. Новость сначала обсуждают лидеры мнений, а затем она меняет мнения их окружения. Выберите модель массовой коммуникации и объясните последовательность влияния.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nДля одного массового сообщения заполните таблицу: аудитория, ожидаемый эффект, возможная селективность восприятия, способ измерения результата.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 111–120\n\n1. **[Один ответ]** Массовая информация распространяется: 1) широким рассредоточенным аудиториям через искусственные каналы 2) только одному человеку 3) только без техники 4) только в семье. **Ответ:** 1. [1, с. 447–453]\n2. **[Один ответ]** Аудитория — это: 1) адресаты/потребители сообщения или медиа 2) только толпа на площади 3) технический канал 4) жанр. **Ответ:** 1. [1, с. 447–476]\n3. **[Один ответ]** Публика объединена прежде всего: 1) вниманием к общественно значимому вопросу 2) одним устройством 3) только близостью тел 4) общей профессией. **Ответ:** 1. [1, с. 447–476]\n4. **[Один ответ]** Толпа обычно характеризуется: 1) физической собранностью и эмоциональной вовлечённостью 2) рассредоточенностью во времени 3) только чтением газет 4) модульностью. **Ответ:** 1. [1, с. 447–476]\n5. **[Несколько ответов]** Для качества массовой информации важны: 1) достоверность 2) доступность 3) своевременность 4) этичность. **Ответ:** 1, 2, 3, 4. [1, с. 450–456]\n6. **[Один ответ]** Охват без других данных: 1) не доказывает эффект 2) всегда доказывает изменение поведения 3) отменяет аудиторию 4) является жанром. **Ответ:** 1. [1, с. 473–475]\n7. **[Один ответ]** Для оценки эффекта нужна: 1) ясная цель и сопоставление состояния аудитории 2) только число лайков 3) только мнение автора 4) отсутствие данных. **Ответ:** 1. [1, с. 473–475]\n8. **[Один ответ]** Почему межличностная и массовая коммуникация могут пересекаться? 1) массовый контент обсуждают и создают пользователи в личных сетях 2) они всегда полностью изолированы 3) нет пользователей 4) нет медиа. **Ответ:** 1. [1, с. 447–476]\n9. **[Несколько ответов]** В модели массовой коммуникации важны: 1) сообщение 2) профессиональный коммуникатор 3) аудитория 4) канал. **Ответ:** 1, 2, 3, 4. [1, с. 447–453]\n10. **[Один ответ]** Изменения аудитории зависят: 1) не только от СМК, но и от иных факторов 2) только от одного ролика 3) только от жанра 4) только от шума. **Ответ:** 1. [1, с. 473–475]\n\n## Источник дня\n\n1. Василик М. А. (ред.). *Основы теории коммуникации*. 2003. Гл. 11, с. 447–476.\n","13":"# День 13. Профессиональная и PR-коммуникация: переговоры, события, репутация\n\n**Результат дня.** Вы применяете коммуникационные модели к организации, переговорам, событию, бренду и PR; отличаете инструмент от цели и строите связный разбор комплексного кейса.\n\n**Карточки дня:** № 121–130 из банка 130.\n\n## Профессиональная коммуникация как целенаправленное взаимодействие\n\nПрофессиональная коммуникация происходит в связи с деятельностью, ролями, задачами и ответственностью участников. Она включает не только передачу информации, но и координацию, принятие решений, представление организации, управление отношениями и репутацией. В организации коммуникация необходима для согласования действий и выполнения функциональных обязанностей. [1, с. 477–512]\n\nPR-коммуникация направлена на построение и поддержание отношений организации с её общественностями. В экзаменационной логике репутация, имидж, бренд, событие, рекламная кампания и антикризисная работа рассматриваются как коммуникативные процессы: в них есть источник, цели, сообщение, аудитории, каналы, обратная связь и оценка результатов. [2, с. 95–113; программа ВИ, с. 8]\n\n## Переговоры\n\nПереговоры — специфический вид деловой коммуникации, в котором стороны совместно анализируют проблему и стремятся согласовать решение. Василик противопоставляет конфронтационный подход, где стороны мыслят переговоры как победу/поражение, и партнёрский подход, основанный на поиске взаимоприемлемого решения. Стратегическая цель переговоров — найти решение, не доводя взаимодействие до крайней формы конфликта. [1, с. 505–512]\n\nПодготовка к переговорам включает прояснение целей, интересов, ограничений, ресурсов, участников и критериев возможного соглашения. Хороший результат — не просто формально достигнутое соглашение, а решение, которое в разумной мере отвечает интересам сторон и не разрушает отношения, если они должны продолжаться. [1, с. 505–512]\n\n## События, бренд и цифровые PR-инструменты\n\nСобытие, выставка, пресс-конференция или рекламная кампания — не «коммуникация сами по себе», а организованные ситуации коммуникации. Нужны цель, аудитории, содержание, сценарий, каналы приглашения и освещения, обратная связь и критерии оценки. В пресс-коммуникации важно различать информационный повод, сообщение, подготовленные материалы и работу с вопросами. [1, с. 539–576]\n\nSMM, SEO, SERM, influencer marketing и вирусный маркетинг в программе ВИ перечислены как сетевые PR-коммуникации. На экзамене не подменяйте ими саму PR-стратегию: это инструменты и каналы, а стратегия определяет цели, аудитории, ключевые сообщения, ресурсы и способ оценки результата. [программа ВИ, с. 8; 2, с. 95–113]\n\n## Комплексный алгоритм\n\n1. Определите проблему и цель коммуникации.\n2. Назовите ключевые аудитории и их контекст.\n3. Сформулируйте сообщение и выберите каналы.\n4. Предусмотрите обратную связь, риски и ответственные роли.\n5. Установите, какой результат можно измерить: знание, отношение, действие, качество отношений или иной показатель.\n\nЭто авторский учебный алгоритм, основанный на модели Лассуэлла и организационных/профессиональных формах коммуникации. [1, с. 477–512, 539–576; 2, с. 95–113]\n\n## Стратегия, тактика и инструмент\n\nВ профессиональной коммуникации важно различать уровни решения. **Стратегия** отвечает на вопросы: какую проблему решаем, для кого, с какой долгосрочной целью, каким образом будем оценивать результат. **Тактика** — конкретные шаги и форматы: серия публикаций, встреча, пресс-конференция, письмо, партнёрский проект. **Инструмент** — отдельное средство работы: социальная сеть, поисковая оптимизация, рассылка, презентация, аналитика упоминаний. Смешение этих уровней ведёт к слабой формулировке: например, «стратегия — вести соцсети» называет канал, но не объясняет цель и аудиторию.\n\nМодель Лассуэлла полезна как базовая проверка любой профессиональной коммуникации: кто говорит от имени организации, что именно сообщается, через какой канал, кому и какой эффект предполагается. Для реальной работы к пяти вопросам добавляются цель, ситуация, ресурсы, риски, обратная связь и критерии оценки. [1, с. 95–113]\n\n## PR-коммуникация и репутация\n\nPR-коммуникация направлена не только на разовое привлечение внимания, но и на отношения организации с разными общественностями: сотрудниками, клиентами, партнёрами, журналистами, местными сообществами, инвесторами и регуляторами. У этих аудиторий могут быть разные интересы, уровень знания и ожидания; одна формулировка не всегда подходит всем. Программа ВИ относит к профессиональным коммуникациям интегрированные, стратегические и PR-коммуникации, а также работу с репутацией, брендом и антикризисными ситуациями. [Программа ВИ, с. 8]\n\nРепутация не равна красивому образу в рекламе. Она складывается из повторяющихся представлений и опыта взаимодействия с организацией. Коммуникация может объяснять решения, отвечать на вопросы, делать обязательства видимыми и поддерживать доверие, но не может устойчиво заменить реальное качество действий. Это авторское прикладное пояснение к теме PR-коммуникаций.\n\n### Антикризисная коммуникация\n\nКризисный кейс требует не просто «выпустить пост». Сначала нужно установить факты и границы известного, определить затронутые аудитории, назначить ответственных за сообщения и обратную связь, выбрать понятные каналы и сообщить, какие действия предпринимаются. Нельзя компенсировать отсутствие информации уверенными заявлениями: противоречия подрывают доверие сильнее, чем признание того, что часть данных ещё проверяется.\n\nДля учебного ответа используйте последовательность: факт ситуации → аудитории и их риски → цель сообщения → ключевые формулировки → каналы → обратная связь → критерии обновления информации. Это авторский алгоритм, согласованный с коммуникационной моделью и организационной логикой. [1, с. 95–113; 2, с. 477–512]\n\n## Переговоры как совместное решение\n\nПереговоры не сводятся к обмену требованиями. Стороны могут иметь разные позиции, но за ними часто находятся интересы: сроки, ресурсы, репутация, безопасность, контроль, качество результата. Партнёрский подход предлагает совместно анализировать проблему и искать решение, которое учитывает значимые интересы сторон; конфронтационный строится на логике выигрыша/проигрыша. [2, с. 505–512]\n\nПодготовка включает сбор информации о ситуации, определение целей и минимально приемлемых условий, возможных альтернатив, полномочий участников и критериев решения. Во время переговоров важны активное слушание, уточнение терминов, фиксация договорённостей и разделение людей и проблемы. После — документирование решения, сроков и ответственных. Эти практические шаги развивают положения источника о цели и подготовке переговоров. [2, с. 505–512]\n\n## Событие и публичная коммуникация\n\nВыставка, пресс-конференция, запуск проекта или публичная дискуссия — это спроектированные коммуникативные ситуации. Нужно определить, кого приглашают, зачем, что участники должны узнать/почувствовать/сделать, какие материалы будут доступны, как организован сценарий и как будет собрана обратная связь. Василик рассматривает публичные формы коммуникации, в том числе деловые встречи, обсуждения и пресс-конференции, как жанрово и статусно организованные события. [2, с. 539–576]\n\nПресс-конференция не равна просто набору вопросов. Ей нужны информационный повод, понятная повестка, спикеры с распределёнными ролями, подготовленные факты, материалы для журналистов и правила работы с вопросами. Если вопрос не известен заранее, это не повод придумывать ответ: профессиональная реакция может обозначить границу знания и обещание уточнить информацию.\n\n## Цифровые PR-инструменты\n\nSMM, SEO, SERM, influencer marketing и вирусный маркетинг перечислены в программе как сетевые PR-коммуникации. SMM связан с работой в социальных медиа; SEO — с видимостью материалов в поиске; SERM — с управлением и анализом репутации в поисковой/цифровой среде; influencer marketing — с коммуникацией через лидеров/авторов, обладающих аудиторным доверием. Эти термины нужны для распознавания инструментов, но не должны заменять анализ цели, аудитории и измерения результата. [Программа ВИ, с. 8]\n\n## Итоговый разбор комплексного кейса\n\nНа экзамене сложный вопрос может соединять жанр, модель коммуникации, аудиторию и профессиональную ситуацию. Начните с того, что назовите уровень: это теория медиа, коммуникационный процесс, тип аудитории или профессиональная практика? Затем выделите факты условия, исключите варианты из другой рамки и только после этого выбирайте ответ. Для множественного выбора оценивайте каждый вариант отдельно: он может быть верным сам по себе, но не отвечать на данный вопрос.\n\n## Планирование профессиональной коммуникации\n\nПрофессиональная коммуникация начинается не с изготовления сообщения, а с постановки задачи. Нужно описать исходную ситуацию: что произошло, почему это значимо для организации и общественностей, какие сведения подтверждены, что остаётся неизвестным. Затем формулируется цель: она отличается от действия исполнителя. «Опубликовать пресс-релиз» — действие; «объяснить изменение условий клиентам и снизить число ошибочных обращений» — возможная коммуникационная цель. [1, с. 477–512; 2, с. 95–113]\n\nПосле цели определяются аудитории. У одной ситуации может быть несколько общественностей: клиенты хотят понять практические последствия, сотрудники — порядок действий, журналисты — проверяемые факты, партнёры — риски для совместного процесса. Нельзя механически отправлять всем один и тот же текст, не меняя содержательную точность. Адаптация означает выбрать понятный язык, релевантный канал и нужный объём контекста, но не означает давать разным группам противоречивые факты. Это авторское прикладное развитие логики публичной и организационной коммуникации. [1, с. 477–512, 539–576]\n\n### Сообщение, канал и ответственность\n\nСообщение должно отвечать на вопросы аудитории: что произошло, что это меняет, что организация делает, где получить уточнение и когда появится следующая информация. Канал выбирается по доступности и функции: инструкция сотрудникам, публичное заявление, ответ журналистам, личная встреча и публикация в социальной сети решают разные задачи. Один и тот же канал может быть удобным, но неподходящим, если аудитория не использует его как источник значимой информации.\n\nВ профессиональной коммуникации важно указать, кто имеет право говорить от имени организации и кто отвечает за обновление информации. Отсутствие роли спикера и процесса согласования создаёт риск противоречивых комментариев. Однако согласование не должно превращаться в молчание: если ответ ещё не готов, можно честно обозначить проверяемые факты, границы неизвестного и время следующего сообщения. Это учебная рекомендация, согласованная с моделью коммуникационного процесса и разделами о публичной коммуникации. [1, с. 95–113, 539–576]\n\n## Измерение и корректировка\n\nОценка — часть коммуникационного проекта, а не финальная декоративная цифра. До запуска нужно решить, какой признак будет свидетельствовать о движении к цели: понимание инструкции, число корректно оформленных заявок, тональность и содержание вопросов, регистрация на событие, готовность аудитории к диалогу. Выбор показателя связан с целью, а не с тем, что проще посчитать.\n\nПолученные данные нужно интерпретировать в контексте. Рост упоминаний может означать интерес, конфликт или расширение аудитории; число публикаций — работу со СМИ, но не обязательно доверие. Поэтому полезно сочетать количественные данные с анализом содержания обращений и вопросов. Этот подход переносит различение эффекта, результата и показателя на профессиональную коммуникацию. [1, с. 447–476; 2, с. 95–113]\n\n### Этическая граница\n\nКоммуникативная эффективность не оправдывает сокрытие существенных рисков, манипуляцию фактами или выдачу предположения за подтверждённую информацию. В долгосрочной работе репутация поддерживается согласованием слов и действий, возможностью аудитории задать вопрос и получить проверяемый ответ. Это авторское нормативное следствие темы отношений организации с общественностями; в учебном ответе оно помогает отличить стратегическую коммуникацию от чисто инструментального привлечения внимания.\n\n## Тренажёр комплексного ответа\n\nСитуация: сервис меняет порядок возврата товара; в социальных медиа уже появились тревожные сообщения. Постройте ответ по схеме: 1) факты и неопределённости; 2) затронутые общественности; 3) цель каждой коммуникации; 4) ключевые сообщения; 5) каналы и ответственные; 6) обратная связь; 7) показатели, по которым можно понять, что инструкция стала яснее. Не ограничивайтесь фразой «написать пост»: покажите различие стратегии, тактики и инструмента.\n\n## Самопроверка\n\nВыберите любую кампанию и составьте одностраничный коммуникационный паспорт: проблема; цель; общественности; ключевое сообщение; каналы; риски; обратная связь; показатели результата. Проверьте, не подменили ли вы цель названием инструмента.\n\n## Задания\n\n1. Разберите кризисный кейс компании по пяти вопросам Лассуэлла и добавьте обратную связь.\n2. Подготовьте план переговоров: цели сторон, интересы, варианты решения, риски, критерии соглашения.\n3. Составьте коммуникационную схему мероприятия: аудитория, приглашение, сценарий, медиа-материалы, сбор обратной связи.\n\n## Экзаменационные мини-задачи\n\n1. Организация отвечает на кризис в соцсетях, СМИ и на встрече с сотрудниками. Подберите функцию каждого канала и объясните, почему одного сообщения недостаточно.\n\n2. Дайте ответ в 3–5 предложениях: назовите ключевое понятие, укажите признак из условия и исключите один близкий, но неверный термин.\n\n## Тренировка\n\nСоставьте краткий план кризисной коммуникации: аудитории, проверенные факты, ответственный спикер, каналы, обратная связь и показатель результата.\n\nПосле выполнения сверьте определения с теорией главы и коротко проговорите, почему альтернативный термин здесь не подходит.\n\n## Быстрые карточки № 121–130\n\n1. **[Один ответ]** Переговоры — это: 1) деловая коммуникация для согласования решения 2) только жанр журналистики 3) технический шум 4) вид кодирования. **Ответ:** 1. [1, с. 505–512]\n2. **[Один ответ]** Партнёрский подход к переговорам предполагает: 1) поиск взаимоприемлемого решения 2) обязательное поражение одной стороны 3) отсутствие целей 4) отказ от общения. **Ответ:** 1. [1, с. 505–512]\n3. **[Один ответ]** Конфронтационный подход мыслит переговоры как: 1) победу и поражение сторон 2) общий поиск решения 3) вид шума 4) массовую информацию. **Ответ:** 1. [1, с. 505–512]\n4. **[Несколько ответов]** Подготовка переговоров включает: 1) цели 2) интересы 3) ограничения 4) ресурсы. **Ответ:** 1, 2, 3, 4. [1, с. 505–512]\n5. **[Один ответ]** PR-коммуникация связана с: 1) отношениями организации с общественностями 2) только техническим каналом 3) только жанром 4) только жестами. **Ответ:** 1. [программа ВИ, с. 8]\n6. **[Один ответ]** SMM, SEO и SERM в PR — это: 1) инструменты/каналы, а не вся стратегия 2) единственная цель PR 3) виды шума 4) жанры журналистики. **Ответ:** 1. [программа ВИ, с. 8]\n7. **[Один ответ]** Коммуникационная цель события требует: 1) определить аудиторию, сообщение и обратную связь 2) только выбрать зал 3) только напечатать афишу 4) отказаться от оценки. **Ответ:** 1. [1, с. 539–576]\n8. **[Несколько ответов]** Что может быть результатом профессиональной коммуникации? 1) знание 2) отношение 3) действие 4) качество отношений. **Ответ:** 1, 2, 3, 4. [2, с. 95–113]\n9. **[Один ответ]** Репутация и имидж в курсе рассматриваются как: 1) объекты коммуникативной работы 2) виды шума 3) технические приборы 4) жанры. **Ответ:** 1. [программа ВИ, с. 8]\n10. **[Один ответ]** Что нельзя считать достаточным критерием успеха PR-кампании? 1) только количество публикаций без оценки цели и результата 2) измерение реакции аудитории 3) анализ достижения цели 4) обратную связь. **Ответ:** 1. [2, с. 95–113]\n\n## Источники дня\n\n1. Василик М. А. (ред.). *Основы теории коммуникации*. 2003. Гл. 12, с. 477–512; гл. 14, с. 539–576.\n2. Гавра Д. П. *Основы теории коммуникации*. 2011. С. 95–113.\n3. Программа вступительного испытания «Реклама и коммуникации», 2026. С. 8 — используется только как карта экзаменационных терминов и форматов, не как источник теории.\n","01":"# Подготовительный учебник: 13 дней × 60 минут\n\n## День 1 — ранние теории медиа: эффекты и модель Лассуэлла\n\n**Результат дня.** После занятия вы сможете: (1) объяснить, почему ранние эмпирико-функционалистские исследования искали измеримые эффекты медиа; (2) отличить представление о сильных эффектах от представления об ограниченных эффектах; (3) разобрать любой коммуникационный кейс по пяти вопросам Лассуэлла.\n\n**Карточки этого дня:** № 1–10 из общего набора 130. Во всём курсе — по 10 новых карточек на каждый день. Их можно решать отдельными короткими подходами в течение дня.\n\n> Все фактические утверждения ниже снабжены ссылкой на страницу именно учебника. Формулировки заданий и учебные кейсы — авторские; они не добавляют новых фактов.\n\n---\n\n## Стартовый кейс\n\nПрочитайте кейс:\n\n> Муниципальный департамент публикует ролик о раздельном сборе отходов во «ВКонтакте». Через неделю опрос показывает: часть подписчиков стала чаще искать пункты приёма вторсырья.\n\nЗапишите одним предложением ответ на каждый вопрос:\n\n1. Кто сообщает?\n2. Что сообщает?\n3. По какому каналу?\n4. Кому?\n5. С каким эффектом?\n\nНе проверяйте себя сейчас: вернётесь к этому ответу в конце занятия.\n\n---\n\n## Почему ранние исследования искали медиаэффекты\n\n### Главное, что нужно выучить\n\n**Эмпирико-функционалистская группа теорий** исходила из того, что у массовой коммуникации есть эффекты в обществе, их можно разграничить, понять механизм передачи информации и на этой основе строить стратегию работы медиа. Её опорами были бихевиоризм, математическая теория информации и индустриальный контекст. [1, с. 257]\n\nЛогика бихевиоризма в этом контексте: массовая коммуникация понимается как **внешний стимул**, на который индивид реагирует; медиа оказываются «раздражителем». Это объясняет, почему исследователи стремились искать связь между сообщением и наблюдаемым результатом. [1, с. 257]\n\nМатематическая модель Шеннона—Уивера описывала передачу сигнала между передатчиком и приёмником. В медиаисследованиях из неё закрепилась **линейная** картина коммуникации: сообщение в коде передаётся по каналу; в ранней версии предполагается, что при владении кодом получатель дублирует информацию так, как её задал передатчик. [1, с. 258–259]\n\nИндустриальный контекст был практическим: исследователи пропаганды и радиоаудитории помогали измерять аудиторию, а это было важно для рекламной модели финансирования медиа. При этом сам факт контакта с программой ещё не означает, что человек её понял, принял или будет действовать. [1, с. 260–261]\n\n### Что у этой логики не получается объяснить\n\nРанние исследования обычно измеряли **ожидаемые** эффекты количественным опросом: заранее формулировали гипотезу о возможном изменении убеждений, отношения или доверия. Поэтому неожиданные результаты такого подхода легко оставались незамеченными. [1, с. 261]\n\nКроме того, эти исследования преимущественно фокусировались на содержании сообщения и недооценивали роль канала. Они также лучше фиксировали краткосрочные последствия: со временем на результат могут наложиться другие сообщения и межличностное общение, из-за чего трудно приписать изменение одному конкретному медиасообщению. [1, с. 261–262]\n\n**Вывод для экзамена:** не утверждайте, что «медиа доказанно вызвали поведение» только потому, что после кампании изменился показатель. Ранняя логика ищет измеримый эффект, но сам учебник указывает на ограничение такого причинного вывода. [1, с. 261–262]\n\n### Мини-схема для памяти\n\n`стимул (медиасообщение) → предполагаемый эффект → попытка измерить эффект`\n\nВажно: это логика раннего направления, а не универсальное описание любой коммуникации.\n\n### Три основания ранней исследовательской оптики\n\nУ ранней эмпирико-функционалистской традиции не было одного-единственного тезиса «медиа всемогущи». Это была исследовательская оптика, сложившаяся на пересечении трёх линий. Первая — бихевиоризм: исследователя интересует наблюдаемая связь внешнего стимула и реакции. Вторая — математическая теория информации: она давала схему передачи сигнала, пригодную для описания технической стороны связи. Третья — индустриальный контекст массового производства и потребления медиа: газета, радио и реклама требовали количественного знания об аудитории. В учебнике Кирии и Новиковой эти три основания названы вместе; на экзамене их нельзя выдавать за три разновидности медиа или за этапы одной модели. [1, с. 257]\n\nИз бихевиористской предпосылки следует конкретный исследовательский вопрос: если предъявить сообщение, какие изменения сознания или поведения можно зарегистрировать? Такой вопрос не равен утверждению, что изменение всегда будет сильным и одинаковым у всех. Он задаёт направление измерения: сначала фиксируется содержание и контакт с ним, затем — показатели отношения, запоминания, доверия, намерения или действия. Именно поэтому ранняя традиция уделяла особое внимание измерению аудитории и эффектов. [1, с. 257, 260–261]\n\nМатематическая модель передачи информации полезна тем, что выделяет элементы процесса: отправление, код, канал и получение. Но перенос этой схемы в социальную коммуникацию имеет границы. Техническая успешность доставки ещё не решает вопроса о смысле: один и тот же знак может быть декодирован по-разному, а социальное действие зависит не только от факта получения. Поэтому при ответе на тестовый вопрос различайте: **доставка сигнала**, **понимание сообщения**, **принятие позиции** и **поведенческий результат** — это не синонимы. Связь ранней медиа-теории с линейной моделью передачи описана у Кирии и Новиковой; более детальный разбор уровней коммуникации дан у Гавры. [1, с. 258–259; 2, с. 100–103]\n\nИндустриальная сторона ранних исследований также не сводится к «манипуляции». Для радио и рекламы нужны были сведения о том, кто и как часто вступает в контакт с программой. Контактные показатели позволяли описывать аудиторию и планировать размещение сообщений. Но авторы учебника специально предупреждают: контакт не равен пониманию, согласию или действию. Поэтому фраза «ролик набрал миллион просмотров, значит кампания сработала» методологически слабая. Она сообщает об охвате, но не доказывает эффект в установках или поведении. [1, с. 260–261]\n\n### Как не перепутать четыре уровня результата\n\nВ учебном кейсе полезно раскладывать результат в последовательность:\n\n1. **Доступность и контакт:** сообщение дошло до адресата и было замечено.\n2. **Смысловая обработка:** адресат распознал код и интерпретировал содержание.\n3. **Отношение:** у него могло измениться знание, оценка, доверие или намерение.\n4. **Поведение:** он совершил или не совершил действие, которого добивался источник.\n\nЭта последовательность — авторская учебная схема, а не самостоятельная «теория четырёх эффектов». Она нужна, чтобы применить ограничение, указанное в источнике: эмпирически зафиксированный контакт сам по себе не подтверждает последующие звенья. [1, с. 260–262]\n\nПример. Университетская медиаслужба публикует пост о дне открытых дверей. Число показов характеризует распространение; переходы по ссылке — часть реакции на сообщение; регистрация — действие. Но даже регистрация не позволяет автоматически утверждать, что именно один пост стал единственной причиной решения: человек мог получить информацию от друга, увидеть афишу или уже планировать участие. Такой вывод согласуется с критикой прямолинейного приписывания эффекта одному сообщению и с последующим развитием теории ограниченных эффектов. [1, с. 261–265]\n\n### Самопроверка — 2 минуты\n\nЗакройте текст и закончите фразу: «Контакт с рекламой ещё не равен покупке, потому что…»\n\n**Эталон:** контакт с сообщением не доказывает его понимание, принятие или готовность действовать. [1, с. 261]\n\n---\n\n## От «волшебной пули» к ограниченным эффектам\n\nВнутри эмпирико-функционалистской группы авторы выделяют два направления: **теории пропагандистской силы** и **теории ограниченных эффектов**. Оба предполагают, что эффекты существуют и могут изучаться методами социальных наук. [1, с. 261]\n\nРанние исследования пропаганды 1920-х годов опирались на «теорию волшебной пули» (также — «теорию подкожной инъекции»). У неё нет одного автора; в логике чистого бихевиоризма медиа подобны «пуле», которая, достигнув цели, меняет сознание и поведение адресата. [1, с. 262]\n\n| Вопрос | Теории пропагандистской силы | Теории ограниченных эффектов |\n|---|---|---|\n| Как мыслится влияние медиа? | Сильное: медиа активно влияют, люди безоговорочно доверяют сообщениям | Ограниченное: медиа не в полной мере меняют устойчивые установки |\n| С каким университетским центром связывает это учебник? | Гарвард; Г. Лассуэлл | Колумбия; П. Лазарсфельд |\n\nИсточник всей таблицы: [1, с. 261].\n\nИсследователи первой волны часто изучали содержание пропагандистских сообщений; при этом сам эффект их отражения в сознании реципиентов нередко **постулировался**, а не был эмпирически доказан. [1, с. 264]\n\nКолумбийская школа (П. Лазарсфельд, Э. Кац, Б. Берельсон, Й. Клаппер) исследовала получение сообщений и аудиторию, в том числе во время избирательных кампаний. Её ключевая идея: медиа — не единственный канал в социальном окружении человека, а их воздействие не абсолютно и не прямолинейно. [1, с. 264–265]\n\n### Что именно меняется в теории ограниченных эффектов\n\nПереход к ограниченным эффектам — не отказ от исследования влияния и не утверждение, что медиа «ничего не делают». Изменяется объект объяснения. Вместо вопроса «какой эффект сообщение производит на изолированную массу?» появляется вопрос «как медиасообщение действует в уже существующем социальном окружении человека?». Для этого направления значимы предшествующие установки, принадлежность к группам, межличностное обсуждение и различия аудиторий. В книге Кирии и Новиковой эта смена фокуса связывается с исследованиями аудитории и избирательных кампаний Колумбийской школы. [1, с. 264–265]\n\nДвухступенчатый поток — частый экзаменационный термин, но его нельзя понимать как строгую лестницу, по которой любое сообщение всегда обязано пройти. Он фиксирует важную для ограниченных эффектов роль межличностного посредничества: часть людей активнее следит за медиа и затем обсуждает или интерпретирует информацию для других. В программе ВИ это названо ролью лидеров мнения; учебник Кирии и Новиковой связывает эту проблематику с работами Лазарсфельда, Каца, Берельсона и Клаппера. [1, с. 264–265]\n\nСравнение направлений удобно строить по трём вопросам. Во-первых, каков статус аудитории? В логике «магической пули» она мыслится преимущественно пассивной и однородной; в логике ограниченных эффектов — включённой в социальные связи и различающейся по контекстам. Во-вторых, что считается главным механизмом? В первом случае — прямое воздействие сообщения; во втором — влияние, опосредованное окружением и уже сложившимися установками. В-третьих, как корректно интерпретировать данные? Ранний рост показателя после кампании не достаточен для вывода о прямой причине: необходим анализ других факторов и характера связи с аудиторией. Основание для этих различий — характеристика двух направлений в [1, с. 261, 264–265].\n\n### Почему термин «магическая пуля» требует осторожности\n\n«Теория магической пули» и «теория подкожной инъекции» описывают образ сильного прямого воздействия сообщения. Кирия и Новикова подчёркивают, что у неё нет одного автора: это обобщённое обозначение логики, близкой к чистому бихевиоризму, а не название законченной теории, написанной одним исследователем. Поэтому в карточке с вопросом «кто автор теории магической пули?» правильнее не выбирать Лассуэлла только потому, что он исследовал пропаганду: корректный ответ должен отражать отсутствие единственного автора. [1, с. 262]\n\nЛассуэлл важен здесь по другой причине. Его исследования пропаганды и предложенная им формула помогают расчленить коммуникационный акт, но сама по себе формула не доказывает всесилие медиа. Она задаёт вопросы анализа: кто инициирует сообщение, что именно передаётся, через какой канал, какой аудитории и с каким эффектом. Смешение модели анализа и тезиса о тотальном влиянии — типичная ошибка. [2, с. 95–96]\n\n### Ограничения измерения эффекта: что можно и чего нельзя утверждать\n\nЭмпирическая традиция ценна тем, что требует проверять предполагаемое воздействие, а не довольствоваться интуицией автора кампании. Но измерение всегда связано с тем, какие именно данные собраны. Если исследователь спрашивает человека, помнит ли он рекламное сообщение, он измеряет воспоминание о контакте; если спрашивает об отношении к проблеме — самооценку отношения; если сопоставляет состояние до и после — изменение показателя. Между этими операциями нельзя ставить знак равенства. У Кирии и Новиковой подчёркивается, что исследования часто лучше фиксировали краткосрочные последствия, а на более длительном отрезке на человека накладываются новые сообщения и межличностное общение. [1, с. 261–262]\n\nЕщё одна граница — заранее ожидаемый эффект. Когда исследование изначально ищет только запланированное изменение, ему труднее заметить неожиданные последствия сообщения. Например, кампания может повысить узнаваемость темы, но вызвать недоверие к источнику; она может породить обсуждение, но не изменить действие. Учебник указывает, что в ранних исследованиях ожидаемые эффекты часто измерялись количественно и потому неожиданное воздействие могло оставаться вне поля зрения. [1, с. 261]\n\nПоэтому в сложном экзаменационном вопросе не выбирайте крайние формулировки: «любой просмотр доказывает полный эффект», «медиа вообще не влияют» или «изменение вызвано только сообщением». Более точна формула: медиаэффект требует отдельного исследования, а его объяснение должно учитывать характер сообщения, канал, аудиторию, временной горизонт и социальное окружение. Первые четыре элемента задаёт Лассуэлл, ограниченность прямого вывода подчёркивается в разборе ранних исследований. [2, с. 95–100; 1, с. 260–265]\n\n### Задание — 3 минуты\n\nВыберите более точное объяснение. Опрос показал, что аудитория ролика не стала массово менять привычки, хотя о ролике помнят.\n\n1. У медиа вообще не бывает эффектов.\n2. Наблюдение совместимо с логикой ограниченных эффектов: запоминание не обязательно означает изменение устойчивых установок.\n3. Канал автоматически превращает любое сообщение в действие.\n4. Значит, ролик никто не видел.\n\n**Правильный ответ:** 2. Основание: [1, с. 261].\n\n---\n\n## Формула Лассуэлла\n\nГарольд Лассуэлл в работе 1948 года предложил описывать коммуникацию через пять вопросов:\n\n1. **Кто сообщает?**\n2. **Что сообщает?**\n3. **По какому каналу?**\n4. **Кому?**\n5. **С каким эффектом?** [2, с. 95–96]\n\nСокращённая формула: **S—M—C—R—E**: source — message — channel — receiver — effect. Каждый компонент задаёт отдельное направление исследования: источник, сообщение, средства/каналы, аудитория и воздействие/эффективность. [2, с. 96]\n\nНе путайте:\n\n- **Источник** — коммуницирующий субъект. В разных ситуациях это может быть индивид, социальная группа, организация или масса. [2, с. 97–98]\n- **Сообщение** — осмысленная и закодированная информация; оно может включать факты, идеи, мнения, эмоции или побуждение к действию. [2, с. 98]\n- **Канал** — физический посредник, обеспечивающий существование и перемещение сообщения от источника к получателю. [2, с. 98–99]\n- **Эффект** — измеряемое воздействие и эффективность коммуникации в логике формулы Лассуэлла. [2, с. 96]\n\nОтдельно различайте **канал** и **средство коммуникации**. Гавра определяет канал как физического посредника перемещения сообщения; естественными каналами могут быть непосредственные сенсорные контакты, а искусственными — материальные носители и технические устройства. При этом он предостерегает от сведения средств массовой коммуникации только к каналу: СМК — более сложный феномен. [2, с. 98–100]\n\n### Формула — это одновременно модель и исследовательский маршрут\n\nУ формулы Лассуэлла две функции. Первая — структурная: она показывает пять базовых компонентов коммуникации. Вторая — исследовательская: каждому вопросу соответствует свой фокус анализа. Вопрос «кто?» направляет к изучению коммуникатора и управления коммуникацией; «что?» — к содержанию сообщения; «по какому каналу?» — к средствам передачи; «кому?» — к аудитории; «с каким эффектом?» — к результатам воздействия. Эта двойная функция подробно разъясняется в учебнике Василика и совпадает с изложением модели у Гавры. [3, с. 127–131; 2, с. 95–96]\n\nСледовательно, модель не стоит применять как простую анкету, где любой ответ автоматически является правильным. Нужно проверять логическую роль признака. Например, название организации-инициатора — это источник; формулировка призыва — сообщение; платформа или эфир — канал; группа адресатов — аудитория; измеренное изменение знания, отношения или действия — эффект. Количество просмотров относится прежде всего к контакту/охвату аудитории, а не к эффекту, если нет данных об изменении аудитории. Последняя оговорка согласуется и с критикой контактных измерений у Кирии и Новиковой. [2, с. 96–99; 1, с. 260–262]\n\nЭлемент «источник» не следует понимать только как конкретного человека, который нажал кнопку публикации. Гавра указывает, что субъектами коммуникации могут быть индивид, группа, организация и масса. В прикладном кейсе полезно отличать редактора, разместившего материал, от организации, от имени которой он распространяется: в зависимости от вопроса они могут быть разными уровнями описания источника. [2, с. 97–98]\n\nЭлемент «сообщение» тоже шире текста. Гавра описывает его как осмысленную, закодированную информацию, которая может нести факты, идеи, мнения, эмоции и побуждения к действию. Поэтому инфографика, видеоролик, устное обращение и совокупность визуальных и вербальных знаков могут быть сообщением. Вопрос в тесте проверяет не носитель, а содержание, которое кодируется и передаётся. [2, с. 98]\n\nКанал — физический посредник и способ перемещения сообщения. У Гавры он может быть естественным (например, непосредственно доступные сенсорные каналы в общении) или искусственным, связанным с материальным носителем и техническим устройством. Но одно только название платформы не исчерпывает понятие медиа: средства массовой коммуникации включают организационные, содержательные и технологические аспекты, поэтому нельзя ставить знак равенства между СМК и отдельным каналом. [2, с. 98–100]\n\nНаконец, «эффект» в этой модели — не обязат
